<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>創星日誌 - 生命圏観測シミュレーター</title>
  <style>
    :root {
      --bg0: #050816;
      --bg1: #0b1633;
      --panel: rgba(12, 20, 45, 0.82);
      --panel2: rgba(18, 32, 68, 0.72);
      --line: rgba(158, 190, 255, 0.22);
      --line2: rgba(255, 255, 255, 0.12);
      --text: #edf5ff;
      --muted: #9fb2d8;
      --subtle: #7082aa;
      --gold: #ffd976;
      --cyan: #7ee8ff;
      --green: #9dffb2;
      --red: #ff8a9d;
      --purple: #c6a6ff;
      --shadow: 0 18px 55px rgba(0,0,0,.42);
      --radius: 22px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 20% 0%, rgba(79, 118, 255, .28), transparent 28%),
        radial-gradient(circle at 80% 12%, rgba(138, 64, 255, .20), transparent 22%),
        linear-gradient(160deg, #030511 0%, #08142f 48%, #050816 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.55) 0 1px, transparent 1.7px),
        radial-gradient(circle, rgba(126,232,255,.30) 0 1px, transparent 1.6px);
      background-size: 82px 82px, 137px 137px;
      background-position: 0 0, 24px 52px;
      opacity: .18;
      mask-image: linear-gradient(to bottom, black, transparent 86%);
    }

    .app {
      width: min(100%, 520px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: calc(12px + env(safe-area-inset-top)) 12px calc(16px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 8px 6px 0;
    }

    .titleBlock { min-width: 0; }
    .appTitle {
      margin: 0;
      font-size: 22px;
      letter-spacing: .06em;
      line-height: 1.05;
      font-weight: 850;
    }
    .appSub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .miniBtns { display: flex; gap: 7px; flex-shrink: 0; }
    button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.07);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 750;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,.16);
      touch-action: manipulation;
    }
    button:active { transform: translateY(1px) scale(.99); }
    button.primary { background: linear-gradient(135deg, rgba(126,232,255,.22), rgba(198,166,255,.18)); border-color: rgba(126,232,255,.36); }
    button.warn { background: rgba(255,138,157,.12); border-color: rgba(255,138,157,.26); }

    .planetCard {
      position: relative;
      background: linear-gradient(180deg, rgba(13, 23, 55, .78), rgba(7, 13, 29, .70));
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 390px;
    }

    .planetCard::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,.10), transparent 22%, transparent 70%, rgba(126,232,255,.08));
      mix-blend-mode: screen;
    }

    #planetCanvas {
      display: block;
      width: 100%;
      height: 390px;
      touch-action: none;
      user-select: none;
    }

    .planetHint {
      position: absolute;
      left: 14px;
      top: 12px;
      z-index: 2;
      display: flex;
      gap: 6px;
      align-items: center;
      color: rgba(237,245,255,.72);
      font-size: 12px;
      background: rgba(3, 7, 18, .36);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 999px;
      padding: 7px 10px;
      backdrop-filter: blur(10px);
    }

    .ageBadge {
      position: absolute;
      right: 14px;
      top: 12px;
      z-index: 3;
      text-align: right;
      background: rgba(3, 7, 18, .42);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px;
      padding: 8px 10px;
      backdrop-filter: blur(10px);
      max-width: 190px;
    }
    .ageBadge .planetName { font-size: 13px; color: var(--gold); font-weight: 850; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ageBadge .age { margin-top: 2px; font-size: 11px; color: var(--muted); }

    .wipe {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 5;
      width: min(46%, 210px);
      min-height: 152px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(5, 9, 20, .72);
      box-shadow: 0 18px 45px rgba(0,0,0,.38);
      backdrop-filter: blur(14px);
      transform: translateY(10px);
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
    }
    .wipe.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
    .wipeScene {
      height: 76px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(#1b3159, #0b172e);
    }
    .wipeScene canvas { width: 100%; height: 100%; display: block; }
    .wipeBody { padding: 9px 10px 10px; }
    .wipeName { font-size: 13px; font-weight: 850; line-height: 1.2; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wipeLine { margin-top: 3px; font-size: 11px; line-height: 1.35; color: var(--muted); }
    .wipeActions { display: flex; gap: 6px; margin-top: 8px; }
    .wipeActions button { padding: 6px 8px; font-size: 11px; flex: 1; }

    .statusPanel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .statBox, .controlPanel, .modePanel, .detailPanel, .logPanel, .pinTray {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
      backdrop-filter: blur(18px);
    }
    .statBox { padding: 11px 12px; min-width: 0; }
    .statLabel { color: var(--subtle); font-size: 11px; margin-bottom: 4px; }
    .statValue { font-size: 14px; line-height: 1.25; font-weight: 820; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .statValue.cyan { color: var(--cyan); }
    .statValue.gold { color: var(--gold); }
    .statValue.green { color: var(--green); }
    .statValue.red { color: var(--red); }

    .controlPanel { padding: 11px; display: grid; gap: 10px; }
    .speedRow { display: grid; grid-template-columns: 48px 1fr 48px; gap: 9px; align-items: center; }
    .speedRow button { height: 44px; font-size: 18px; padding: 0; }
    .speedDisplay {
      min-height: 44px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(255,255,255,.06);
      line-height: 1.05;
    }
    .speedDisplay b { font-size: 15px; color: var(--cyan); }
    .speedDisplay small { margin-top: 3px; color: var(--subtle); font-size: 10px; }
    .quickRow { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .quickRow button { padding: 10px 6px; font-size: 12px; }

    .modePanel { padding: 8px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .modePanel button { padding: 10px 4px; font-size: 12px; border-radius: 15px; box-shadow: none; }
    .modePanel button.active { background: linear-gradient(135deg, rgba(255,217,118,.22), rgba(126,232,255,.16)); border-color: rgba(255,217,118,.38); color: #fff5d6; }

    .pinTray { padding: 10px; display: none; }
    .pinTray.show { display: block; }
    .sectionTitle { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; }
    .sectionTitle b { font-size: 13px; color: var(--gold); }
    .sectionTitle span { color: var(--subtle); font-size: 11px; }
    .pinList { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .pinCard {
      min-width: 0;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      border-radius: 16px;
      padding: 8px;
    }
    .pinCard .pinName { font-size: 11px; font-weight: 850; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pinCard .pinState { margin-top: 4px; color: var(--muted); font-size: 10px; line-height: 1.25; min-height: 25px; }
    .pinCard button { margin-top: 7px; width: 100%; padding: 5px; font-size: 10px; }

    .detailPanel { padding: 13px; min-height: 184px; }
    .detailHeader { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
    .detailHeader h2 { margin: 0; font-size: 16px; line-height: 1.25; }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      padding: 5px 8px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .infoGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .infoItem {
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.045);
      border-radius: 15px;
      padding: 9px;
      min-width: 0;
    }
    .infoItem small { display: block; color: var(--subtle); font-size: 10px; margin-bottom: 4px; }
    .infoItem b { display: block; font-size: 12px; line-height: 1.28; font-weight: 780; }
    .wide { grid-column: 1 / -1; }
    .desc { color: var(--muted); font-size: 12px; line-height: 1.55; margin: 0; }

    .bars { display: grid; gap: 8px; }
    .barLine { display: grid; grid-template-columns: 86px 1fr 34px; gap: 7px; align-items: center; font-size: 11px; color: var(--muted); }
    .barTrack { height: 8px; background: rgba(255,255,255,.08); border-radius: 999px; overflow: hidden; }
    .barFill { height: 100%; width: 50%; background: linear-gradient(90deg, var(--cyan), var(--gold)); border-radius: 999px; }

    .logPanel { padding: 13px; }
    .logFilters { display: flex; gap: 6px; margin-bottom: 8px; }
    .logFilters button { padding: 7px 9px; font-size: 11px; box-shadow: none; }
    .logFilters button.active { background: rgba(126,232,255,.18); border-color: rgba(126,232,255,.34); }
    .logList { display: grid; gap: 8px; max-height: 310px; overflow: auto; padding-right: 2px; }
    .logItem {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 9px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding-bottom: 8px;
    }
    .logAge { color: var(--gold); font-size: 10px; line-height: 1.25; }
    .logText { color: var(--muted); font-size: 12px; line-height: 1.42; }
    .logText b { color: var(--text); }

    .footerNote {
      color: rgba(159,178,216,.65);
      font-size: 10px;
      text-align: center;
      padding: 2px 8px 0;
      line-height: 1.5;
    }

    @media (min-width: 760px) {
      .app { width: min(100%, 760px); }
      .lowerGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: start; }
      .planetCard { min-height: 460px; }
      #planetCanvas { height: 460px; }
    }

    @media (max-width: 380px) {
      .appTitle { font-size: 19px; }
      .planetCard { min-height: 350px; }
      #planetCanvas { height: 350px; }
      .wipe { width: 52%; }
      .infoGrid { grid-template-columns: 1fr; }
      .wide { grid-column: auto; }
      .pinList { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="titleBlock">
        <h1 class="appTitle">創星日誌</h1>
        <div class="appSub">生命圏・知的生命・文明興亡を放置観測</div>
      </div>
      <div class="miniBtns">
        <button id="saveBtn" title="保存">保存</button>
        <button id="resetBtn" class="warn" title="新しい惑星">新星</button>
      </div>
    </header>

    <section class="planetCard">
      <canvas id="planetCanvas" width="900" height="760" aria-label="回転できる惑星"></canvas>
      <div class="planetHint">↔ スワイプで回転　◎ タップで観測</div>
      <div class="ageBadge">
        <div class="planetName" id="planetName">---</div>
        <div class="age" id="ageText">---</div>
      </div>
      <aside class="wipe" id="wipe">
        <div class="wipeScene"><canvas id="wipeCanvas" width="360" height="130"></canvas></div>
        <div class="wipeBody">
          <div class="wipeName" id="wipeName">観測地点</div>
          <div class="wipeLine" id="wipeLine">惑星表面をタップしてください。</div>
          <div class="wipeActions">
            <button id="pinBtn">ピン留め</button>
            <button id="detailBtn">詳しく</button>
            <button id="closeWipeBtn">×</button>
          </div>
        </div>
      </aside>
    </section>

    <section class="statusPanel">
      <div class="statBox">
        <div class="statLabel">生命段階</div>
        <div class="statValue green" id="lifeStageText">---</div>
      </div>
      <div class="statBox">
        <div class="statLabel">文明段階</div>
        <div class="statValue gold" id="civStageText">---</div>
      </div>
      <div class="statBox">
        <div class="statLabel">知的生命体</div>
        <div class="statValue cyan" id="speciesText">---</div>
      </div>
      <div class="statBox">
        <div class="statLabel">総合リスク</div>
        <div class="statValue red" id="riskText">---</div>
      </div>
    </section>

    <section class="controlPanel">
      <div class="speedRow">
        <button id="speedDown">−</button>
        <div class="speedDisplay" id="speedDisplay"><b>---</b><small>---</small></div>
        <button id="speedUp">＋</button>
      </div>
      <div class="quickRow">
        <button id="pauseBtn">⏸ 一時停止</button>
        <button id="normalBtn">通常速度</button>
        <button id="fastBtn">観測早送り</button>
      </div>
    </section>

    <nav class="modePanel" aria-label="観察モード">
      <button data-mode="planet" class="active">惑星</button>
      <button data-mode="region">地域</button>
      <button data-mode="biosphere">生命圏</button>
      <button data-mode="record">記録</button>
    </nav>

    <section class="pinTray" id="pinTray">
      <div class="sectionTitle"><b>ピン留め観測</b><span id="pinCount">0/3</span></div>
      <div class="pinList" id="pinList"></div>
    </section>

    <div class="lowerGrid">
      <section class="detailPanel" id="detailPanel"></section>
      <section class="logPanel" id="logPanel">
        <div class="sectionTitle"><b>最新ログ</b><span id="logCount">0件</span></div>
        <div class="logFilters">
          <button data-log="all" class="active">全部</button>
          <button data-log="life">生命</button>
          <button data-log="civ">文明</button>
          <button data-log="planet">惑星</button>
        </div>
        <div class="logList" id="logList"></div>
      </section>
    </div>

    <div class="footerNote">これは遊び用のプロトタイプです。科学的厳密性より、進化と文明の“眺める楽しさ”を優先しています。</div>
  </main>

  <script>
    'use strict';

    const canvas = document.getElementById('planetCanvas');
    const ctx = canvas.getContext('2d');
    const wipeCanvas = document.getElementById('wipeCanvas');
    const wctx = wipeCanvas.getContext('2d');

    const $ = (id) => document.getElementById(id);
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    const lerp = (a, b, t) => a + (b - a) * t;
    const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

    const SPEEDS = [0, 1, 10, 100, 1000, 10000, 100000, 1000000, 10000000];
    const SPEED_LABELS = ['停止', '×1年/秒', '×10年/秒', '×100年/秒', '×1千年/秒', '×1万年/秒', '×10万年/秒', '×100万年/秒', '×1000万年/秒'];
    const SPEED_HELP = ['観測停止', '細かく観察', '文明史向き', '文明史早送り', '生態系早送り', '進化観察', '長期進化', '惑星史', '超高速'];

    const LIFE_STAGES = [

      { key: 'intelligence', at: 4_240_000_000, label: '知的生命誕生期' }

    const CIV_STAGES = [
      { key: 'none', at: 0, label: '未発生' },
      { key: 'proto', at: 4_270_000_000, label: '原始文化' },

      { key: 'stellar', at: 4_382_000_000, label: '恒星間文明候補' }
    ];

    const LINEAGES = [
      {
        id: 'mammal', name: '哺乳系獣人型', base: '小型群居哺乳系',
        needs: { land: 0.58, forest: 0.45, social: 0.7 },
        traits: ['高い社会性', '鋭い嗅覚', '長い子育て', '道具操作に優れる'],

      },
      {

        traits: ['耐乾燥性', '紫外線視覚', '長寿傾向', '熱管理に優れる'],
        culture: '王朝・記録・地熱建築が発達しやすい',
        city: '石造低層都市と地熱神殿群'
      },
      {

      },
      {

      {
        id: 'cephalo', name: '海洋頭足類型', base: '高器用性頭足系',

      {

        needs: { wet: 0.65, coast: 0.55, land: 0.4 },

      {

        traits: ['分散知性', '超長期記憶', '低速拡張', '都市と身体の一体化'],
        culture: '森林都市・記憶林・共生建築が発達しやすい',
        city: '樹林と地下菌糸が一体化した都市圏'
      }
    ];

    const REGION_BASES = [
      '北部温帯森林', '赤道大河流域', '東部サバンナ', '西方乾燥盆地',
      '南部湿原地帯', '中央山脈', '西海岸群島', '内海沿岸',
      '極北氷原', '南方針葉林', '赤道密林', '東方高原',
      '外洋浅海域', '火山列島', '南極海氷縁', '大陸縁辺草原'
    ];

    const SYLLABLES = ['ア', 'ル', 'ナ', 'セ', 'イ', 'ラ', 'カ', 'ロ', 'ミ', 'ト', 'ヴァ', 'リ', 'オ', 'ノ', 'ク', 'シ', 'エ', 'ル', 'ハ', 'ザ', 'フィ', 'メ', 'リア', 'ソ'];

    const state = {
      seed: Math.floor(Math.random() * 999999),
      name: '',
      age: 0,
      speedIndex: 5,
      lastSpeedIndex: 5,
      paused: false,
      rotY: 0,
      rotX: -0.08,
      autoSpin: 0.025,
      regions: [],
      landDots: [],
      cloudDots: [],
      milestones: new Set(),
      logs: [],
      selectedRegionId: null,
      pinnedRegionIds: [],
      mode: 'planet',
      logFilter: 'all',
      intelligence: null,
      collapse: false,
      collapseAge: null,
      nextRandomEvent: 260_000_000,
      env: null,
      dirty: true,
      lastSave: 0
    };

    function randomName(prefix = '') {
      const n = 2 + Math.floor(Math.random() * 2);
      let s = '';
      for (let i = 0; i < n; i++) s += pick(SYLLABLES);
      return prefix + s;
    }

    function formatAge(years) {
      if (years < 10_000) return Math.floor(years).toLocaleString() + '年';
      if (years < 100_000_000) return Math.floor(years / 10_000).toLocaleString() + '万年';
      return (years / 100_000_000).toFixed(years < 1_000_000_000 ? 1 : 2) + '億年';
    }

    function getStage(list, age) {
      let current = list[0];
      for (const s of list) if (age >= s.at) current = s;
      return current;
    }

    function civLevel() {
      const key = getStage(CIV_STAGES, state.age).key;
      return CIV_STAGES.findIndex(s => s.key === key);
    }

    function lifeLevel() {
      const key = getStage(LIFE_STAGES, state.age).key;
      return LIFE_STAGES.findIndex(s => s.key === key);
    }

    function addLog(type, title, text, important = false) {
      state.logs.unshift({ type, title, text, age: state.age, important });
      if (state.logs.length > 180) state.logs.length = 180;
      state.dirty = true;
    }

    function makePlanet() {
      state.seed = Math.floor(Math.random() * 999999);
      state.name = randomName('惑星') + '-' + (2 + Math.floor(Math.random() * 8));
      state.age = 0;
      state.speedIndex = 5;
      state.lastSpeedIndex = 5;
      state.paused = false;
      state.rotY = Math.random() * Math.PI * 2;
      state.rotX = -0.08;
      state.milestones = new Set();
      state.logs = [];
      state.selectedRegionId = null;
      state.pinnedRegionIds = [];
      state.intelligence = null;
      state.collapse = false;
      state.collapseAge = null;
      state.nextRandomEvent = 240_000_000 + Math.random() * 280_000_000;
      state.env = {
        ocean: Math.random(),
        gravity: 0.65 + Math.random() * 0.9,
        temperature: Math.random(),
        humidity: Math.random(),
        oxygenPotential: 0.35 + Math.random() * 0.65,
        tectonics: Math.random(),
        disaster: Math.random(),
        forest: Math.random(),
        mountains: Math.random(),
        winds: Math.random(),
        socialPressure: Math.random(),
        stability: Math.random()
      };
      state.landDots = makeLandDots();
      state.cloudDots = makeCloudDots();
      state.regions = makeRegions();
      addLog('planet', '観測開始', `${state.name} の長期観測を開始。海洋率${Math.round(state.env.ocean * 100)}%、重力${state.env.gravity.toFixed(2)}G。`, true);
      hideWipe();
      saveState();
      updateAll();
    }

    function makeLandDots() {
      const dots = [];
      const continentCount = 5 + Math.floor(Math.random() * 4);
      const centers = [];
      for (let i = 0; i < continentCount; i++) {
        centers.push({
          lon: Math.random() * Math.PI * 2 - Math.PI,
          lat: (Math.random() - 0.5) * Math.PI * 0.85,
          size: 0.35 + Math.random() * 0.48
        });
      }
      for (let i = 0; i < 680; i++) {
        const c = pick(centers);
        const lon = c.lon + (Math.random() - 0.5) * c.size * 1.8;
        const lat = c.lat + (Math.random() - 0.5) * c.size;
        const polar = Math.abs(lat) / (Math.PI / 2);
        const isLand = Math.random() > state.env.ocean * 0.55;
        dots.push({
          lon, lat: clamp(lat, -1.45, 1.45),
          r: 0.006 + Math.random() * 0.018,
          land: isLand,
          polar,
          fert: Math.random()
        });
      }
      return dots;
    }

    function makeCloudDots() {
      const dots = [];
      for (let i = 0; i < 160; i++) {
        dots.push({
          lon: Math.random() * Math.PI * 2 - Math.PI,
          lat: (Math.random() - 0.5) * Math.PI,
          r: 0.006 + Math.random() * 0.012,
          a: 0.06 + Math.random() * 0.16
        });
      }
      return dots;
    }

    function makeRegions() {
      return REGION_BASES.map((base, index) => {
        const lon = (index / REGION_BASES.length) * Math.PI * 2 - Math.PI + (Math.random() - .5) * .35;
        const lat = Math.sin(index * 1.7) * .9 + (Math.random() - .5) * .25;
        const isOcean = /海|浅海|群島|沿岸|氷縁/.test(base) || Math.random() < state.env.ocean * .34;
        const climate = climateFrom(base, lat, isOcean);
        const root = randomName('');
        return {
          id: index,
          baseName: base,
          rootName: root,
          lon, lat,
          isOcean,
          climate,
          fertility: clamp(Math.random() * .55 + (isOcean ? .2 : .35) + state.env.humidity * .25, 0, 1),
          resources: clamp(Math.random() * .7 + (base.includes('山') || base.includes('火山') ? .3 : .05), 0, 1),
          biodiversity: Math.random() * .5,
          pollution: 0,
          ruin: false,
          city: false,
          origin: Math.random(),
          historyNames: [base],
          currentName: base,
          note: ''
        };
      });
    }

    function climateFrom(base, lat, isOcean) {
      if (base.includes('氷') || Math.abs(lat) > 1.15) return '寒冷';
      if (base.includes('乾燥') || state.env.humidity < .25) return '乾燥';
      if (base.includes('湿') || state.env.humidity > .72) return '湿潤';
      if (isOcean) return '海洋性';
      if (Math.abs(lat) < .35) return '熱帯';
      return '温帯';
    }

    function chooseIntelligence() {
      if (state.intelligence) return;
      const env = state.env;
      const scores = LINEAGES.map(l => {
        let score = Math.random() * .25;
        if (l.needs.land) score += (1 - env.ocean) * l.needs.land;
        if (l.needs.ocean) score += env.ocean * l.needs.ocean;
        if (l.needs.forest) score += env.forest * l.needs.forest;
        if (l.needs.heat) score += env.temperature * l.needs.heat;
        if (l.needs.dry) score += (1 - env.humidity) * l.needs.dry;
        if (l.needs.wet) score += env.humidity * l.needs.wet;
        if (l.needs.coast) score += (.35 + env.ocean * .45) * l.needs.coast;
        if (l.needs.social) score += env.socialPressure * l.needs.social;
        if (l.needs.mountain) score += env.mountains * l.needs.mountain;
        if (l.needs.wind) score += env.winds * l.needs.wind;
        if (l.needs.vision) score += (env.winds * .4 + env.mountains * .4 + .2) * l.needs.vision;
        if (l.needs.clever) score += (env.stability * .5 + env.socialPressure * .5) * l.needs.clever;
        if (l.needs.stable) score += env.stability * l.needs.stable;
        if (l.needs.warm) score += env.temperature * l.needs.warm;
        return { l, score };
      }).sort((a, b) => b.score - a.score);
      const chosen = scores[0].l;
      const speciesName = randomName('') + (chosen.id === 'cephalo' ? '潮族' : chosen.id === 'avian' ? '翼人種' : chosen.id === 'mycelial' ? '記憶林' : chosen.id === 'arthropod' ? '群族' : chosen.id === 'reptile' ? '竜人種' : chosen.id === 'amphibian' ? '水棲族' : '獣人種');
      state.intelligence = { ...chosen, speciesName, score: scores[0].score };
      addLog('life', '知的生命体の出現', `${chosen.base} から ${speciesName} が出現。特徴は「${chosen.traits.slice(0,2).join('・')}」。この惑星の文明担当になりそうです。`, true);
      const candidates = state.regions
        .map(r => ({ r, score: r.fertility + r.resources * .35 + (r.isOcean && chosen.id === 'cephalo' ? .6 : 0) + (!r.isOcean && chosen.id !== 'cephalo' ? .25 : 0) - Math.abs(r.lat) * .1 + Math.random() * .3 }))
        .sort((a,b) => b.score - a.score)
        .slice(0, 2);
      for (const c of candidates) c.r.origin += .8;
    }

    function updateMilestones() {
      for (const st of LIFE_STAGES) {
        const key = 'life:' + st.key;
        if (state.age >= st.at && !state.milestones.has(key)) {
          state.milestones.add(key);
          milestoneLife(st);
        }
      }
      if (state.age >= LIFE_STAGES.find(s => s.key === 'intelligence').at) chooseIntelligence();
      for (const st of CIV_STAGES) {
        const key = 'civ:' + st.key;
        if (state.age >= st.at && !state.milestones.has(key)) {
          state.milestones.add(key);
          milestoneCiv(st);
        }
      }
      if (!state.collapse && state.age > 4_372_000_000 && riskValue() > 72 && Math.random() < 0.004) {
        triggerCollapse();
      }
      while (state.age >= state.nextRandomEvent) {
        randomEvent();
        state.nextRandomEvent += randomEventGap();
      }
    }

    function milestoneLife(st) {
      const msgs = {
        sterile: ['無生命期', '地表は不安定。火山活動と隕石衝突が多く、生命の兆候はまだありません。'],
        chemistry: ['有機分子形成', '海洋と大気中で複雑な有機化学反応が増加しました。'],
        microbe: ['原始生命誕生', '浅海と熱水域に微生物圏が成立。生命ログの記録を開始します。'],
        oxygen: ['酸素革命', '光合成型生命が拡大。嫌気性生命の一部が衰退し、生態系が大きく再編されます。'],
        multicell: ['多細胞生命の安定化', '複数の系統で大型化と分化が始まりました。捕食と防御の進化が加速します。'],
        oceanLife: ['海洋生態系の拡大', '外骨格・遊泳能力・感覚器が進化。海洋のニッチ争いが激化します。'],
        landLife: ['陸上進出', '沿岸から陸地へ生命圏が広がります。乾燥耐性と支持構造が重要になりました。'],
        megafauna: ['大型生物繁栄', '複数地域で大型生物が繁栄。支配系統の入れ替わりが起きやすい時代です。'],
        preIntelligence: ['知性候補期', '道具使用・群れ行動・学習能力の高い系統が観測されています。'],
        intelligence: ['知性の火花', '一部の生物系統で記号・道具・世代間学習が成立し始めました。']
      };
      addLog('life', msgs[st.key][0], msgs[st.key][1], true);
      for (const r of state.regions) r.biodiversity = clamp(r.biodiversity + .08 + Math.random() * .12, 0, 1);
    }

    function milestoneCiv(st) {
      if (st.key === 'none') return;
      const species = state.intelligence ? state.intelligence.speciesName : '未確定知性体';
      const msgs = {
        proto: ['原始文化の成立', `${species} が火・道具・記号的コミュニケーションを使い始めました。`],
        agri: ['定住文明の発生', '食料生産と定住地が拡大。地域名が現地語由来の固有名へ変化し始めます。'],
        city: ['都市国家の形成', '河川・沿岸・資源地帯に都市が出現。交易と争いが記録されます。'],
        empire: ['国家と帝国の時代', '複数の都市圏が統合され、地域名が王国・州・聖域として再編されます。'],
        industrial: ['産業文明へ移行', '燃料利用と機械化が進行。文明発展と同時に環境負荷が上昇します。'],
        info: ['情報文明へ移行', '惑星規模の通信網が成立。都市光が夜面に広がります。'],
        space: ['宇宙進出開始', '軌道施設と宇宙港が建設されました。グレートフィルター突破の候補段階です。'],
        stellar: ['恒星間文明候補', '惑星文明の一部が恒星間進出を試みています。滅亡か継承か、分岐点です。']
      };
      addLog('civ', msgs[st.key][0], msgs[st.key][1], true);
      evolveRegionNames();
    }

    function randomEventGap() {
      const ll = lifeLevel();
      if (ll < 3) return 220_000_000 + Math.random() * 360_000_000;
      if (ll < 8) return 45_000_000 + Math.random() * 160_000_000;
      if (civLevel() < 5) return 2_000_000 + Math.random() * 12_000_000;
      return 70_000 + Math.random() * 1_200_000;
    }

    function randomEvent() {
      const ll = lifeLevel();
      const cl = civLevel();
      if (ll < 2) {
        addLog('planet', '地殻変動', '火山活動により大気成分と海洋鉱物濃度が変動しました。');
        return;
      }
      if (ll < 8) {
        const events = [
          ['life', '生態系の放散', '空いたニッチに複数系統が進出。地域ごとの生物相が豊かになりました。'],
          ['life', '小規模絶滅', '気候変動により一部系統が衰退。別系統が空いた席に入り始めます。'],
          ['planet', '気候振動', '寒冷期と温暖期の揺れにより、移動能力と適応力が試されています。'],
          ['life', '形質の獲得', '視覚・群れ行動・外骨格などの形質が複数地域で発達しました。']
        ];
        const e = pick(events); addLog(e[0], e[1], e[2]);
        for (const r of state.regions) r.biodiversity = clamp(r.biodiversity + (Math.random() - .35) * .08, 0, 1);
        return;
      }
      if (cl < 5) {
        const events = [
          ['civ', '交易圏の拡大', '複数地域で物資と文化が交換され、地名と勢力圏が再編されました。'],
          ['civ', '地域紛争', '水・資源・聖地をめぐる争いが発生。一部地域の安定度が低下します。'],
          ['life', '家畜化と共生', '文明種の周辺で、野生生物の一部が共生・家畜化しました。'],
          ['civ', '文字記録の発展', '地域史と神話が記録され、土地の名前が固定化され始めました。']
        ];
        const e = pick(events); addLog(e[0], e[1], e[2]);
        evolveRegionNames();
        return;
      }
      const events = [
        ['civ', '環境負荷の増大', '都市圏と工業地帯の拡大により、複数地域で汚染が上昇しました。'],
        ['life', '都市適応種の増加', '旧来の大型野生生物は減少し、都市環境に適応した小型種が増えています。'],
        ['civ', '技術的跳躍', '通信・エネルギー・材料技術が進歩。宇宙進出の可能性が上昇します。'],
        ['planet', '極端気象', '気候システムの変動が激しくなり、文明圏と生態系の両方に影響が出ています。']
      ];
      const e = pick(events); addLog(e[0], e[1], e[2]);
      for (const r of state.regions) {
        if (r.city || Math.random() < .26) r.pollution = clamp(r.pollution + .035 + Math.random() * .08, 0, 1);
      }
    }

    function triggerCollapse() {
      state.collapse = true;
      state.collapseAge = state.age;
      addLog('civ', '文明崩壊', '惑星規模の複合危機により主要文明が崩壊。都市の一部は廃墟となり、生命圏の再編が始まります。', true);
      for (const r of state.regions) {
        if (r.city && Math.random() < .7) {
          r.ruin = true;
          r.city = false;
          r.currentName = '旧' + r.currentName + '跡';
          r.historyNames.push(r.currentName);
        }
      }
    }

    function evolveRegionNames() {
      const level = civLevel();
      const species = state.intelligence;
      for (const r of state.regions) {
        const civilizationScore = r.origin + r.fertility * .5 + r.resources * .3 + Math.random() * .1;
        if (level >= 2 && civilizationScore > .85) r.city = true;
        let next = r.currentName;
        if (level >= 2 && r.historyNames.length < 2 && r.city) next = r.rootName + (r.isOcean ? '湾岸' : '川流域');
        if (level >= 3 && r.city && !/都市|王国|帝国|州|圏|特区|旧/.test(next)) next = r.rootName + pick(['河畔都市', '交易都市', '聖域', '城塞都市']);
        if (level >= 4 && r.city && !/王国|帝国|州|連盟|旧/.test(next)) next = r.rootName + pick(['王国', '連盟領', '辺境州', '大公国']);
        if (level >= 5 && r.city && !/工業|首都|第|特区|旧/.test(next)) next = r.rootName + pick(['工業ベルト', '首都圏', '第三区', '研究都市']);
        if (level >= 7 && r.city && !/軌道|宇宙|特区|旧/.test(next)) next = r.rootName + pick(['軌道港特区', '宇宙港都市', '星間観測区']);
        if (species && species.id === 'mycelial' && r.city && level >= 3) next = r.rootName + pick(['記憶林', '共生林都', '地下聖林']);
        if (species && species.id === 'cephalo' && r.city && level >= 3) next = r.rootName + pick(['潮都', '浅海連邦', '珊瑚都市']);
        if (next !== r.currentName) {
          r.currentName = next;
          if (!r.historyNames.includes(next)) r.historyNames.push(next);
        }
      }
    }

    function riskValue() {
      const cl = civLevel();
      const pollution = state.regions.reduce((a,r) => a + r.pollution, 0) / state.regions.length;
      const base = state.env.disaster * 22 + cl * 5 + pollution * 45;
      const stability = state.env.stability * 16;
      const collapse = state.collapse ? 18 : 0;
      return clamp(Math.round(base - stability + collapse), 0, 99);
    }

    function updateRegions(dtYears) {
      const ll = lifeLevel();
      const cl = civLevel();
      for (const r of state.regions) {
        const bioTarget = ll < 2 ? 0 : clamp((ll - 1) / 8 + r.fertility * .22 - r.pollution * .25, 0, 1);
        r.biodiversity = lerp(r.biodiversity, bioTarget, .002);
        if (cl >= 5 && (r.city || Math.random() < .0004)) {
          r.pollution = clamp(r.pollution + dtYears * 0.00000000008 * (cl - 4), 0, 1);
        }
        if (state.collapse) {
          r.pollution = lerp(r.pollution, r.ruin ? .25 : .08, .0008);
          r.biodiversity = lerp(r.biodiversity, .72 - r.pollution * .25, .0008);
        }
      }
    }

    function tick(dt) {
      const speed = state.paused ? 0 : SPEEDS[state.speedIndex];
      if (speed > 0) {
        const dtYears = dt * speed;
        state.age += dtYears;
        state.rotY += state.autoSpin * dt;
        updateRegions(dtYears);
        updateMilestones();
        state.dirty = true;
      }
      if (performance.now() - state.lastSave > 5000 && state.dirty) saveState(false);
    }

    function project(lon, lat, radius, cx, cy, extraRot = 0) {
      const L = lon + state.rotY + extraRot;
      const x0 = Math.cos(lat) * Math.sin(L);
      const y0 = Math.sin(lat);
      const z0 = Math.cos(lat) * Math.cos(L);
      const cosX = Math.cos(state.rotX), sinX = Math.sin(state.rotX);
      const y = y0 * cosX - z0 * sinX;
      const z = y0 * sinX + z0 * cosX;
      const x = x0;
      return { x: cx + x * radius, y: cy - y * radius, z, visible: z > -0.04, scale: (z + 1) / 2 };
    }

    function drawPlanet() {
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      const cx = w / 2, cy = h * .49;
      const radius = Math.min(w, h) * .34;

      const bg = ctx.createRadialGradient(cx, cy, radius * .1, cx, cy, radius * 1.8);
      bg.addColorStop(0, 'rgba(126,232,255,.13)');
      bg.addColorStop(.38, 'rgba(65,95,185,.08)');
      bg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.clip();
      const oceanAgeBoost = clamp(lifeLevel() / 8, 0, 1);
      const ocean = ctx.createRadialGradient(cx - radius * .32, cy - radius * .38, radius * .12, cx, cy, radius * 1.1);
      ocean.addColorStop(0, `rgba(${42 + oceanAgeBoost*20}, ${95 + oceanAgeBoost*50}, ${170 + oceanAgeBoost*38}, 1)`);
      ocean.addColorStop(.55, '#173b78');
      ocean.addColorStop(1, '#071735');
      ctx.fillStyle = ocean;
      ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);

      drawLand(cx, cy, radius);
      drawCities(cx, cy, radius);
      drawClouds(cx, cy, radius);

      const shade = ctx.createRadialGradient(cx - radius * .35, cy - radius * .45, radius * .1, cx + radius * .35, cy + radius * .22, radius * 1.22);
      shade.addColorStop(0, 'rgba(255,255,255,.20)');
      shade.addColorStop(.45, 'rgba(255,255,255,0)');
      shade.addColorStop(.75, 'rgba(0,0,0,.22)');
      shade.addColorStop(1, 'rgba(0,0,0,.72)');
      ctx.fillStyle = shade;
      ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);
      ctx.restore();

      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(126,232,255,.35)';
      ctx.lineWidth = 2;
      ctx.stroke();

      const glow = ctx.createRadialGradient(cx, cy, radius * .95, cx, cy, radius * 1.12);
      glow.addColorStop(0, 'rgba(126,232,255,0)');
      glow.addColorStop(1, 'rgba(126,232,255,.28)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(cx, cy, radius * 1.12, 0, Math.PI * 2); ctx.fill();

      drawRegionMarkers(cx, cy, radius);
      drawOrbitIfNeeded(cx, cy, radius);
    }

    function drawLand(cx, cy, radius) {
      const ll = lifeLevel();
      for (const d of state.landDots) {
        const p = project(d.lon, d.lat, radius, cx, cy);
        if (!p.visible) continue;
        const alpha = clamp((p.z + .12) / 1.12, 0, 1);
        const rr = d.r * radius * (0.55 + p.scale * .75);
        const green = ll >= 5 ? 78 + d.fert * 70 : 58;
        const brown = ll < 3 ? 110 : 76;
        if (d.polar > .78) ctx.fillStyle = `rgba(210,235,255,${alpha * .72})`;
        else if (d.land) ctx.fillStyle = `rgba(${brown}, ${green}, ${ll >= 5 ? 68 : 64}, ${alpha * .86})`;
        else ctx.fillStyle = `rgba(37, 108, 155, ${alpha * .20})`;
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, rr * 1.55, rr, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      if (state.collapse) {
        ctx.fillStyle = 'rgba(120, 95, 78, .12)';
        ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);
      }
    }

    function drawClouds(cx, cy, radius) {
      if (lifeLevel() < 1) return;
      for (const d of state.cloudDots) {
        const p = project(d.lon, d.lat, radius, cx, cy, state.age * 0.0000000002);
        if (!p.visible) continue;
        const rr = d.r * radius * (1 + p.scale);
        ctx.fillStyle = `rgba(255,255,255,${d.a * clamp((p.z+.15)/1.15,0,1)})`;
        ctx.beginPath(); ctx.ellipse(p.x, p.y, rr * 2.2, rr, .2, 0, Math.PI * 2); ctx.fill();
      }
    }

    function drawCities(cx, cy, radius) {
      const cl = civLevel();
      if (cl < 3 && !state.collapse) return;
      for (const r of state.regions) {
        if (!r.city && !r.ruin) continue;
        const p = project(r.lon, r.lat, radius, cx, cy);
        if (!p.visible) continue;
        const alpha = clamp((p.z + .05) / 1.05, 0, 1);
        const size = radius * (r.ruin ? .014 : .018 + cl * .002);
        ctx.fillStyle = r.ruin ? `rgba(255,160,105,${alpha*.45})` : `rgba(255,218,118,${alpha*.75})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, size, 0, Math.PI * 2); ctx.fill();
        if (cl >= 6 && !r.ruin) {
          ctx.strokeStyle = `rgba(255,218,118,${alpha*.22})`;
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.arc(p.x, p.y, size * 2.4, 0, Math.PI * 2); ctx.stroke();
        }
      }
    }

    function drawRegionMarkers(cx, cy, radius) {
      for (const r of state.regions) {
        const p = project(r.lon, r.lat, radius, cx, cy);
        if (!p.visible) continue;
        const selected = r.id === state.selectedRegionId;
        const pinned = state.pinnedRegionIds.includes(r.id);
        if (!selected && !pinned) continue;
        ctx.strokeStyle = selected ? 'rgba(126,232,255,.95)' : 'rgba(255,217,118,.8)';
        ctx.fillStyle = selected ? 'rgba(126,232,255,.22)' : 'rgba(255,217,118,.18)';
        ctx.lineWidth = selected ? 3 : 2;
        const rad = selected ? 13 : 9;
        ctx.beginPath(); ctx.arc(p.x, p.y, rad, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      }
    }

    function drawOrbitIfNeeded(cx, cy, radius) {
      if (civLevel() < 7) return;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(-0.25);
      ctx.strokeStyle = 'rgba(126,232,255,.26)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, radius * 1.24, radius * .32, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawWipeScene(region) {
      const w = wipeCanvas.width, h = wipeCanvas.height;
      wctx.clearRect(0,0,w,h);
      const ll = lifeLevel(), cl = civLevel();
      const sky = wctx.createLinearGradient(0,0,0,h);
      if (region.ruin) { sky.addColorStop(0, '#2b2941'); sky.addColorStop(1, '#5a493a'); }
      else if (region.isOcean) { sky.addColorStop(0, '#315f99'); sky.addColorStop(1, '#0d4a70'); }
      else if (region.climate === '乾燥') { sky.addColorStop(0, '#d08b53'); sky.addColorStop(1, '#5b3926'); }
      else if (region.climate === '寒冷') { sky.addColorStop(0, '#9ec8ee'); sky.addColorStop(1, '#2e5578'); }
      else { sky.addColorStop(0, '#315d8c'); sky.addColorStop(1, '#123c39'); }
      wctx.fillStyle = sky; wctx.fillRect(0,0,w,h);

      if (region.isOcean) {
        wctx.fillStyle = 'rgba(20,80,120,.9)'; wctx.fillRect(0,h*.55,w,h*.45);
        for (let i=0;i<7;i++) {
          wctx.strokeStyle = `rgba(255,255,255,${.12 + i*.012})`;
          wctx.beginPath();
          const y = h*.62 + i*8;
          wctx.moveTo(0,y);
          for (let x=0;x<w;x+=30) wctx.quadraticCurveTo(x+15,y-5+(i%2)*4,x+30,y);
          wctx.stroke();
        }
        if (ll >= 5) drawCreatureIcon(wctx, w*.25, h*.60, 'fish');
        if (state.intelligence && state.intelligence.id === 'cephalo' && cl >= 2) drawCityIcon(wctx, w*.62, h*.56, 'coral');
      } else {
        wctx.fillStyle = region.climate === '乾燥' ? '#8d6338' : region.climate === '寒冷' ? '#d8ecff' : '#235b35';
        wctx.fillRect(0,h*.62,w,h*.38);
        if (region.climate !== '乾燥') {
          for (let i=0;i<8;i++) drawTree(wctx, 18+i*46+(i%2)*10, h*.68 + (i%3)*5, region.climate === '寒冷');
        } else {
          for (let i=0;i<4;i++) drawCactus(wctx, 35+i*80, h*.70);
        }
        if (ll >= 7 && !region.ruin && cl < 3) drawCreatureIcon(wctx, w*.34, h*.65, state.intelligence ? state.intelligence.id : 'beast');
        if (region.city && cl >= 3) drawCityIcon(wctx, w*.57, h*.58, state.intelligence ? state.intelligence.id : 'city');
        if (region.ruin) drawCityIcon(wctx, w*.55, h*.60, 'ruin');
      }
      if (cl >= 7 && region.city && !region.ruin) {
        wctx.strokeStyle = 'rgba(126,232,255,.75)';
        wctx.lineWidth = 3;
        wctx.beginPath(); wctx.moveTo(w*.78,h*.60); wctx.lineTo(w*.84,h*.12); wctx.stroke();
        wctx.fillStyle = 'rgba(126,232,255,.9)'; wctx.beginPath(); wctx.arc(w*.84,h*.12,5,0,Math.PI*2); wctx.fill();
      }
      wctx.fillStyle = 'rgba(0,0,0,.20)'; wctx.fillRect(0,0,w,h);
    }

    function drawTree(c,x,y,snow=false) {
      c.fillStyle = '#5b3b24'; c.fillRect(x-3,y-16,6,18);
      c.fillStyle = snow ? '#d8f1ff' : '#2e8a4a';
      c.beginPath(); c.moveTo(x,y-44); c.lineTo(x-18,y-9); c.lineTo(x+18,y-9); c.closePath(); c.fill();
      c.beginPath(); c.moveTo(x,y-32); c.lineTo(x-15,y-2); c.lineTo(x+15,y-2); c.closePath(); c.fill();
    }

    function drawCactus(c,x,y) {
      c.strokeStyle = '#6fb36a'; c.lineWidth = 7; c.lineCap = 'round';
      c.beginPath(); c.moveTo(x,y); c.lineTo(x,y-38); c.moveTo(x,y-22); c.lineTo(x-16,y-28); c.moveTo(x,y-27); c.lineTo(x+15,y-35); c.stroke();
    }

    function drawCreatureIcon(c,x,y,type) {
      c.save(); c.translate(x,y);
      c.fillStyle = 'rgba(255,255,255,.78)';
      if (type === 'avian') {
        c.beginPath(); c.moveTo(-24,0); c.quadraticCurveTo(-2,-22,18,0); c.quadraticCurveTo(0,-8,-24,0); c.fill();
      } else if (type === 'arthropod') {
        c.fillRect(-18,-10,36,18); for(let i=-2;i<=2;i++){c.fillRect(i*9,-22,3,16); c.fillRect(i*9,7,3,16);} 
      } else if (type === 'cephalo' || type === 'fish') {
        c.beginPath(); c.ellipse(0,-6,22,12,0,0,Math.PI*2); c.fill();
        for(let i=0;i<4;i++){ c.fillRect(-10+i*7,3,3,18); }
      } else {
        c.beginPath(); c.ellipse(0,-13,22,12,0,0,Math.PI*2); c.fill();
        c.fillRect(-12,-5,5,18); c.fillRect(9,-5,5,18); c.beginPath(); c.arc(18,-22,9,0,Math.PI*2); c.fill();
      }
      c.restore();
    }

    function drawCityIcon(c,x,y,type) {
      c.save(); c.translate(x,y);
      if (type === 'ruin') c.fillStyle = 'rgba(80,75,70,.85)';
      else if (type === 'coral' || type === 'cephalo') c.fillStyle = 'rgba(255,150,180,.82)';
      else if (type === 'mycelial') c.fillStyle = 'rgba(160,255,170,.78)';
      else c.fillStyle = 'rgba(255,218,118,.85)';
      for (let i=0;i<5;i++) {
        const bw = 14 + (i%2)*8;
        const bh = 24 + i*8;
        c.fillRect(-42 + i*18, -bh, bw, bh);
      }
      if (type === 'avian') {
        c.strokeStyle = 'rgba(255,255,255,.55)'; c.beginPath(); c.moveTo(-45,-42); c.lineTo(45,-70); c.stroke();
      }
      if (type === 'mycelial') {
        c.strokeStyle = 'rgba(160,255,170,.45)'; for(let i=0;i<4;i++){c.beginPath(); c.arc(-20+i*14,-20-i*8,13,0,Math.PI*2); c.stroke();}
      }
      c.restore();
    }

    function pointToRegion(x, y) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const px = (x - rect.left) * scaleX;
      const py = (y - rect.top) * scaleY;
      const cx = canvas.width / 2, cy = canvas.height * .49;
      const radius = Math.min(canvas.width, canvas.height) * .34;
      const nx = (px - cx) / radius;
      const ny = -(py - cy) / radius;
      if (nx*nx + ny*ny > 1) return null;
      const z = Math.sqrt(1 - nx*nx - ny*ny);
      const cosX = Math.cos(-state.rotX), sinX = Math.sin(-state.rotX);
      const y0 = ny * cosX - z * sinX;
      const z0 = ny * sinX + z * cosX;
      const lon = Math.atan2(nx, z0) - state.rotY;
      const lat = Math.asin(clamp(y0, -1, 1));
      let best = null, bestD = Infinity;
      for (const r of state.regions) {
        const dLon = Math.atan2(Math.sin(r.lon - lon), Math.cos(r.lon - lon));
        const dLat = r.lat - lat;
        const d = dLon*dLon + dLat*dLat*1.6;
        if (d < bestD) { bestD = d; best = r; }
      }
      return best;
    }

    function regionSummary(region) {
      const ll = lifeLevel(), cl = civLevel();
      if (state.collapse && region.ruin) return '旧文明の痕跡あり / 再野生化進行';
      if (cl >= 7 && region.city) return '宇宙港・軌道施設あり';
      if (cl >= 5 && region.city) return '高密度都市圏 / 環境負荷あり';
      if (cl >= 3 && region.city) return '都市文明圏 / 交易と政治の中心';
      if (cl >= 2 && region.city) return '初期定住地 / 農耕と集落';
      if (ll >= 8) return '知性候補の活動圏';
      if (ll >= 6) return '大型生物が繁栄';
      if (ll >= 3) return region.isOcean ? '微生物・海洋生命が拡大' : '地衣類と初期陸上生命';
      return '生命の兆候は薄い';
    }

    function regionDetails(region) {
      const species = state.intelligence;
      const speciesLine = species ? `${species.speciesName}（${species.name}）` : '未出現';
      let note = '';
      if (region.ruin) note = 'かつて文明の中心地でしたが、崩壊後は廃墟と二次生態系が混在しています。';
      else if (region.city) note = `${species ? species.city : '地域都市'} が形成されています。土地の名称も文明段階に応じて更新されています。`;
      else if (lifeLevel() >= 8) note = '道具使用や群れ行動を持つ生物が観測される可能性があります。';
      else if (lifeLevel() >= 5) note = '生命圏が厚くなり、捕食・防御・繁殖戦略の競争が進んでいます。';
      else note = 'まだ文明の気配はありません。地形と気候が今後の進化圧になります。';
      return { speciesLine, note };
    }

    function selectRegion(region, show = true) {
      if (!region) return;
      state.selectedRegionId = region.id;
      if (show) showWipe(region);
      updateAll();
    }

    function showWipe(region) {
      drawWipeScene(region);
      $('wipeName').textContent = region.currentName;
      $('wipeLine').textContent = `${region.climate} / ${regionSummary(region)}`;
      $('wipe').classList.add('show');
    }

    function hideWipe() {
      $('wipe').classList.remove('show');
    }

    function pinSelected() {
      const id = state.selectedRegionId;
      if (id == null) return;
      if (state.pinnedRegionIds.includes(id)) return;
      if (state.pinnedRegionIds.length >= 3) {
        alert('観測ワイプは最大3つまでです。新しく追加するには、どれか1つを閉じてください。');
        return;
      }
      state.pinnedRegionIds.push(id);
      state.dirty = true;
      updatePins();
      saveState(false);
    }

    function unpin(id) {
      state.pinnedRegionIds = state.pinnedRegionIds.filter(x => x !== id);
      state.dirty = true;
      updatePins();
      saveState(false);
    }

    function updateAll() {
      $('planetName').textContent = state.name;
      $('ageText').textContent = '経過 ' + formatAge(state.age);
      $('lifeStageText').textContent = getStage(LIFE_STAGES, state.age).label;
      $('civStageText').textContent = state.collapse ? '文明崩壊後' : getStage(CIV_STAGES, state.age).label;
      $('speciesText').textContent = state.intelligence ? state.intelligence.speciesName : '未出現';
      const risk = riskValue();
      $('riskText').textContent = risk < 30 ? `低 ${risk}%` : risk < 62 ? `中 ${risk}%` : `高 ${risk}%`;
      $('speedDisplay').innerHTML = `<b>${SPEED_LABELS[state.speedIndex]}</b><small>${SPEED_HELP[state.speedIndex]}</small>`;
      $('pauseBtn').textContent = state.paused || state.speedIndex === 0 ? '▶ 再開' : '⏸ 一時停止';
      document.querySelectorAll('.modePanel button').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
      updatePins();
      updateDetailPanel();
      updateLogs();
    }

    function updatePins() {
      const tray = $('pinTray');
      $('pinCount').textContent = `${state.pinnedRegionIds.length}/3`;
      tray.classList.toggle('show', state.pinnedRegionIds.length > 0);
      const list = $('pinList');
      list.innerHTML = '';
      for (const id of state.pinnedRegionIds) {
        const r = state.regions.find(x => x.id === id);
        if (!r) continue;
        const div = document.createElement('div');
        div.className = 'pinCard';
        div.innerHTML = `<div class="pinName">${escapeHtml(r.currentName)}</div><div class="pinState">${escapeHtml(regionSummary(r))}</div><button data-unpin="${r.id}">閉じる</button>`;
        div.addEventListener('click', (e) => {
          if (e.target.dataset.unpin != null) return;
          selectRegion(r);
          state.mode = 'region';
          updateAll();
        });
        list.appendChild(div);
      }
      list.querySelectorAll('[data-unpin]').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); unpin(Number(btn.dataset.unpin)); }));
    }

    function updateDetailPanel() {
      const panel = $('detailPanel');
      if (state.mode === 'planet') {
        const env = state.env;
        panel.innerHTML = `
          <div class="detailHeader"><h2>惑星観察モード</h2><span class="tag">全体</span></div>
          <div class="infoGrid">
            <div class="infoItem"><small>海洋率</small><b>${Math.round(env.ocean*100)}%</b></div>
            <div class="infoItem"><small>重力</small><b>${env.gravity.toFixed(2)}G</b></div>
            <div class="infoItem"><small>気候傾向</small><b>${env.temperature > .66 ? '高温' : env.temperature < .33 ? '寒冷' : '温和'}・${env.humidity > .62 ? '湿潤' : env.humidity < .35 ? '乾燥' : '中庸'}</b></div>
            <div class="infoItem"><small>地殻活動</small><b>${env.tectonics > .65 ? '活発' : env.tectonics < .3 ? '静穏' : '中程度'}</b></div>
            <div class="infoItem wide"><small>観測メモ</small><p class="desc">惑星をスワイプで回転、表面をタップすると地域ワイプが開きます。気になる場所は最大3つまでピン留めできます。</p></div>
          </div>`;
        return;
      }
      if (state.mode === 'region') {
        const r = state.regions.find(x => x.id === state.selectedRegionId) || state.regions[0];
        if (!r) return;
        const d = regionDetails(r);
        panel.innerHTML = `
          <div class="detailHeader"><h2>${escapeHtml(r.currentName)}</h2><span class="tag">地域</span></div>
          <div class="infoGrid">
            <div class="infoItem"><small>旧名履歴</small><b>${escapeHtml(r.historyNames.slice(-3).join(' → '))}</b></div>
            <div class="infoItem"><small>気候/地形</small><b>${escapeHtml(r.climate)}・${r.isOcean ? '海洋/沿岸' : '陸域'}</b></div>
            <div class="infoItem"><small>支配文明種</small><b>${escapeHtml(d.speciesLine)}</b></div>
            <div class="infoItem"><small>状態</small><b>${escapeHtml(regionSummary(r))}</b></div>
            <div class="infoItem wide"><small>地域メモ</small><p class="desc">${escapeHtml(d.note)}</p></div>
          </div>`;
        return;
      }
      if (state.mode === 'biosphere') {
        const species = state.intelligence;
        panel.innerHTML = `
          <div class="detailHeader"><h2>生命圏観察モード</h2><span class="tag">進化</span></div>
          <div class="bars">
            ${barHtml('生物多様性', avg(state.regions.map(r=>r.biodiversity)))}
            ${barHtml('環境安定度', state.env.stability)}
            ${barHtml('社会性圧', state.env.socialPressure)}
            ${barHtml('災害圧', state.env.disaster)}
          </div>
          <div class="infoGrid" style="margin-top:10px">
            <div class="infoItem wide"><small>文明種候補/出現種</small><b>${species ? `${escapeHtml(species.speciesName)}：${escapeHtml(species.traits.join('・'))}` : 'まだ知性候補の選抜前です。生命圏が進むと、惑星環境に応じて文明担当が決まります。'}</b></div>
            <div class="infoItem wide"><small>文明への影響</small><p class="desc">${species ? escapeHtml(species.culture) : '哺乳系・爬虫系・鳥類系・節足系・海洋頭足系・菌類群体などから候補が出ます。'}</p></div>
          </div>`;
        return;
      }
      if (state.mode === 'record') {
        const lifeLogs = state.logs.filter(l => l.type === 'life').length;
        const civLogs = state.logs.filter(l => l.type === 'civ').length;
        const planetLogs = state.logs.filter(l => l.type === 'planet').length;
        panel.innerHTML = `
          <div class="detailHeader"><h2>観測記録</h2><span class="tag">日誌</span></div>
          <div class="infoGrid">
            <div class="infoItem"><small>生命ログ</small><b>${lifeLogs}件</b></div>
            <div class="infoItem"><small>文明ログ</small><b>${civLogs}件</b></div>
            <div class="infoItem"><small>惑星ログ</small><b>${planetLogs}件</b></div>
            <div class="infoItem"><small>命名済地域</small><b>${state.regions.filter(r=>r.historyNames.length>1).length}地域</b></div>
            <div class="infoItem wide"><small>現在の読みどころ</small><p class="desc">${escapeHtml(currentHighlight())}</p></div>
          </div>`;
      }
    }

    function currentHighlight() {
      if (state.collapse) return '文明崩壊後の再野生化と旧都市跡の変化を観測できます。';
      if (civLevel() >= 7) return '宇宙進出段階です。グレートフィルターを越えられるかが焦点です。';
      if (civLevel() >= 3) return '地域名・都市圏・勢力圏が変化しています。地名履歴を見ると土地の年代記が見えます。';
      if (state.intelligence) return '知的生命体が出現しました。文明発祥地になりそうな地域を探してみてください。';
      if (lifeLevel() >= 6) return '大型生物と知性候補の前段階です。地域ごとの生物相が変化しています。';
      return '生命誕生前後の長期観測中です。時間速度を上げると進化イベントが見えやすくなります。';
    }

    function barHtml(label, v) {
      const pct = Math.round(clamp(v,0,1)*100);
      return `<div class="barLine"><span>${label}</span><div class="barTrack"><div class="barFill" style="width:${pct}%"></div></div><span>${pct}%</span></div>`;
    }

    function updateLogs() {
      const list = $('logList');
      const logs = state.logs.filter(l => state.logFilter === 'all' || l.type === state.logFilter).slice(0, state.mode === 'record' ? 80 : 18);
      $('logCount').textContent = `${state.logs.length}件`;
      list.innerHTML = logs.map(l => `
        <div class="logItem">
          <div class="logAge">${formatAge(l.age)}</div>
          <div class="logText"><b>${escapeHtml(l.title)}</b><br>${escapeHtml(l.text)}</div>
        </div>`).join('') || '<div class="logText">まだ記録がありません。</div>';
      document.querySelectorAll('.logFilters button').forEach(b => b.classList.toggle('active', b.dataset.log === state.logFilter));
    }

    function avg(arr) { return arr.reduce((a,b)=>a+b,0) / Math.max(1, arr.length); }
    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
    }

    function saveState(showToast = true) {
      try {
        if (showToast) {
          state.logs.unshift({ type: 'planet', title: '保存', text: '現在の観測データをこの端末に保存しました。', age: state.age, important: false });
          if (state.logs.length > 180) state.logs.length = 180;
        }
        const data = {
          ...state,
          milestones: Array.from(state.milestones)
        };
        localStorage.setItem('sousei-nisshi-save-v1', JSON.stringify(data));
        state.lastSave = performance.now();
        state.dirty = false;
        if (showToast) updateAll();
      } catch (e) {
        if (showToast) alert('保存に失敗しました。ブラウザの保存領域が使えない可能性があります。');
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem('sousei-nisshi-save-v1');
        if (!raw) return false;
        const data = JSON.parse(raw);
        Object.assign(state, data);
        state.milestones = new Set(data.milestones || []);
        state.dirty = false;
        return true;
      } catch (e) { return false; }
    }

    function setupEvents() {
      let dragging = false;
      let startX = 0, startY = 0, lastX = 0, lastY = 0, moved = false;

      function pointerDown(e) {
        dragging = true; moved = false;
        startX = lastX = e.clientX;
        startY = lastY = e.clientY;
        canvas.setPointerCapture?.(e.pointerId);
      }
      function pointerMove(e) {
        if (!dragging) return;
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        if (Math.abs(e.clientX - startX) + Math.abs(e.clientY - startY) > 8) moved = true;
        state.rotY += dx * 0.008;
        state.rotX = clamp(state.rotX + dy * 0.005, -0.75, 0.75);
        lastX = e.clientX; lastY = e.clientY;
      }
      function pointerUp(e) {
        if (!dragging) return;
        dragging = false;
        if (!moved) {
          const r = pointToRegion(e.clientX, e.clientY);
          if (r) selectRegion(r, true);
        }
      }
      canvas.addEventListener('pointerdown', pointerDown);
      canvas.addEventListener('pointermove', pointerMove);
      canvas.addEventListener('pointerup', pointerUp);
      canvas.addEventListener('pointercancel', () => dragging = false);

      $('speedDown').addEventListener('click', () => { state.speedIndex = clamp(state.speedIndex - 1, 0, SPEEDS.length - 1); state.paused = state.speedIndex === 0; updateAll(); });
      $('speedUp').addEventListener('click', () => { state.speedIndex = clamp(state.speedIndex + 1, 0, SPEEDS.length - 1); state.paused = false; updateAll(); });
      $('pauseBtn').addEventListener('click', () => {
        if (state.paused || state.speedIndex === 0) { state.speedIndex = state.lastSpeedIndex || 5; state.paused = false; }
        else { state.lastSpeedIndex = state.speedIndex; state.paused = true; }
        updateAll();
      });
      $('normalBtn').addEventListener('click', () => { state.speedIndex = 4; state.paused = false; updateAll(); });
      $('fastBtn').addEventListener('click', () => { state.speedIndex = 7; state.paused = false; updateAll(); });
      $('pinBtn').addEventListener('click', pinSelected);
      $('detailBtn').addEventListener('click', () => { state.mode = 'region'; updateAll(); });
      $('closeWipeBtn').addEventListener('click', hideWipe);
      $('saveBtn').addEventListener('click', () => saveState(true));
      $('resetBtn').addEventListener('click', () => {
        if (confirm('新しい惑星で観測を開始しますか？現在の自動保存は上書きされます。')) makePlanet();
      });
      document.querySelectorAll('.modePanel button').forEach(btn => btn.addEventListener('click', () => { state.mode = btn.dataset.mode; updateAll(); }));
      document.querySelectorAll('.logFilters button').forEach(btn => btn.addEventListener('click', () => { state.logFilter = btn.dataset.log; updateLogs(); }));
    }

    let last = performance.now();
    let lastUiUpdate = 0;
    function loop(now) {
      const dt = Math.min(0.08, (now - last) / 1000);
      last = now;
      tick(dt);
      drawPlanet();
      if (state.selectedRegionId != null && $('wipe').classList.contains('show')) {
        const r = state.regions.find(x => x.id === state.selectedRegionId);
        if (r) {
          $('wipeName').textContent = r.currentName;
          $('wipeLine').textContent = `${r.climate} / ${regionSummary(r)}`;
          drawWipeScene(r);
        }
      }
      // 低頻度のUI更新。毎フレームDOM更新するとスマホで重くなるため。
      if (now - lastUiUpdate > 500) {
        updateAll();
        lastUiUpdate = now;
      }
      requestAnimationFrame(loop);
    }

    function initialUiRefresh() {
      updateAll();
      const r = state.regions[0];
      if (r) selectRegion(r, false);
    }

    setupEvents();
    if (!loadState()) makePlanet();
    else initialUiRefresh();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
