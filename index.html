<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>創星日誌 - 生命圏観測シミュレーター</title>
  <style>
    :root {
      --bg0: #050816;
      --bg1: #0b1633;
      --panel: rgba(12, 20, 45, 0.82);
      --panel2: rgba(18, 32, 68, 0.72);
      --line: rgba(158, 190, 255, 0.22);
      --line2: rgba(255, 255, 255, 0.12);
      --text: #edf5ff;
      --muted: #9fb2d8;
      --subtle: #7082aa;
      --gold: #ffd976;
      --cyan: #7ee8ff;
      --green: #9dffb2;
      --red: #ff8a9d;
      --purple: #c6a6ff;
      --shadow: 0 18px 55px rgba(0,0,0,.42);
      --radius: 22px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 20% 0%, rgba(79, 118, 255, .28), transparent 28%),
        radial-gradient(circle at 80% 12%, rgba(138, 64, 255, .20), transparent 22%),
        linear-gradient(160deg, #030511 0%, #08142f 48%, #050816 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.55) 0 1px, transparent 1.7px),
        radial-gradient(circle, rgba(126,232,255,.30) 0 1px, transparent 1.6px);
      background-size: 82px 82px, 137px 137px;
      background-position: 0 0, 24px 52px;
      opacity: .18;
      mask-image: linear-gradient(to bottom, black, transparent 86%);
    }

    .app {
      width: min(100%, 520px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: calc(12px + env(safe-area-inset-top)) 12px calc(92px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 8px 6px 0;
    }

    .titleBlock { min-width: 0; }
    .appTitle {
      margin: 0;
      font-size: 22px;
      letter-spacing: .06em;
      line-height: 1.05;
      font-weight: 850;
    }
    .appSub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .miniBtns { display: flex; gap: 7px; flex-shrink: 0; }
    button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.07);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 750;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,.16);
      touch-action: manipulation;
    }
    button:active { transform: translateY(1px) scale(.99); }
    button.primary { background: linear-gradient(135deg, rgba(126,232,255,.22), rgba(198,166,255,.18)); border-color: rgba(126,232,255,.36); }
    button.warn { background: rgba(255,138,157,.12); border-color: rgba(255,138,157,.26); }

    .planetCard {
      position: relative;
      background: linear-gradient(180deg, rgba(13, 23, 55, .78), rgba(7, 13, 29, .70));
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 356px;
    }

    .planetCard::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,.10), transparent 22%, transparent 70%, rgba(126,232,255,.08));
      mix-blend-mode: screen;
    }

    #planetCanvas {
      display: block;
      width: 100%;
      height: 356px;
      touch-action: none;
      user-select: none;
    }

    .planetHint {
      position: absolute;
      left: 14px;
      top: 12px;
      z-index: 2;
      display: flex;
      gap: 6px;
      align-items: center;
      color: rgba(237,245,255,.72);
      font-size: 12px;
      background: rgba(3, 7, 18, .36);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 999px;
      padding: 7px 10px;
      backdrop-filter: blur(10px);
    }

    .ageBadge {
      position: absolute;
      right: 14px;
      top: 12px;
      z-index: 3;
      text-align: right;
      background: rgba(3, 7, 18, .42);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px;
      padding: 8px 10px;
      backdrop-filter: blur(10px);
      max-width: 190px;
    }
    .ageBadge .planetName { font-size: 13px; color: var(--gold); font-weight: 850; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ageBadge .age { margin-top: 2px; font-size: 11px; color: var(--muted); }

    .wipe {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 5;
      width: min(46%, 210px);
      min-height: 152px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(5, 9, 20, .72);
      box-shadow: 0 18px 45px rgba(0,0,0,.38);
      backdrop-filter: blur(14px);
      transform: translateY(10px);
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
    }
    .wipe.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
    .wipeScene {
      height: 76px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(#1b3159, #0b172e);
    }
    .wipeScene canvas { width: 100%; height: 100%; display: block; }
    .wipeBody { padding: 9px 10px 10px; }
    .wipeName { font-size: 13px; font-weight: 850; line-height: 1.2; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wipeLine { margin-top: 3px; font-size: 11px; line-height: 1.35; color: var(--muted); }
    .wipeActions { display: flex; gap: 6px; margin-top: 8px; }
    .wipeActions button { padding: 6px 8px; font-size: 11px; flex: 1; }

    .statusPanel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .statBox, .controlPanel, .modePanel, .detailPanel, .logPanel, .pinTray {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
      backdrop-filter: blur(18px);
    }
    .statBox { padding: 11px 12px; min-width: 0; }
    .statLabel { color: var(--subtle); font-size: 11px; margin-bottom: 4px; }
    .statValue { font-size: 14px; line-height: 1.25; font-weight: 820; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .statValue.cyan { color: var(--cyan); }
    .statValue.gold { color: var(--gold); }
    .statValue.green { color: var(--green); }
    .statValue.red { color: var(--red); }

    .controlPanel { padding: 11px; display: grid; gap: 10px; }
    .speedRow { display: grid; grid-template-columns: 48px 1fr 48px; gap: 9px; align-items: center; }
    .speedRow button { height: 44px; font-size: 18px; padding: 0; }
    .speedDisplay {
      min-height: 44px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(255,255,255,.06);
      line-height: 1.05;
    }
    .speedDisplay b { font-size: 15px; color: var(--cyan); }
    .speedDisplay small { margin-top: 3px; color: var(--subtle); font-size: 10px; }
    .quickRow { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .quickRow button { padding: 10px 6px; font-size: 12px; }
    .timeStyleBox { border: 1px solid rgba(255,255,255,.10); border-radius: 14px; background: rgba(255,255,255,.03); padding: 8px; }
    .timeStyleBox summary { cursor: pointer; color: var(--muted); font-size: 11px; }
    .styleRow { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
    .styleRow button { padding: 7px 6px; font-size: 11px; box-shadow: none; }
    .styleState { margin-top: 7px; font-size: 10px; color: var(--subtle); }
    .modalPauseNote { margin-top: 5px; font-size: 10px; color: var(--gold); display: none; }
    .modalPauseNote.show { display: block; }

    .modePanel { padding: 8px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; position: sticky; top: calc(8px + env(safe-area-inset-top)); z-index: 8; background: rgba(8, 15, 34, .92); border: 1px solid var(--line); border-radius: 18px; backdrop-filter: blur(12px); }
    .modePanel button { padding: 10px 4px; font-size: 12px; border-radius: 15px; box-shadow: none; }
    .modePanel button.active { background: linear-gradient(135deg, rgba(255,217,118,.22), rgba(126,232,255,.16)); border-color: rgba(255,217,118,.38); color: #fff5d6; }

    .pinTray { padding: 10px; display: none; }
    .pinTray.show { display: block; }
    .sectionTitle { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; }
    .sectionTitle b { font-size: 13px; color: var(--gold); }
    .sectionTitle span { color: var(--subtle); font-size: 11px; }
    .pinList { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .pinCard {
      min-width: 0;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      border-radius: 16px;
      padding: 8px;
    }
    .pinCard .pinName { font-size: 11px; font-weight: 850; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pinCard .pinState { margin-top: 4px; color: var(--muted); font-size: 10px; line-height: 1.25; min-height: 25px; }
    .pinCard button { margin-top: 7px; width: 100%; padding: 5px; font-size: 10px; }

    .detailPanel { padding: 13px; min-height: 184px; }
    .modeHint { color: var(--muted); font-size: 11px; margin: 0 0 8px; }
    .chipRow { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0 0; }
    .chip { font-size: 10px; color: var(--cyan); border: 1px solid rgba(126,232,255,.3); border-radius: 999px; padding: 3px 7px; }
    .fold { margin-top: 8px; border: 1px solid rgba(255,255,255,.10); border-radius: 12px; background: rgba(255,255,255,.03); }
    .fold summary { cursor: pointer; padding: 8px 10px; color: var(--muted); font-size: 11px; }
    .fold .foldBody { padding: 0 10px 10px; }
    .modeGuideCard { border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); border-radius: 12px; padding: 8px 10px; margin-bottom: 10px; color: var(--muted); font-size: 11px; line-height: 1.45; }
    .areaMapWrap { border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.03); border-radius: 14px; padding: 8px; margin-bottom: 10px; }
    .areaMapCanvas { width: 100%; height: 210px; border-radius: 10px; background: linear-gradient(180deg, #4d6f8b, #2f4f67); border: 1px solid rgba(255,255,255,.1); display:block; }
    .areaLayerRow { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 7px; }
    .areaLayerRow button { padding: 6px 4px; font-size: 10px; box-shadow: none; }
    .areaLayerRow button.active { background: rgba(126,232,255,.18); border-color: rgba(126,232,255,.34); }
    .areaSel { margin-top: 6px; color: var(--muted); font-size: 11px; }
    .assistBtns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
    .assistBtns button { padding: 7px 6px; font-size: 11px; box-shadow: none; }
    .detailHeader { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
    .detailHeader h2 { margin: 0; font-size: 16px; line-height: 1.25; }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      padding: 5px 8px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .infoGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .infoItem {
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.045);
      border-radius: 15px;
      padding: 9px;
      min-width: 0;
    }
    .infoItem small { display: block; color: var(--subtle); font-size: 10px; margin-bottom: 4px; }
    .infoItem b { display: block; font-size: 12px; line-height: 1.28; font-weight: 780; }
    .wide { grid-column: 1 / -1; }
    .desc { color: var(--muted); font-size: 12px; line-height: 1.55; margin: 0; }

    .bars { display: grid; gap: 8px; }
    .barLine { display: grid; grid-template-columns: 86px 1fr 34px; gap: 7px; align-items: center; font-size: 11px; color: var(--muted); }
    .barTrack { height: 8px; background: rgba(255,255,255,.08); border-radius: 999px; overflow: hidden; }
    .barFill { height: 100%; width: 50%; background: linear-gradient(90deg, var(--cyan), var(--gold)); border-radius: 999px; }

    .logPanel { padding: 13px; }
    .logFilters { display: flex; gap: 6px; margin-bottom: 8px; }
    .logFilters button { padding: 7px 9px; font-size: 11px; box-shadow: none; }
    .logFilters button.active { background: rgba(126,232,255,.18); border-color: rgba(126,232,255,.34); }
    .logList { display: grid; gap: 8px; max-height: 310px; overflow: auto; padding-right: 2px; }
    .logItem {
      display: grid;
      grid-template-columns: 72px 52px 1fr;
      gap: 9px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding-bottom: 8px;
    }
    .logAge { color: var(--gold); font-size: 10px; line-height: 1.25; }
    .logType { display:inline-block; font-size:9px; color: var(--subtle); border: 1px solid rgba(255,255,255,.14); border-radius: 999px; padding: 1px 5px; margin-right: 5px; vertical-align: 1px; }
    .logText { color: var(--muted); font-size: 12px; line-height: 1.42; }
    .logText b { color: var(--text); }
    .logThumb { width: 48px; height: 48px; border-radius: 10px; border: 1px solid rgba(255,255,255,.16); background: linear-gradient(135deg,#233b67,#18243f); overflow: hidden; position: relative; }
    .logThumb.subtle { opacity: .45; border-style: dashed; }
    .logThumb img { width: 100%; height: 100%; object-fit: cover; display:block; }
    .thumbFallback { width: 100%; height: 100%; display:flex; align-items:center; justify-content:center; font-size: 14px; color:#d8e6ff; }
    .eventModal { position: fixed; inset: 0; background: rgba(2,6,16,.72); display: none; align-items: center; justify-content: center; z-index: 40; padding: 12px; }
    .eventModal.show { display: flex; }
    .eventCard { width:min(100%,430px); background: rgba(10,18,40,.95); border:1px solid var(--line); border-radius: 16px; padding: 10px; }
    .eventPreview { height: 180px; border-radius: 12px; overflow: hidden; border:1px solid rgba(255,255,255,.15); margin-bottom: 8px; }
    .eventPreview img { width:100%; height:100%; object-fit:cover; display:block; }
    .eventActions { display:flex; gap:8px; margin-top:8px; }
    .eventActions button { flex:1; padding:8px; }

    .footerNote {
      color: rgba(159,178,216,.65);
      font-size: 10px;
      text-align: center;
      padding: 2px 8px 0;
      line-height: 1.5;
    }
    .eventToast {
      position: fixed;
      left: 50%;
      top: calc(56px + env(safe-area-inset-top));
      transform: translate(-50%, -8px);
      z-index: 30;
      background: rgba(6, 11, 26, .88);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 12px;
      padding: 8px 10px;
      min-width: 180px;
      max-width: min(92vw, 360px);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      font-size: 12px;
      color: var(--text);
    }
    .eventToast.show { opacity: 1; transform: translate(-50%, 0); }
    .eventToast .k { color: var(--cyan); font-size: 10px; margin-right: 6px; }
    .floatHud {
      position: fixed;
      left: 50%;
      top: calc(8px + env(safe-area-inset-top));
      transform: translateX(-50%);
      z-index: 25;
      background: rgba(8,14,30,.85);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      color: var(--text);
      display: none;
      pointer-events: none;
      white-space: nowrap;
      max-width: min(92vw, 680px);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .floatHud.show { display: block; }
    .crisisBar {
      position: fixed;
      left: 50%;
      bottom: calc(62px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 24;
      width: min(96vw, 760px);
      background: rgba(52,18,18,.92);
      border: 1px solid rgba(255,122,122,.4);
      border-radius: 12px;
      padding: 8px;
      display: none;
    }
    .crisisBar.show { display: block; }
    .crisisBar .line { font-size: 11px; color: #ffd2d2; }
    .crisisBar .actions { margin-top: 6px; display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
    .crisisBar .actions button { padding: 7px 4px; font-size: 11px; box-shadow: none; }
    .pointHud { display: none !important; }
    .floatHud.warn { color: #ffd3d3; border-color: rgba(255,122,122,.5); }
    .floatHud.ptsWarn { color: #ffd9a8; border-color: rgba(255,190,120,.55); }
    .interveneGrid { display: grid; gap: 7px; margin-top: 8px; }
    .interveneGroup { border: 1px solid rgba(255,255,255,.10); border-radius: 10px; padding: 7px; }
    .interveneGroup b { font-size: 11px; color: var(--muted); }
    .interveneBtns { margin-top: 6px; display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .interveneBtns button { padding:7px 6px; font-size:11px; box-shadow:none; }
    .interveneBtns .warn { background: rgba(255,138,157,.16); }
    .devTestWrap { margin-top: 8px; }
    .devGrid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .devGrid button { padding:7px 6px; font-size:11px; box-shadow:none; }

    @media (max-width: 759px) {
      .modePanel {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(8px + env(safe-area-inset-bottom));
        top: auto;
        width: min(96vw, 520px);
        z-index: 22;
      }
    }
    @media (max-width: 430px) {
      body { padding-left: 10px; padding-right: 10px; }
      .app { gap: 8px; }
      .planetCard { min-height: 350px; }
      #planetCanvas { height: 350px; }
      .modePanel { width: min(96vw, 412px); padding: 7px; gap: 5px; }
      .modePanel button { padding: 10px 3px; font-size: 11px; }
      .floatHud { left: 10px; right: 10px; top: calc(6px + env(safe-area-inset-top)); font-size: 10px; }
      .crisisBar { left: 10px; right: 10px; width: auto; bottom: calc(58px + env(safe-area-inset-bottom)); }
      .eventModal { padding: 8px; }
      .eventCard { max-height: 88vh; border-radius: 14px; }
      .interveneBtns { grid-template-columns: 1fr; }
      .devGrid { grid-template-columns: 1fr; }
      .infoGrid { grid-template-columns: 1fr; }
      .wide { grid-column: auto; }
    }

    @media (min-width: 760px) {
      .app { width: min(100%, 760px); }
      .lowerGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: start; }
      .planetCard { min-height: 430px; }
      #planetCanvas { height: 430px; }
    }
    @media (orientation: landscape) and (min-width: 900px) {
      .app { width: min(100%, 1200px); }
      .mainLandscape { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: start; }
      .mainLandscape .planetCard { min-height: 72vh; }
      .mainLandscape #planetCanvas { height: 72vh; min-height: 420px; }
      .mainLandscape .lowerGrid { display: block; }
      .floatHud { max-width: 52vw; }
      .crisisBar { width: min(52vw, 680px); left: calc(74%); transform: translateX(-50%); }
    }

    @media (max-width: 380px) {
      .appTitle { font-size: 19px; }
      .planetCard { min-height: 336px; }
      #planetCanvas { height: 336px; }
      .wipe { width: 52%; }
      .infoGrid { grid-template-columns: 1fr; }
      .wide { grid-column: auto; }
      .pinList { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="eventToast" id="eventToast"></div>
    <div class="pointHud" id="pointHud">観測点 0</div>
    <div class="floatHud" id="floatHud">観測点 0 / GF 未発生 / 経過 0年</div>
    <div class="crisisBar" id="crisisBar">
      <div class="line" id="crisisMain">⚠ グレートフィルター兆候</div>
      <div class="line" id="crisisSub">詳細待機中</div>
      <div class="actions">
        <button id="gfActBtn">介入</button>
        <button id="gfDetailBtn">詳細</button>
        <button id="gfSkipBtn">見送る</button>
      </div>
    </div>
    <div class="eventModal" id="eventModal">
      <div class="eventCard">
        <div class="eventPreview" id="eventPreview"></div>
        <div class="logText"><span class="logType" id="eventType"></span><b id="eventTitle"></b></div>
        <div class="logAge" id="eventAge"></div>
        <p class="desc" id="eventBody"></p>
        <div class="eventActions">
          <button id="eventRegionBtn">地域を見る</button>
          <button id="eventCloseBtn">閉じる</button>
        </div>
      </div>
    </div>
    <header class="topbar">
      <div class="titleBlock">
        <h1 class="appTitle">創星日誌</h1>

    function civPhaseText() {
      if (!state.intelligence) return '文明未発生';

      if (cl >= 7) return '宇宙進出・星間準備';

    }

    function getObservationPoints() {
      const s = state || {};
      return Number(s.observationPoints ?? s.points ?? s.observePoints ?? 0) || 0;

    function getGreatFilterStateObject() {
      return state.greatFilterState || state.greatFilter || null;

    function getGreatFilterLabel(gf = getGreatFilterStateObject()) {
      if (!gf) return '未発生';
      const map = { climate: '気候崩壊', war: '惑星規模戦争', ai: '自動化暴走', resource: '資源枯渇', cosmic: '宇宙災害', biological: '生命圏崩壊' };
