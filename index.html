<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>創星日誌 - 生命圏観測シミュレーター</title>
  <style>
    :root {
      --bg0: #050816;
      --panel: rgba(12, 20, 45, 0.84);
      --panel2: rgba(18, 32, 68, 0.74);
      --line: rgba(158, 190, 255, 0.22);
      --line2: rgba(255, 255, 255, 0.12);
      --text: #edf5ff;
      --muted: #9fb2d8;
      --subtle: #7082aa;
      --gold: #ffd976;
      --cyan: #7ee8ff;
      --green: #9dffb2;
      --red: #ff8a9d;
      --purple: #c6a6ff;
      --shadow: 0 18px 55px rgba(0,0,0,.42);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 20% 0%, rgba(79, 118, 255, .28), transparent 28%),
        radial-gradient(circle at 80% 12%, rgba(138, 64, 255, .20), transparent 22%),
        linear-gradient(160deg, #030511 0%, #08142f 48%, #050816 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.55) 0 1px, transparent 1.7px),
        radial-gradient(circle, rgba(126,232,255,.30) 0 1px, transparent 1.6px);
      background-size: 82px 82px, 137px 137px;
      background-position: 0 0, 24px 52px;
      opacity: .18;
      mask-image: linear-gradient(to bottom, black, transparent 86%);
    }

    .app {
      width: min(100%, 540px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: calc(12px + env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 8px 6px 0;
    }

    .titleBlock {
      min-width: 0;
    }

    .appTitle {
      margin: 0;
      font-size: 22px;
      letter-spacing: .06em;
      line-height: 1.05;
      font-weight: 850;
    }

    .appSub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .miniBtns {
      display: flex;
      gap: 7px;
      flex-shrink: 0;
    }

    button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.07);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 750;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,.16);
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(1px) scale(.99);
    }

    button.primary {
      background: linear-gradient(135deg, rgba(126,232,255,.22), rgba(198,166,255,.18));
      border-color: rgba(126,232,255,.36);
    }

    button.warn {
      background: rgba(255,138,157,.12);
      border-color: rgba(255,138,157,.26);
    }

    button.locked {
      opacity: .45;
      filter: grayscale(.5);
    }

    .gameLayout {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .leftPane,
    .rightPane {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    .planetCard {
      position: relative;
      background: linear-gradient(180deg, rgba(13, 23, 55, .78), rgba(7, 13, 29, .70));
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 356px;
    }

    .planetCard::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,.10), transparent 22%, transparent 70%, rgba(126,232,255,.08));
      mix-blend-mode: screen;
    }

    #planetCanvas {
      display: block;
      width: 100%;
      height: 356px;
      touch-action: none;
      user-select: none;
    }

    .planetHint {
      position: absolute;
      left: 14px;
      top: 12px;
      z-index: 2;
      color: rgba(237,245,255,.74);
      font-size: 11px;
      background: rgba(3, 7, 18, .38);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 999px;
      padding: 7px 10px;
      backdrop-filter: blur(10px);
    }

    .ageBadge {
      position: absolute;
      right: 14px;
      top: 12px;
      z-index: 3;
      text-align: right;
      background: rgba(3, 7, 18, .44);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px;
      padding: 8px 10px;
      backdrop-filter: blur(10px);
      max-width: 190px;
    }

    .ageBadge .planetName {
      font-size: 13px;
      color: var(--gold);
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ageBadge .age {
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
    }

    .wipe {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 5;
      width: min(48%, 218px);
      min-height: 156px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(5, 9, 20, .76);
      box-shadow: 0 18px 45px rgba(0,0,0,.38);
      backdrop-filter: blur(14px);
      transform: translateY(10px);
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
    }

    .wipe.show {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .wipeScene {
      height: 76px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(#1b3159, #0b172e);
    }

    .wipeScene canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .wipeBody {
      padding: 9px 10px 10px;
    }

    .wipeName {
      font-size: 13px;
      font-weight: 850;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wipeLine {
      margin-top: 3px;
      font-size: 11px;
      line-height: 1.35;
      color: var(--muted);
    }

    .wipeActions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .wipeActions button {
      padding: 6px 8px;
      font-size: 11px;
      flex: 1;
    }

    .statusPanel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .statBox,
    .controlPanel,
    .modePanel,
    .detailPanel,
    .logPanel,
    .pinTray {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
      backdrop-filter: blur(18px);
    }

    .statBox {
      padding: 11px 12px;
      min-width: 0;
    }

    .statLabel {
      color: var(--subtle);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .statValue {
      font-size: 14px;
      line-height: 1.25;
      font-weight: 820;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cyan { color: var(--cyan); }
    .gold { color: var(--gold); }
    .green { color: var(--green); }
    .red { color: var(--red); }
    .purple { color: var(--purple); }

    .controlPanel {
      padding: 11px;
      display: grid;
      gap: 10px;
    }

    .speedRow {
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      gap: 9px;
      align-items: center;
    }

    .speedRow button {
      height: 44px;
      font-size: 18px;
      padding: 0;
    }

    .speedDisplay {
      min-height: 44px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(255,255,255,.06);
      line-height: 1.05;
    }

    .speedDisplay b {
      font-size: 15px;
      color: var(--cyan);
    }

    .speedDisplay small {
      margin-top: 3px;
      color: var(--subtle);
      font-size: 10px;
    }

    .quickRow {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .quickRow button {
      padding: 10px 6px;
      font-size: 12px;
    }

    .timeStyleBox,
    .interventionBox {
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      padding: 8px;
    }

    .timeStyleBox summary,
    .interventionBox summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 11px;
    }

    .styleRow,
    .interventionGrid,
    .observerGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
    }

    .styleRow button,
    .interventionGrid button,
    .observerGrid button {
      padding: 7px 6px;
      font-size: 11px;
      box-shadow: none;
    }

    .styleState {
      margin-top: 7px;
      font-size: 10px;
      color: var(--subtle);
      line-height: 1.45;
    }

    .modePanel {
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      position: sticky;
      top: calc(8px + env(safe-area-inset-top));
      z-index: 8;
      background: rgba(8, 15, 34, .92);
      border-radius: 18px;
      backdrop-filter: blur(12px);
    }

    .modePanel button {
      padding: 10px 4px;
      font-size: 12px;
      border-radius: 15px;
      box-shadow: none;
    }

    .modePanel button.active {
      background: linear-gradient(135deg, rgba(255,217,118,.22), rgba(126,232,255,.16));
      border-color: rgba(255,217,118,.38);
      color: #fff5d6;
    }

    .pinTray {
      padding: 10px;
      display: none;
    }

    .pinTray.show {
      display: block;
    }

    .sectionTitle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .sectionTitle b {
      font-size: 13px;
      color: var(--gold);
    }

    .sectionTitle span {
      color: var(--subtle);
      font-size: 11px;
    }

    .pinList {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .pinCard {
      min-width: 0;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      border-radius: 16px;
      padding: 8px;
    }

    .pinName {
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pinState {
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.25;
      min-height: 25px;
    }

    .pinCard button {
      margin-top: 7px;
      width: 100%;
      padding: 5px;
      font-size: 10px;
    }

    .detailPanel {
      padding: 13px;
      min-height: 184px;
    }

    .detailHeader {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .detailHeader h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      padding: 5px 8px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .modeGuide {
      display: grid;
      gap: 7px;
      margin: 8px 0 10px;
    }

    .guideCard {
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      padding: 8px;
      background: rgba(255,255,255,.04);
    }

    .guideCard b {
      display: block;
      font-size: 12px;
      margin-bottom: 2px;
    }

    .guideCard small {
      color: var(--muted);
      line-height: 1.35;
      font-size: 11px;
    }

    .modeHint {
      color: var(--muted);
      font-size: 11px;
      margin: 0 0 8px;
      line-height: 1.5;
    }

    .infoGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .infoItem {
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.045);
      border-radius: 15px;
      padding: 9px;
      min-width: 0;
    }

    .infoItem small {
      display: block;
      color: var(--subtle);
      font-size: 10px;
      margin-bottom: 4px;
    }

    .infoItem b {
      display: block;
      font-size: 12px;
      line-height: 1.28;
      font-weight: 780;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      margin: 0;
    }

    .bars {
      display: grid;
      gap: 8px;
    }

    .barLine {
      display: grid;
      grid-template-columns: 86px 1fr 34px;
      gap: 7px;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }

    .barTrack {
      height: 8px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .barFill {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, var(--cyan), var(--gold));
      border-radius: 999px;
    }

    .chipRow {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 8px 0 0;
    }

    .chip {
      font-size: 10px;
      color: var(--cyan);
      border: 1px solid rgba(126,232,255,.3);
      border-radius: 999px;
      padding: 3px 7px;
    }

    .fold {
      margin-top: 8px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 12px;
      background: rgba(255,255,255,.03);
    }

    .fold summary {
      cursor: pointer;
      padding: 8px 10px;
      color: var(--muted);
      font-size: 11px;
    }

    .fold .foldBody {
      padding: 0 10px 10px;
    }

    .areaMapWrap {
      position: relative;
      margin: 8px 0 10px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
    }

    #areaMapCanvas {
      display: block;
      width: 100%;
      height: 260px;
      background: #123;
    }

    .mapLegend {
      position: absolute;
      left: 9px;
      bottom: 8px;
      z-index: 2;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      max-width: calc(100% - 18px);
    }

    .mapLegend span {
      font-size: 9px;
      color: rgba(237,245,255,.78);
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(4,8,18,.45);
      border-radius: 999px;
      padding: 3px 6px;
      backdrop-filter: blur(8px);
    }

    .logPanel {
      padding: 13px;
    }

    .logFilters {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .logFilters button {
      padding: 7px 9px;
      font-size: 11px;
      box-shadow: none;
    }

    .logFilters button.active {
      background: rgba(126,232,255,.18);
      border-color: rgba(126,232,255,.34);
    }

    .logList {
      display: grid;
      gap: 8px;
      max-height: 310px;
      overflow: auto;
      padding-right: 2px;
    }

    .logItem {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 9px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding-bottom: 8px;
    }

    .logAge {
      color: var(--gold);
      font-size: 10px;
      line-height: 1.25;
    }

    .logType {
      display: inline-block;
      font-size: 9px;
      color: var(--subtle);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      padding: 1px 5px;
      margin-right: 5px;
      vertical-align: 1px;
    }

    .logText {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .logText b {
      color: var(--text);
    }

    .toast {
      position: fixed;
      left: 50%;
      top: calc(56px + env(safe-area-inset-top));
      transform: translate(-50%, -8px);
      z-index: 50;
      background: rgba(6, 11, 26, .9);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 12px;
      padding: 8px 10px;
      min-width: 180px;
      max-width: min(92vw, 380px);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      font-size: 12px;
      color: var(--text);
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .eventModal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(2,6,16,.72);
      padding: 14px;
    }

    .eventModal.show {
      display: flex;
    }

    .eventCard {
      width: min(100%, 460px);
      background: rgba(10,18,40,.96);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .journalBox {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.045);
      border-radius: 16px;
      padding: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      max-height: 420px;
      overflow: auto;
    }

    .endingBanner {
      border: 1px solid rgba(255,217,118,.24);
      background: linear-gradient(135deg, rgba(255,217,118,.12), rgba(126,232,255,.08));
      border-radius: 16px;
      padding: 10px;
      margin: 8px 0;
    }

    .endingBanner b {
      display: block;
      color: var(--gold);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .footerNote {
      color: rgba(159,178,216,.65);
      font-size: 10px;
      text-align: center;
      padding: 2px 8px 0;
      line-height: 1.5;
    }

    @media (max-width: 380px) {
      .appTitle { font-size: 19px; }
      .planetCard { min-height: 336px; }
      #planetCanvas { height: 336px; }
      .wipe { width: 54%; }
      .infoGrid { grid-template-columns: 1fr; }
      .wide { grid-column: auto; }
      .pinList { grid-template-columns: 1fr; }
      #areaMapCanvas { height: 230px; }
    }

    @media (orientation: landscape) and (min-width: 720px) {
      .app {
        width: min(100%, 1120px);
        min-height: 100dvh;
      }

      .gameLayout {
        display: grid;
        grid-template-columns: minmax(410px, 1.06fr) minmax(360px, .94fr);
        align-items: start;
      }

      .leftPane,
      .rightPane {
        min-height: calc(100dvh - 86px);
      }

      .planetCard {
        min-height: calc(100dvh - 255px);
      }

      #planetCanvas {
        height: calc(100dvh - 255px);
        min-height: 350px;
        max-height: 560px;
      }

      .modePanel {
        top: calc(8px + env(safe-area-inset-top));
      }

      .logList {
        max-height: 260px;
      }

      #areaMapCanvas {
        height: min(38dvh, 280px);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="toast" id="toast"></div>

    <div class="eventModal" id="eventModal">
      <div class="eventCard">
        <div class="detailHeader">
          <h2 id="modalTitle">イベント</h2>
          <span class="tag" id="modalType">記録</span>
        </div>
        <div class="logAge" id="modalAge"></div>
        <p class="desc" id="modalBody"></p>
        <div class="quickRow" style="margin-top:10px">
          <button id="modalRegionBtn">地域を見る</button>
          <button id="modalCloseBtn">閉じる</button>
          <button id="modalResumeBtn">再開</button>
        </div>
        <p class="styleState" id="modalPauseNote">観測停止中：イベント閲覧</p>
      </div>
    </div>

    <header class="topbar">
      <div class="titleBlock">
        <h1 class="appTitle">創星日誌</h1>
        <div class="appSub">生命圏・文明興亡・グレートフィルター観測</div>
      </div>
      <div class="miniBtns">
        <button id="fullscreenBtn" title="フルスクリーン">全画面</button>
        <button id="saveBtn" title="保存">保存</button>
        <button id="resetBtn" class="warn" title="新しい惑星">新星</button>
      </div>
    </header>

    <div class="gameLayout">
      <section class="leftPane">
        <section class="planetCard">
          <canvas id="planetCanvas" width="900" height="760" aria-label="回転できる惑星"></canvas>
          <div class="planetHint">↔ 横回転　↕ 傾き　◎ タップで地域</div>
          <div class="ageBadge">
            <div class="planetName" id="planetName">---</div>
            <div class="age" id="ageText">---</div>
          </div>

    const defaultMeta = () => ({
      endings: [],
      breakthroughCount: 0,
      failCount: 0,
      unlockedObservers: ['normal', 'childBoy', 'childGirl'],
      carryPoints: 0
    });

    const state = {
      seed: Math.floor(Math.random() * 999999),
      name: '',
      age: 0,
      speedIndex: 5,
      lastSpeedIndex: 5,
      timeStyle: 'evolution',
      manualSpeedOffset: 0,
      paused: false,
      rotY: 0,
      rotX: -0.08,
      autoSpin: 0.025,
      env: null,
      landDots: [],
      cloudDots: [],
      regions: [],
      milestones: new Set(),
      logs: [],
      selectedRegionId: null,
      pinnedRegionIds: [],
      mode: 'planet',
      logFilter: 'all',
      points: 0,
      intelligence: null,
      collapse: false,
      collapseAge: null,
      nextRandomEvent: 240_000_000,
      greatFilter: {
        status: 'none',
        type: null,
        warningAt: null,
        resolveAt: null,
        prep: 0,
        resolved: false
      },
      ended: false,
      ending: null,
      journalObserver: 'normal',
      fx: null,
      dirty: true,
      lastSave: 0,
      lastStyleSyncAt: 0,
      modalPauseBackup: null,
      meta: defaultMeta()
    };

    const uiState = {
      detailDirty: true,
      logsDirty: true,
      pinsDirty: true,
      modeDirty: true
    };

    function seeded(seed) {
      let t = seed >>> 0;
      return function() {
        t += 0x6D2B79F5;
        let x = Math.imul(t ^ t >>> 15, 1 | t);
        x ^= x + Math.imul(x ^ x >>> 7, 61 | x);
        return ((x ^ x >>> 14) >>> 0) / 4294967296;
      };
    }

    function randomName(prefix = '') {
      const n = 2 + Math.floor(Math.random() * 2);
      let s = '';
      for (let i = 0; i < n; i++) s += pick(SYLLABLES);
      return prefix + s;
    }

    function formatAge(years) {
      if (years < 10_000) return Math.floor(years).toLocaleString() + '年';
      if (years < 100_000_000) return Math.floor(years / 10_000).toLocaleString() + '万年';
      return (years / 100_000_000).toFixed(years < 1_000_000_000 ? 1 : 2) + '億年';
    }

    function getStage(list, age) {
      let current = list[0];
      for (const s of list) if (age >= s.at) current = s;
      return current;
    }

    function lifeLevel() {
      const key = getStage(LIFE_STAGES, state.age).key;
      return LIFE_STAGES.findIndex(s => s.key === key);
    }

    function civLevel() {
      const key = getStage(CIV_STAGES, state.age).key;
      return CIV_STAGES.findIndex(s => s.key === key);
    }

    function avg(arr) {
      return arr.reduce((a, b) => a + b, 0) / Math.max(1, arr.length);
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        "'": '&#39;',
        '"': '&quot;'
      }[ch]));
    }

    function toast(text) {
      const el = $('toast');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.classList.remove('show'), 2400);
    }

    function triggerFx(type, power = 1) {
      state.fx = {
        type,
        start: performance.now(),
        duration: 1500 + power * 500,
        power
      };
    }

    function addPoints(amount, reason) {
      state.points = Math.max(0, state.points + amount);
      if (amount > 0 && reason) toast(`観測点 +${amount}：${reason}`);
      state.dirty = true;
    }

    function addLog(type, title, text, important = false, meta = {}) {
      state.logs.unshift({
        type,
        title,
        text,
        age: state.age,
        important,
        regionId: Number.isInteger(meta.regionId) ? meta.regionId : null,
        subType: meta.subType || null
      });
      if (state.logs.length > 220) state.logs.length = 220;

      if (important) {
        addPoints(meta.points || 35, title);
        toast(`${typeLabel(type)}：${title}`);
      }

      state.dirty = true;
      uiState.logsDirty = true;
      if (state.mode === 'record') uiState.detailDirty = true;
    }

    function typeLabel(type) {
      return type === 'life' ? '生命' : type === 'civ' ? '文明' : '惑星';
    }

    function makePlanet() {
      const oldMeta = state.meta || defaultMeta();

      state.seed = Math.floor(Math.random() * 999999);
      state.name = randomName('惑星') + '-' + (2 + Math.floor(Math.random() * 8));
      state.age = 0;
      state.speedIndex = 5;
      state.lastSpeedIndex = 5;
      state.manualSpeedOffset = 0;
      state.paused = false;
      state.rotY = Math.random() * Math.PI * 2;
      state.rotX = -0.08;
      state.env = {
        ocean: Math.random(),
        gravity: 0.65 + Math.random() * 0.9,
        temperature: Math.random(),
        humidity: Math.random(),
        oxygenPotential: 0.35 + Math.random() * 0.65,
        tectonics: Math.random(),
        disaster: Math.random(),
        forest: Math.random(),
        mountains: Math.random(),
        winds: Math.random(),
        socialPressure: Math.random(),
        stability: Math.random()
      };
      state.landDots = makeLandDots();
      state.cloudDots = makeCloudDots();
      state.regions = makeRegions();
      state.milestones = new Set();
      state.logs = [];
      state.selectedRegionId = null;
      state.pinnedRegionIds = [];
      state.mode = 'planet';
      state.logFilter = 'all';
      state.points = 30 + Math.floor(oldMeta.carryPoints || 0);
      state.intelligence = null;
      state.collapse = false;
      state.collapseAge = null;
      state.nextRandomEvent = 240_000_000 + Math.random() * 280_000_000;
      state.greatFilter = {
        status: 'none',
        type: null,
        warningAt: null,
        resolveAt: null,
        prep: 0,
        resolved: false
      };
      state.ended = false;
      state.ending = null;
      state.journalObserver = 'normal';
      state.fx = null;
      state.meta = oldMeta;

      addLog('planet', '観測開始', `${state.name} の長期観測を開始。海洋率${Math.round(state.env.ocean * 100)}%、重力${state.env.gravity.toFixed(2)}G。`, true, { points: 0 });
      applyStyleSpeed(true);
      hideWipe();
      markAllDirty();
      saveState(false);
      updateAll(true);
    }

    function makeLandDots() {
      const dots = [];
      const continentCount = 5 + Math.floor(Math.random() * 4);
      const centers = [];
      for (let i = 0; i < continentCount; i++) {
        centers.push({
          lon: Math.random() * Math.PI * 2 - Math.PI,
          lat: (Math.random() - 0.5) * Math.PI * 0.85,
          size: 0.35 + Math.random() * 0.48
        });
      }
      for (let i = 0; i < 760; i++) {
        const c = pick(centers);
        const lon = c.lon + (Math.random() - 0.5) * c.size * 1.8;
        const lat = c.lat + (Math.random() - 0.5) * c.size;
        const polar = Math.abs(lat) / (Math.PI / 2);
        const isLand = Math.random() > state.env.ocean * 0.55;
        dots.push({
          lon,
          lat: clamp(lat, -1.45, 1.45),
          r: 0.006 + Math.random() * 0.018,
          land: isLand,
          polar,
          fert: Math.random()
        });
      }
      return dots;
    }

    function makeCloudDots() {
      const dots = [];
      for (let i = 0; i < 170; i++) {
        dots.push({
          lon: Math.random() * Math.PI * 2 - Math.PI,
          lat: (Math.random() - 0.5) * Math.PI,
          r: 0.006 + Math.random() * 0.012,
          a: 0.06 + Math.random() * 0.16
        });
      }
      return dots;
    }

    function makeRegions() {
      return REGION_BASES.map((base, index) => {
        const lon = (index / REGION_BASES.length) * Math.PI * 2 - Math.PI + (Math.random() - .5) * .35;
        const lat = Math.sin(index * 1.7) * .9 + (Math.random() - .5) * .25;
        const isOcean = /海|浅海|群島|沿岸|氷縁/.test(base) || Math.random() < state.env.ocean * .34;
        const climate = climateFrom(base, lat, isOcean);
        const root = randomName('');
        return {
          id: index,
          baseName: base,
          rootName: root,
          lon,
          lat,
          isOcean,
          climate,
          fertility: clamp(Math.random() * .55 + (isOcean ? .2 : .35) + state.env.humidity * .25, 0, 1),
          resources: clamp(Math.random() * .7 + (base.includes('山') || base.includes('火山') ? .3 : .05), 0, 1),
          biodiversity: Math.random() * .5,
          pollution: 0,
          ruin: false,
          city: false,
          crater: false,
          volcano: base.includes('火山'),
          uplift: base.includes('山'),
          origin: Math.random(),
          historyNames: [base],
          currentName: base,
          lastEventType: null,
          lastEventAt: null
        };
      });
    }

    function climateFrom(base, lat, isOcean) {
      if (base.includes('氷') || Math.abs(lat) > 1.15) return '寒冷';
      if (base.includes('乾燥') || state.env.humidity < .25) return '乾燥';
      if (base.includes('湿') || state.env.humidity > .72) return '湿潤';
      if (isOcean) return '海洋性';
      if (Math.abs(lat) < .35) return '熱帯';
      return '温帯';
    }

    function chooseIntelligence() {
      if (state.intelligence) return;

      const env = state.env;
      const scores = LINEAGES.map(l => {
        let score = Math.random() * .25;
        if (l.id === 'mammal') score += (1 - env.ocean) * .5 + env.socialPressure * .7 + env.forest * .4;
        if (l.id === 'reptile') score += env.temperature * .7 + (1 - env.humidity) * .55 + (1 - env.ocean) * .35;
        if (l.id === 'avian') score += env.mountains * .75 + env.winds * .55;
        if (l.id === 'arthropod') score += env.socialPressure * .9 + env.temperature * .35;
        if (l.id === 'cephalo') score += env.ocean * .95 + env.stability * .45;
        if (l.id === 'mycelial') score += env.forest * .8 + env.stability * .75 + env.humidity * .35;
        return { l, score };
      }).sort((a, b) => b.score - a.score);

      const chosen = scores[0].l;
      const suffix = chosen.id === 'cephalo' ? '潮族'
        : chosen.id === 'avian' ? '翼人種'
        : chosen.id === 'mycelial' ? '記憶林'
        : chosen.id === 'arthropod' ? '群族'
        : chosen.id === 'reptile' ? '竜人種'
        : '獣人種';

      const speciesName = randomName('') + suffix;
      state.intelligence = { ...chosen, speciesName, score: scores[0].score };

      addLog('life', '知的生命体の出現', `${chosen.base} から ${speciesName} が出現。特徴は「${chosen.traits.join('・')}」。`, true, { points: 80, subType: 'intelligence' });
      triggerFx('intelligence', 1.2);
      autoSlowdownForImportantEvent();

      const candidates = state.regions
        .map(r => ({
          r,
          score:
            r.fertility +
            r.resources * .35 +
            (r.isOcean && chosen.id === 'cephalo' ? .6 : 0) +
            (!r.isOcean && chosen.id !== 'cephalo' ? .25 : 0) -
            Math.abs(r.lat) * .1 +
            Math.random() * .3
        }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 2);

      for (const c of candidates) {
        c.r.origin += .8;
        markRegionEvent(c.r, 'origin');
      }
    }

    function updateMilestones() {
      for (const st of LIFE_STAGES) {
        const key = 'life:' + st.key;
        if (state.age >= st.at && !state.milestones.has(key)) {
          state.milestones.add(key);
          milestoneLife(st);
        }
      }

      if (state.age >= LIFE_STAGES.find(s => s.key === 'intelligence').at) {
        chooseIntelligence();
      }

      for (const st of CIV_STAGES) {
        const key = 'civ:' + st.key;
        if (state.age >= st.at && !state.milestones.has(key)) {
          state.milestones.add(key);
          milestoneCiv(st);
        }
      }

      maybeStartGreatFilter();

      if (!state.collapse && state.age > 4_372_000_000 && riskValue() > 76 && Math.random() < 0.004) {
        triggerCollapse('複合危機');
      }

      while (!state.ended && state.age >= state.nextRandomEvent) {
        randomEvent();
        state.nextRandomEvent += randomEventGap();
      }

      if (state.greatFilter.status === 'warning' && state.age >= state.greatFilter.resolveAt) {
        resolveGreatFilter();
      }
    }

    function milestoneLife(st) {
      const msgs = {
        sterile: ['無生命期', '地表は不安定。生命の兆候はまだありません。'],
        chemistry: ['有機分子形成', '海洋と大気中で複雑な有機化学反応が増加しました。'],
        microbe: ['原始生命誕生', '浅海と熱水域に微生物圏が成立。生命ログの記録を開始します。'],
        oxygen: ['酸素革命', '光合成型生命が拡大。生態系が大きく再編されます。'],
        multicell: ['多細胞生命の安定化', '複数の系統で大型化と分化が始まりました。'],
        oceanLife: ['海洋生態系の拡大', '外骨格・遊泳能力・感覚器が進化。海洋のニッチ争いが激化します。'],
        landLife: ['陸上進出', '沿岸から陸地へ生命圏が広がります。'],
        megafauna: ['大型生物繁栄', '複数地域で大型生物が繁栄。支配系統の入れ替わりが起きやすい時代です。'],
        preIntelligence: ['知性候補期', '道具使用・群れ行動・学習能力の高い系統が観測されています。'],
        intelligence: ['知性の火花', '一部の生物系統で記号・道具・世代間学習が成立し始めました。']
      };

      addLog('life', msgs[st.key][0], msgs[st.key][1], true, { points: st.key === 'intelligence' ? 80 : 30 });
      if (st.key === 'intelligence') triggerFx('intelligence', 1.1);

      for (const r of state.regions) {
        r.biodiversity = clamp(r.biodiversity + .08 + Math.random() * .12, 0, 1);
      }
    }

    function milestoneCiv(st) {
      if (st.key === 'none') return;

      const species = state.intelligence ? state.intelligence.speciesName : '未確定知性体';
      const msgs = {
        proto: ['原始文化の成立', `${species} が火・道具・記号的コミュニケーションを使い始めました。`],
        agri: ['定住文明の発生', '食料生産と定住地が拡大。地域名が固有名へ変化し始めます。'],
        city: ['都市国家の形成', '河川・沿岸・資源地帯に都市が出現。交易と争いが記録されます。'],
        empire: ['国家と帝国の時代', '複数の都市圏が統合され、地域名が王国・州・聖域として再編されます。'],
        industrial: ['産業文明へ移行', '燃料利用と機械化が進行。環境負荷が上昇します。'],
        info: ['情報文明へ移行', '惑星規模の通信網が成立。都市光が夜面に広がります。'],
        space: ['宇宙進出開始', '軌道施設と宇宙港が建設されました。グレートフィルターの兆候に注意。'],
        stellar: ['恒星間文明候補', '惑星文明の一部が恒星間進出を試みています。']
      };

      addLog('civ', msgs[st.key][0], msgs[st.key][1], true, { points: ['city', 'industrial', 'space'].includes(st.key) ? 75 : 45, subType: st.key });
      if (st.key === 'proto') triggerFx('civilization', 1);
      if (st.key === 'space') triggerFx('space', 1.2);
      if (['proto', 'city', 'industrial', 'space'].includes(st.key)) autoSlowdownForImportantEvent();
      evolveRegionNames();
    }

    function randomEventGap() {
      const ll = lifeLevel();
      if (ll < 3) return 220_000_000 + Math.random() * 360_000_000;
      if (ll < 8) return 45_000_000 + Math.random() * 160_000_000;
      if (civLevel() < 5) return 2_000_000 + Math.random() * 12_000_000;
      return 70_000 + Math.random() * 1_200_000;
    }

    function randomEvent() {
      const ll = lifeLevel();
      const cl = civLevel();

      if (Math.random() < naturalTectonicChance()) {
        triggerTectonic(true);
        return;
      }

      if (Math.random() < naturalMeteorChance()) {
        triggerMeteor(true);
        return;
      }

      if (ll < 2) {
        addLog('planet', '地殻活動', '火山活動により大気成分と海洋鉱物濃度が変動しました。');
        return;
      }

      if (ll < 8) {
        const events = [
          ['life', '生態系の放散', '空いたニッチに複数系統が進出。地域ごとの生物相が豊かになりました。', 'expansion'],
          ['life', '小規模絶滅', '気候変動により一部系統が衰退。別系統が空いた席に入り始めます。', 'ecosystem'],
          ['planet', '気候振動', '寒冷期と温暖期の揺れにより、移動能力と適応力が試されています。', 'ecosystem'],
          ['life', '形質の獲得', '視覚・群れ行動・外骨格などの形質が複数地域で発達しました。', 'expansion']
        ];
        const e = pick(events);
        addLog(e[0], e[1], e[2]);
        if (e[1].includes('絶滅') || e[1].includes('振動')) triggerFx('hazard', .8);
        markRegionEvent(pick(state.regions), e[3]);
        for (const r of state.regions) {
          r.biodiversity = clamp(r.biodiversity + (Math.random() - .35) * .08, 0, 1);
        }
        return;
      }

      if (cl < 5) {
        const events = [
          ['civ', '交易圏の拡大', '複数地域で物資と文化が交換され、地名と勢力圏が再編されました。', 'prosper'],
          ['civ', '地域紛争', '水・資源・聖地をめぐる争いが発生。一部地域の安定度が低下します。', 'conflict'],
          ['life', '家畜化と共生', '文明種の周辺で、野生生物の一部が共生・家畜化しました。', 'ecosystem'],
          ['civ', '文字記録の発展', '地域史と神話が記録され、土地の名前が固定化され始めました。', 'origin']
        ];
        const e = pick(events);
        addLog(e[0], e[1], e[2]);
        markRegionEvent(pick(state.regions), e[3]);
        evolveRegionNames();
        return;
      }

      const events = [
        ['civ', '環境負荷の増大', '都市圏と工業地帯の拡大により、複数地域で汚染が上昇しました。', 'conflict'],
        ['life', '都市適応種の増加', '旧来の大型野生生物は減少し、都市環境に適応した小型種が増えています。', 'ecosystem'],
        ['civ', '技術的跳躍', '通信・エネルギー・材料技術が進歩。宇宙進出の可能性が上昇します。', 'prosper'],
        ['planet', '極端気象', '気候システムの変動が激しくなり、文明圏と生態系の両方に影響が出ています。', 'conflict']
      ];

      const e = pick(events);
      addLog(e[0], e[1], e[2]);
      if (e[1].includes('極端気象')) triggerFx('hazard', 1);
      if (e[1].includes('技術的跳躍')) triggerFx('space', .8);
      markRegionEvent(pick(state.regions), e[3]);

      for (const r of state.regions) {
        if (r.city || Math.random() < .26) {
          r.pollution = clamp(r.pollution + .035 + Math.random() * .08, 0, 1);
        }
      }
    }

    function naturalTectonicChance() {
      const base = state.env.tectonics * 0.018;
      const noRecent = state.age > 500_000_000 ? 0.004 : 0;
      return base + noRecent;
    }

    function naturalMeteorChance() {
      if (state.age < 900_000_000) return 0.01;
      if (lifeLevel() >= 7 && !state.collapse) return 0.002;
      return 0.0008;
    }

    function triggerTectonic(natural = false, target = null) {
      const r = target || pick(state.regions);
      r.uplift = true;
      if (Math.random() < .45 || r.baseName.includes('火山')) r.volcano = true;
      r.resources = clamp(r.resources + .18 + Math.random() * .2, 0, 1);
      r.fertility = clamp(r.fertility + (Math.random() - .35) * .22, 0, 1);
      r.biodiversity = clamp(r.biodiversity + (Math.random() - .45) * .18, 0, 1);
      if (!r.historyNames.includes(r.currentName + '隆起帯')) {
        r.currentName = r.rootName + pick(['隆起帯', '火山帯', '新山脈', '断層原']);
        r.historyNames.push(r.currentName);
      }
      markRegionEvent(r, 'tectonic');
      triggerFx('tectonic', 1);
      addLog('planet', natural ? '自然地殻変動' : '観測介入：地殻変動', `${r.currentName} で地殻変動が発生。山脈・火山・資源分布が変化し、進化圧と文明圏に影響が出ます。`, true, { regionId: r.id, points: natural ? 45 : 20 });
      uiState.detailDirty = true;
    }

    function triggerMeteor(natural = false, target = null) {
      const r = target || pick(state.regions);
      r.crater = true;
      r.fertility = clamp(r.fertility - .25, 0, 1);
      r.biodiversity = clamp(r.biodiversity - .35, 0, 1);
      r.pollution = clamp(r.pollution + .12, 0, 1);
      if (r.city) {
        r.city = false;
        r.ruin = true;
      }
      r.currentName = '隕石孔' + r.rootName;
      if (!r.historyNames.includes(r.currentName)) r.historyNames.push(r.currentName);
      markRegionEvent(r, 'meteor');
      triggerFx('meteor', 1.25);

      if (lifeLevel() >= 7 && civLevel() < 2) {
        state.env.disaster = clamp(state.env.disaster + .12, 0, 1);
        state.env.stability = clamp(state.env.stability - .08, 0, 1);
      }

      addLog('planet', natural ? '巨大隕石衝突' : '観測介入：巨大隕石', `${r.currentName} に巨大隕石が落下。大量絶滅、気候変動、クレーター地形が発生しました。`, true, { regionId: r.id, points: natural ? 90 : 15 });
      uiState.detailDirty = true;
    }

    function evolveRegionNames() {
      const level = civLevel();
      const species = state.intelligence;

      for (const r of state.regions) {
        const civilizationScore = r.origin + r.fertility * .5 + r.resources * .3 + Math.random() * .1;
        if (level >= 2 && civilizationScore > .85 && !r.ruin && !r.crater) r.city = true;

        let next = r.currentName;
        if (level >= 2 && r.historyNames.length < 2 && r.city) next = r.rootName + (r.isOcean ? '湾岸' : '川流域');
        if (level >= 3 && r.city && !/都市|王国|帝国|州|圏|特区|旧/.test(next)) next = r.rootName + pick(['河畔都市', '交易都市', '聖域', '城塞都市']);
        if (level >= 4 && r.city && !/王国|帝国|州|連盟|旧/.test(next)) next = r.rootName + pick(['王国', '連盟領', '辺境州', '大公国']);
        if (level >= 5 && r.city && !/工業|首都|第|特区|旧/.test(next)) next = r.rootName + pick(['工業ベルト', '首都圏', '第三区', '研究都市']);
        if (level >= 7 && r.city && !/軌道|宇宙|特区|旧/.test(next)) next = r.rootName + pick(['軌道港特区', '宇宙港都市', '星間観測区']);

        if (species && species.id === 'mycelial' && r.city && level >= 3) next = r.rootName + pick(['記憶林', '共生林都', '地下聖林']);
        if (species && species.id === 'cephalo' && r.city && level >= 3) next = r.rootName + pick(['潮都', '浅海連邦', '珊瑚都市']);

        if (next !== r.currentName) {
          r.currentName = next;
          if (!r.historyNames.includes(next)) r.historyNames.push(next);
        }
      }
    }

    function triggerCollapse(reason = '複合危機') {
      if (state.collapse) return;

      state.collapse = true;
      state.collapseAge = state.age;
      triggerFx('collapse', 1.5);
      addLog('civ', '文明崩壊', `${reason} により主要文明が崩壊。都市の一部は廃墟となり、生命圏の再編が始まります。`, true, { points: 70, subType: 'collapse' });

      for (const r of state.regions) {
        if (r.city && Math.random() < .72) {
          r.ruin = true;
          r.city = false;
          markRegionEvent(r, 'collapse');
          r.currentName = '旧' + r.currentName + '跡';
          r.historyNames.push(r.currentName);
        }
      }

      addLog('life', '再野生化の進行', '崩壊圏の一部で植生と野生生態系の再拡大が確認されました。', true, { points: 35, subType: 'rewilding' });
    }

    function riskValue() {
      const cl = civLevel();
      const pollution = state.regions.reduce((a, r) => a + r.pollution, 0) / state.regions.length;
      const base = state.env.disaster * 22 + cl * 5 + pollution * 45;
      const stability = state.env.stability * 16;
      const collapse = state.collapse ? 18 : 0;
      const filter = state.greatFilter.status === 'warning' ? 12 : 0;
      return clamp(Math.round(base - stability + collapse + filter), 0, 99);
    }

    function maybeStartGreatFilter() {
      if (state.greatFilter.status !== 'none') return;
      if (state.ended) return;
      if (civLevel() < 7) return;

      const type = pick(FILTER_TYPES);
      state.greatFilter = {
        status: 'warning',
        type,
        warningAt: state.age,
        resolveAt: state.age + 9_000_000 + Math.random() * 8_000_000,
        prep: 0,
        resolved: false
      };

      triggerFx('filter', 1.4);
      addLog('planet', 'グレートフィルター兆候', `${type.label} の兆候を検出。${type.sign}`, true, { points: 120, subType: 'greatFilter' });
      autoSlowdownForImportantEvent();
      markAllDirty();
    }

    function resolveGreatFilter() {
      if (state.greatFilter.status !== 'warning') return;

      const type = state.greatFilter.type;
      const risk = riskValue();
      const stabilityBonus = Math.round(state.env.stability * 120);
      const biodiversityBonus = Math.round(avg(state.regions.map(r => r.biodiversity)) * 70);
      const prep = state.greatFilter.prep;
      const score = prep + stabilityBonus + biodiversityBonus - risk * 2;

      const success = score >= type.cost;
      state.greatFilter.status = 'resolved';
      state.greatFilter.resolved = true;

      if (success) {
        endPlanet('breakthrough', `${type.label}突破`, `文明は ${type.label} の危機を越え、恒星間文明候補として生き延びました。`);
      } else {
        triggerCollapse(type.label);
        endPlanet('failedFilter', `${type.label}失敗`, `文明は ${type.label} を越えられず、惑星規模の崩壊へ向かいました。`);
      }
    }

    function endPlanet(result, title, body) {
      if (state.ended) return;

      state.ended = true;
      state.paused = true;
      state.ending = {
        result,
        title,
        body,
        age: state.age,
        filterType: state.greatFilter.type ? state.greatFilter.type.label : '未発生',
        risk: riskValue(),
        pointsLeft: Math.floor(state.points)
      };

      addLog('planet', 'エンディング到達', `${title}：${body}`, true, { points: 0, subType: 'ending' });

      updateMetaByEnding(result);
      unlockObservers();
      state.meta.carryPoints = Math.min(300, Math.floor(state.points * .25));

      markAllDirty();
      saveState(false);
      state.mode = 'record';
      updateAll(true);
      toast('エンディング到達：創星日誌を生成できます');
    }

    function updateMetaByEnding(result) {
      const meta = state.meta || defaultMeta();
      const key = `${result}:${state.greatFilter.type ? state.greatFilter.type.id : 'none'}`;
      if (!meta.endings.includes(key)) meta.endings.push(key);
      if (result === 'breakthrough') meta.breakthroughCount += 1;
      if (result === 'failedFilter') meta.failCount += 1;
      state.meta = meta;
    }

    function unlockObservers() {
      const meta = state.meta || defaultMeta();
      const add = (id) => {
        if (!meta.unlockedObservers.includes(id)) meta.unlockedObservers.push(id);
      };

      if (meta.endings.length >= 1) {
        add('foreigner');
        add('north');
      }
      if (meta.breakthroughCount >= 1) {
        add('samurai');
        add('kyoto');
      }
      if (meta.breakthroughCount >= 2) {
        add('oldGirl');
        add('gal');
      }
      if (meta.endings.length >= 3) {
        add('transfer');
      }
      if (meta.breakthroughCount >= 1 && meta.failCount >= 1) {
        add('net');
      }

      state.meta = meta;
    }

    function autoSlowdownForImportantEvent() {
      if ((state.timeStyle === 'event' || state.timeStyle === 'idle' || state.timeStyle === 'civilization') && state.speedIndex > 3) {
        state.speedIndex = 3;
        state.manualSpeedOffset = state.speedIndex - desiredSpeedIndex();
        toast('重要イベント発生：観測速度を一時的に下げました');
      }
    }

    function desiredSpeedIndex() {
      const ll = lifeLevel();
      const cl = civLevel();
      const style = state.timeStyle || 'evolution';

      if (style === 'calm') return ll < 5 ? 2 : 3;
      if (style === 'evolution') return ll < 8 ? 5 : 4;
      if (style === 'civilization') return cl < 2 ? 6 : cl < 5 ? 4 : 3;
      if (style === 'event') return cl < 3 ? 6 : 5;
      if (style === 'idle') return cl < 2 ? 7 : 6;
      return 5;
    }

    function applyStyleSpeed(silent = false) {
      const base = desiredSpeedIndex();
      const next = clamp(base + (state.manualSpeedOffset || 0), 0, SPEEDS.length - 1);
      state.speedIndex = next;
      if (!silent) uiState.detailDirty = state.mode === 'record';
    }

    function updateRegions(dtYears) {
      const ll = lifeLevel();
      const cl = civLevel();

      for (const r of state.regions) {
        const bioTarget = ll < 2 ? 0 : clamp((ll - 1) / 8 + r.fertility * .22 - r.pollution * .25 - (r.crater ? .12 : 0), 0, 1);
        r.biodiversity = lerp(r.biodiversity, bioTarget, .002);

        if (cl >= 5 && (r.city || Math.random() < .0004)) {
          r.pollution = clamp(r.pollution + dtYears * 0.00000000008 * (cl - 4), 0, 1);
        }

        if (state.collapse) {
          r.pollution = lerp(r.pollution, r.ruin ? .25 : .08, .0008);
          r.biodiversity = lerp(r.biodiversity, .72 - r.pollution * .25, .0008);
        }
      }
    }

    function tick(dt) {
      if (state.ended) return;

      const now = performance.now();

      if (now - state.lastStyleSyncAt > 1200 && !state.paused && (state.manualSpeedOffset || 0) === 0) {
        applyStyleSpeed(true);
        state.lastStyleSyncAt = now;
      }

      const speed = state.paused ? 0 : SPEEDS[state.speedIndex];

      if (speed > 0) {
        const dtYears = dt * speed;
        state.age += dtYears;
        state.rotY += state.autoSpin * dt;
        state.points += dt * (0.16 + lifeLevel() * .025 + civLevel() * .04);
        updateRegions(dtYears);
        updateMilestones();
        state.dirty = true;
      }

      if (now - state.lastSave > 5000 && state.dirty) {
        saveState(false);
      }
    }

    function project(lon, lat, radius, cx, cy, extraRot = 0) {
      const L = lon + state.rotY + extraRot;
      const x0 = Math.cos(lat) * Math.sin(L);
      const y0 = Math.sin(lat);
      const z0 = Math.cos(lat) * Math.cos(L);
      const cosX = Math.cos(state.rotX);
      const sinX = Math.sin(state.rotX);
      const y = y0 * cosX - z0 * sinX;
      const z = y0 * sinX + z0 * cosX;
      const x = x0;
      return {
        x: cx + x * radius,
        y: cy - y * radius,
        z,
        visible: z > -0.04,
        scale: (z + 1) / 2
      };
    }

    function drawPlanet() {
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      const cx = w / 2;
      const cy = h * .505;
      const radius = Math.min(w, h) * .36;

      const bg = ctx.createRadialGradient(cx, cy, radius * .1, cx, cy, radius * 1.8);
      bg.addColorStop(0, 'rgba(126,232,255,.13)');
      bg.addColorStop(.38, 'rgba(65,95,185,.08)');
      bg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.clip();

      const oceanAgeBoost = clamp(lifeLevel() / 8, 0, 1);
      const ocean = ctx.createRadialGradient(cx - radius * .32, cy - radius * .38, radius * .12, cx, cy, radius * 1.1);
      ocean.addColorStop(0, `rgba(${42 + oceanAgeBoost * 20}, ${95 + oceanAgeBoost * 50}, ${170 + oceanAgeBoost * 38}, 1)`);
      ocean.addColorStop(.55, '#173b78');
      ocean.addColorStop(1, '#071735');
      ctx.fillStyle = ocean;
      ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);

      drawLand(cx, cy, radius);
      drawCities(cx, cy, radius);
      drawClouds(cx, cy, radius);

      const shade = ctx.createRadialGradient(cx - radius * .35, cy - radius * .45, radius * .1, cx + radius * .35, cy + radius * .22, radius * 1.22);
      shade.addColorStop(0, 'rgba(255,255,255,.20)');
      shade.addColorStop(.45, 'rgba(255,255,255,0)');
      shade.addColorStop(.75, 'rgba(0,0,0,.22)');
      shade.addColorStop(1, 'rgba(0,0,0,.72)');
      ctx.fillStyle = shade;
      ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);

      ctx.restore();

      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(126,232,255,.35)';
      ctx.lineWidth = 2;
      ctx.stroke();

      const glow = ctx.createRadialGradient(cx, cy, radius * .95, cx, cy, radius * 1.12);
      glow.addColorStop(0, 'rgba(126,232,255,0)');
      glow.addColorStop(1, 'rgba(126,232,255,.28)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, radius * 1.12, 0, Math.PI * 2);
      ctx.fill();

      drawRegionMarkers(cx, cy, radius);
      drawOrbitIfNeeded(cx, cy, radius);
      drawEventFx(cx, cy, radius);
    }

    function drawLand(cx, cy, radius) {
      const ll = lifeLevel();

      for (const d of state.landDots) {
        const p = project(d.lon, d.lat, radius, cx, cy);
        if (!p.visible) continue;

        const alpha = clamp((p.z + .12) / 1.12, 0, 1);
        const rr = d.r * radius * (0.55 + p.scale * .75);
        const green = ll >= 5 ? 78 + d.fert * 70 : 58;
        const brown = ll < 3 ? 110 : 76;

        if (d.polar > .78) {
          ctx.fillStyle = `rgba(210,235,255,${alpha * .72})`;
        } else if (d.land) {
          ctx.fillStyle = `rgba(${brown}, ${green}, ${ll >= 5 ? 68 : 64}, ${alpha * .86})`;
        } else {
          ctx.fillStyle = `rgba(37, 108, 155, ${alpha * .20})`;
        }

        ctx.beginPath();
        ctx.ellipse(p.x, p.y, rr * 1.55, rr, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      if (state.collapse) {
        ctx.fillStyle = 'rgba(120, 95, 78, .12)';
        ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);
      }
    }

    function drawClouds(cx, cy, radius) {
      if (lifeLevel() < 1) return;

      for (const d of state.cloudDots) {
        const p = project(d.lon, d.lat, radius, cx, cy, state.age * 0.0000000002);
        if (!p.visible) continue;

        const rr = d.r * radius * (1 + p.scale);
        ctx.fillStyle = `rgba(255,255,255,${d.a * clamp((p.z + .15) / 1.15, 0, 1)})`;
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, rr * 2.2, rr, .2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawCities(cx, cy, radius) {
      const cl = civLevel();
      if (cl < 3 && !state.collapse) return;

      for (const r of state.regions) {
        if (!r.city && !r.ruin && !r.crater && !r.volcano) continue;

        const p = project(r.lon, r.lat, radius, cx, cy);
        if (!p.visible) continue;

        const alpha = clamp((p.z + .05) / 1.05, 0, 1);
        const size = radius * (r.ruin ? .014 : .018 + cl * .002);

        if (r.crater) {
          ctx.strokeStyle = `rgba(255,160,105,${alpha * .6})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(p.x, p.y, size * 2.1, 0, Math.PI * 2);
          ctx.stroke();
        }

        if (r.volcano) {
          ctx.fillStyle = `rgba(255,95,65,${alpha * .62})`;
          ctx.beginPath();
          ctx.arc(p.x + size * 1.2, p.y - size, size * .75, 0, Math.PI * 2);
          ctx.fill();
        }

        if (r.city || r.ruin) {
          ctx.fillStyle = r.ruin ? `rgba(255,160,105,${alpha * .45})` : `rgba(255,218,118,${alpha * .75})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
          ctx.fill();
        }

        if (cl >= 6 && r.city && !r.ruin) {
          ctx.strokeStyle = `rgba(255,218,118,${alpha * .22})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(p.x, p.y, size * 2.4, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
    }

    function drawRegionMarkers(cx, cy, radius) {
      for (const r of state.regions) {
        const p = project(r.lon, r.lat, radius, cx, cy);
        if (!p.visible) continue;

        const selected = r.id === state.selectedRegionId;
        const pinned = state.pinnedRegionIds.includes(r.id);
        if (!selected && !pinned) continue;

        ctx.strokeStyle = selected ? 'rgba(126,232,255,.95)' : 'rgba(255,217,118,.8)';
        ctx.fillStyle = selected ? 'rgba(126,232,255,.22)' : 'rgba(255,217,118,.18)';
        ctx.lineWidth = selected ? 3 : 2;

        const rad = selected ? 13 : 9;
        ctx.beginPath();
        ctx.arc(p.x, p.y, rad, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
    }

    function drawOrbitIfNeeded(cx, cy, radius) {
      if (civLevel() < 7) return;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(-0.25);
      ctx.strokeStyle = 'rgba(126,232,255,.26)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, radius * 1.24, radius * .32, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawEventFx(cx, cy, radius) {
      if (!state.fx) return;

      const now = performance.now();
      const t = (now - state.fx.start) / state.fx.duration;

      if (t >= 1) {
        state.fx = null;
        return;
      }

      const a = (1 - t) * state.fx.power;
      ctx.save();

      if (state.fx.type === 'intelligence') {
        ctx.strokeStyle = `rgba(126,232,255,${0.45 * a})`;
        ctx.lineWidth = 2 + 6 * t;
        ctx.beginPath();
        ctx.arc(cx, cy, radius * (0.45 + 0.5 * t), 0, Math.PI * 2);
        ctx.stroke();
      } else if (state.fx.type === 'civilization') {
        ctx.fillStyle = `rgba(255,218,118,${0.18 * a})`;
        ctx.beginPath();
        ctx.arc(cx, cy, radius * .9, 0, Math.PI * 2);
        ctx.fill();
      } else if (state.fx.type === 'hazard' || state.fx.type === 'meteor') {
        ctx.fillStyle = state.fx.type === 'meteor'
          ? `rgba(255,190,90,${0.26 * a})`
          : `rgba(255,90,90,${0.2 * a})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      } else if (state.fx.type === 'collapse') {
        ctx.fillStyle = `rgba(40,0,0,${0.35 * a})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = `rgba(255,120,120,${0.55 * a})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, cy, radius * (0.95 + .08 * Math.sin(t * 20)), 0, Math.PI * 2);
        ctx.stroke();
      } else if (state.fx.type === 'space' || state.fx.type === 'filter') {
        ctx.strokeStyle = state.fx.type === 'filter'
          ? `rgba(255,138,157,${0.55 * a})`
          : `rgba(126,232,255,${0.5 * a})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(cx, cy, radius * (1.24 + t * .08), radius * (.32 + t * .05), -0.25, 0, Math.PI * 2);
        ctx.stroke();
      } else if (state.fx.type === 'tectonic') {
        ctx.strokeStyle = `rgba(255,217,118,${0.45 * a})`;
        ctx.lineWidth = 2;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.arc(cx, cy, radius * (.45 + .12 * i + t * .2), 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      ctx.restore();
    }

    function drawWipeScene(region) {
      const w = wipeCanvas.width;
      const h = wipeCanvas.height;
      wctx.clearRect(0, 0, w, h);

      const sky = wctx.createLinearGradient(0, 0, 0, h);
      if (region.ruin) {
        sky.addColorStop(0, '#2b2941');
        sky.addColorStop(1, '#5a493a');
      } else if (region.isOcean) {
        sky.addColorStop(0, '#315f99');
        sky.addColorStop(1, '#0d4a70');
      } else if (region.climate === '乾燥') {
        sky.addColorStop(0, '#d08b53');
        sky.addColorStop(1, '#5b3926');
      } else if (region.climate === '寒冷') {
        sky.addColorStop(0, '#9ec8ee');
        sky.addColorStop(1, '#2e5578');
      } else {
        sky.addColorStop(0, '#315d8c');
        sky.addColorStop(1, '#123c39');
      }

      wctx.fillStyle = sky;
      wctx.fillRect(0, 0, w, h);

      if (region.isOcean) {
        wctx.fillStyle = 'rgba(20,80,120,.9)';
        wctx.fillRect(0, h * .55, w, h * .45);
        for (let i = 0; i < 7; i++) {
          wctx.strokeStyle = `rgba(255,255,255,${.12 + i * .012})`;
          wctx.beginPath();
          const y = h * .62 + i * 8;
          wctx.moveTo(0, y);
          for (let x = 0; x < w; x += 30) {
            wctx.quadraticCurveTo(x + 15, y - 5 + (i % 2) * 4, x + 30, y);
          }
          wctx.stroke();
        }
      } else {
        wctx.fillStyle = region.climate === '乾燥' ? '#8d6338' : region.climate === '寒冷' ? '#d8ecff' : '#235b35';
        wctx.fillRect(0, h * .62, w, h * .38);
        if (region.climate !== '乾燥') {
          for (let i = 0; i < 8; i++) drawTree(wctx, 18 + i * 46 + (i % 2) * 10, h * .68 + (i % 3) * 5, region.climate === '寒冷');
        } else {
          for (let i = 0; i < 4; i++) drawCactus(wctx, 35 + i * 80, h * .70);
        }
      }

      if (region.volcano) drawVolcano(wctx, w * .23, h * .68, .65);
      if (region.crater) drawCrater(wctx, w * .44, h * .70, .55);
      if (region.city) drawCityIcon(wctx, w * .62, h * .61, state.intelligence ? state.intelligence.id : 'city');
      if (region.ruin) drawCityIcon(wctx, w * .60, h * .62, 'ruin');
      if (region.lastEventType) drawRecentEventOverlay(wctx, w, h, region);

      wctx.fillStyle = 'rgba(0,0,0,.18)';
      wctx.fillRect(0, 0, w, h);
    }

    function drawTree(c, x, y, snow = false) {
      c.fillStyle = '#5b3b24';
      c.fillRect(x - 3, y - 16, 6, 18);
      c.fillStyle = snow ? '#d8f1ff' : '#2e8a4a';
      c.beginPath();
      c.moveTo(x, y - 44);
      c.lineTo(x - 18, y - 9);
      c.lineTo(x + 18, y - 9);
      c.closePath();
      c.fill();
      c.beginPath();
      c.moveTo(x, y - 32);
      c.lineTo(x - 15, y - 2);
      c.lineTo(x + 15, y - 2);
      c.closePath();
      c.fill();
    }

    function drawCactus(c, x, y) {
      c.strokeStyle = '#6fb36a';
      c.lineWidth = 7;
      c.lineCap = 'round';
      c.beginPath();
      c.moveTo(x, y);
      c.lineTo(x, y - 38);
      c.moveTo(x, y - 22);
      c.lineTo(x - 16, y - 28);
      c.moveTo(x, y - 27);
      c.lineTo(x + 15, y - 35);
      c.stroke();
    }

    function drawCityIcon(c, x, y, type) {
      c.save();
      c.translate(x, y);
      if (type === 'ruin') c.fillStyle = 'rgba(80,75,70,.85)';
      else if (type === 'cephalo') c.fillStyle = 'rgba(255,150,180,.82)';
      else if (type === 'mycelial') c.fillStyle = 'rgba(160,255,170,.78)';
      else c.fillStyle = 'rgba(255,218,118,.85)';

      for (let i = 0; i < 5; i++) {
        const bw = 14 + (i % 2) * 8;
        const bh = 24 + i * 8;
        c.fillRect(-42 + i * 18, -bh, bw, bh);
      }

      if (type === 'ruin') {
        c.strokeStyle = 'rgba(40,30,25,.65)';
        c.lineWidth = 3;
        c.beginPath();
        c.moveTo(-40, -30);
        c.lineTo(34, -5);
        c.stroke();
      }

      c.restore();
    }

    function drawVolcano(c, x, y, scale = 1) {
      c.save();
      c.translate(x, y);
      c.scale(scale, scale);
      c.fillStyle = '#4d352c';
      c.beginPath();
      c.moveTo(-36, 20);
      c.lineTo(0, -46);
      c.lineTo(38, 20);
      c.closePath();
      c.fill();
      c.fillStyle = 'rgba(255,90,50,.82)';
      c.beginPath();
      c.moveTo(-8, -34);
      c.lineTo(0, -47);
      c.lineTo(10, -34);
      c.closePath();
      c.fill();
      c.restore();
    }

    function drawCrater(c, x, y, scale = 1) {
      c.save();
      c.translate(x, y);
      c.scale(scale, scale);
      c.strokeStyle = 'rgba(80,55,44,.75)';
      c.lineWidth = 8;
      c.beginPath();
      c.ellipse(0, 0, 44, 18, -0.08, 0, Math.PI * 2);
      c.stroke();
      c.fillStyle = 'rgba(45,35,32,.34)';
      c.beginPath();
      c.ellipse(0, 0, 36, 12, -0.08, 0, Math.PI * 2);
      c.fill();
      c.restore();
    }

    function drawRecentEventOverlay(c, w, h, region) {
      const fresh = region.lastEventAt != null ? clamp((state.age - region.lastEventAt) / 8_000_000, 0, 1) : 1;
      const evA = (1 - fresh) * .9;
      if (evA <= .05) return;

      if (['conflict', 'collapse', 'meteor'].includes(region.lastEventType)) {
        c.fillStyle = `rgba(140,20,20,${0.22 * evA})`;
        c.fillRect(0, 0, w, h);
      } else if (['prosper', 'origin'].includes(region.lastEventType)) {
        c.fillStyle = `rgba(255,220,120,${0.15 * evA})`;
        c.fillRect(0, 0, w, h);
      } else if (['expansion', 'ecosystem'].includes(region.lastEventType)) {
        c.fillStyle = `rgba(120,255,160,${0.13 * evA})`;
        c.fillRect(0, 0, w, h);
      } else if (region.lastEventType === 'tectonic') {
        c.fillStyle = `rgba(255,170,90,${0.15 * evA})`;
        c.fillRect(0, 0, w, h);
      }
    }

    function drawAreaMap(region) {
      const map = $('areaMapCanvas');
      if (!map || !region) return;

      const c = map.getContext('2d');
      const w = map.width;
      const h = map.height;
      const rand = seeded(state.seed + region.id * 991);

      c.clearRect(0, 0, w, h);

      const sky = c.createLinearGradient(0, 0, 0, h);
      if (region.isOcean) {
        sky.addColorStop(0, '#3f79ad');
        sky.addColorStop(.48, '#226b97');
        sky.addColorStop(1, '#0d3d5f');
      } else if (region.climate === '乾燥') {
        sky.addColorStop(0, '#cf965f');
        sky.addColorStop(.55, '#9a663f');
        sky.addColorStop(1, '#55351f');
      } else if (region.climate === '寒冷') {
        sky.addColorStop(0, '#c9e9ff');
        sky.addColorStop(.55, '#77a7cb');
        sky.addColorStop(1, '#31506f');
      } else if (region.climate === '湿潤' || region.climate === '熱帯') {
        sky.addColorStop(0, '#3573a0');
        sky.addColorStop(.5, '#246b58');
        sky.addColorStop(1, '#173822');
      } else {
        sky.addColorStop(0, '#3e6d98');
        sky.addColorStop(.55, '#3b7355');
        sky.addColorStop(1, '#263f2d');
      }
      c.fillStyle = sky;
      c.fillRect(0, 0, w, h);

      if (region.isOcean) {
        drawSeaMap(c, w, h, rand, region);
      } else {
        drawLandMap(c, w, h, rand, region);
      }

      if (region.uplift) {
        for (let i = 0; i < 5; i++) drawMountain(c, 70 + i * 72 + rand() * 30, h * (.55 + rand() * .08), 1 + rand() * .5, region.climate === '寒冷');
      }

      if (region.volcano) drawVolcano(c, w * .22, h * .56, 1.15);
      if (region.crater) drawCrater(c, w * .48, h * .66, 1.18);
      if (region.city) drawLargeCity(c, w, h, region);
      if (region.ruin) drawRuinMap(c, w, h);

      if (civLevel() >= 7 && region.city) {
        c.strokeStyle = 'rgba(126,232,255,.78)';
        c.lineWidth = 4;
        c.beginPath();
        c.moveTo(w * .76, h * .62);
        c.lineTo(w * .84, h * .16);
        c.stroke();
        c.fillStyle = 'rgba(126,232,255,.95)';
        c.beginPath();
        c.arc(w * .84, h * .16, 7, 0, Math.PI * 2);
        c.fill();
      }

      c.fillStyle = 'rgba(0,0,0,.16)';
      c.fillRect(0, 0, w, h);
    }

    function drawSeaMap(c, w, h, rand, region) {
      c.fillStyle = 'rgba(21,89,130,.9)';
      c.fillRect(0, h * .36, w, h * .64);

      for (let i = 0; i < 12; i++) {
        c.strokeStyle = `rgba(255,255,255,${.10 + i * .005})`;
        c.lineWidth = 2;
        c.beginPath();
        const y = h * .44 + i * 22;
        c.moveTo(0, y);
        for (let x = 0; x <= w; x += 40) {
          c.quadraticCurveTo(x + 20, y - 7 + rand() * 14, x + 40, y);
        }
        c.stroke();
      }

      for (let i = 0; i < 4; i++) {
        const x = rand() * w;
        const y = h * (.42 + rand() * .35);
        c.fillStyle = region.climate === '寒冷' ? '#e8f7ff' : '#3b7d46';
        c.beginPath();
        c.ellipse(x, y, 46 + rand() * 42, 14 + rand() * 10, rand() * .4, 0, Math.PI * 2);
        c.fill();
      }
    }

    function drawLandMap(c, w, h, rand, region) {
      c.fillStyle = region.climate === '乾燥' ? '#9a6a3c'
        : region.climate === '寒冷' ? '#d8ecff'
        : region.climate === '湿潤' || region.climate === '熱帯' ? '#2d6f3f'
        : '#4f7d3d';
      c.fillRect(0, h * .45, w, h * .55);

      if (region.climate !== '乾燥' && region.climate !== '寒冷') {
        for (let i = 0; i < 24; i++) {
          drawTree(c, rand() * w, h * (.55 + rand() * .35), false);
        }
      }

      if (region.climate === '乾燥') {
        for (let i = 0; i < 10; i++) {
          drawCactus(c, rand() * w, h * (.62 + rand() * .28));
        }
      }

      if (region.climate === '寒冷') {
        for (let i = 0; i < 10; i++) {
          drawMountain(c, rand() * w, h * (.55 + rand() * .18), .8 + rand() * .5, true);
        }
      }

      if (region.climate === '湿潤' || region.baseName.includes('河')) {
        c.strokeStyle = 'rgba(80,190,230,.72)';
        c.lineWidth = 16;
        c.beginPath();
        c.moveTo(-20, h * .58);
        c.bezierCurveTo(w * .2, h * .50, w * .38, h * .78, w + 20, h * .66);
        c.stroke();
        c.strokeStyle = 'rgba(220,255,255,.35)';
        c.lineWidth = 4;
        c.stroke();
      }
    }

    function drawMountain(c, x, y, scale, snow) {
      c.save();
      c.translate(x, y);
      c.scale(scale, scale);
      c.fillStyle = '#51483e';
      c.beginPath();
      c.moveTo(-45, 25);
      c.lineTo(0, -60);
      c.lineTo(48, 25);
      c.closePath();
      c.fill();
      if (snow) {
        c.fillStyle = '#ecf8ff';
        c.beginPath();
        c.moveTo(-14, -35);
        c.lineTo(0, -60);
        c.lineTo(16, -34);
        c.closePath();
        c.fill();
      }
      c.restore();
    }

    function drawLargeCity(c, w, h, region) {
      c.save();
      c.translate(w * .62, h * .65);
      const color = region.ruin ? 'rgba(90,80,72,.86)' : 'rgba(255,218,118,.86)';
      c.fillStyle = color;
      for (let i = 0; i < 8; i++) {
        const x = -100 + i * 24;
        const bh = 38 + (i % 3) * 22 + Math.random() * 8;
        c.fillRect(x, -bh, 18 + (i % 2) * 6, bh);
      }
      c.fillStyle = 'rgba(255,240,160,.34)';
      c.fillRect(-112, 0, 220, 12);
      c.restore();
    }

    function drawRuinMap(c, w, h) {
      c.save();
      c.translate(w * .60, h * .67);
      c.fillStyle = 'rgba(76,70,66,.9)';
      for (let i = 0; i < 7; i++) {
        const x = -95 + i * 28;
        const bh = 30 + (i % 4) * 16;
        c.fillRect(x, -bh, 18, bh);
      }
      c.strokeStyle = 'rgba(20,20,20,.55)';
      c.lineWidth = 4;
      c.beginPath();
      c.moveTo(-105, -20);
      c.lineTo(95, 8);
      c.stroke();
      c.restore();
    }

    function pointToRegion(x, y) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const px = (x - rect.left) * scaleX;
      const py = (y - rect.top) * scaleY;

      const cx = canvas.width / 2;
      const cy = canvas.height * .505;
      const radius = Math.min(canvas.width, canvas.height) * .36;
      const nx = (px - cx) / radius;
      const ny = -(py - cy) / radius;

      if (nx * nx + ny * ny > 1) return null;

      const z = Math.sqrt(1 - nx * nx - ny * ny);
      const cosX = Math.cos(-state.rotX);
      const sinX = Math.sin(-state.rotX);
      const y0 = ny * cosX - z * sinX;
      const z0 = ny * sinX + z * cosX;
      const lon = Math.atan2(nx, z0) - state.rotY;
      const lat = Math.asin(clamp(y0, -1, 1));

      let best = null;
      let bestD = Infinity;

      for (const r of state.regions) {
        const dLon = Math.atan2(Math.sin(r.lon - lon), Math.cos(r.lon - lon));
        const dLat = r.lat - lat;
        const d = dLon * dLon + dLat * dLat * 1.6;
        if (d < bestD) {
          bestD = d;
          best = r;
        }
      }

      return best;
    }

    function regionSummary(region) {
      const ll = lifeLevel();
      const cl = civLevel();

      if (region.crater) return '巨大隕石孔 / 生態系再編中';
      if (state.collapse && region.ruin) return '旧都市跡 / 再野生化と再興候補';
      if (region.volcano) return '火山帯 / 地殻変動の影響あり';
      if (cl >= 7 && region.city) return '宇宙港・軌道施設あり';
      if (cl >= 5 && region.city) return '高密度都市圏 / 環境負荷あり';
      if (cl >= 3 && region.city) return '都市文明圏 / 交易と政治の中心';
      if (cl >= 2 && region.city) return '初期定住地 / 農耕と集落';
      if (ll >= 8) return '知性候補の活動圏';
      if (ll >= 6) return '大型生物が繁栄';
      if (ll >= 3) return region.isOcean ? '微生物・海洋生命が拡大' : '地衣類と初期陸上生命';
      return '生命の兆候は薄い';
    }

    function regionDetails(region) {
      const species = state.intelligence;
      const speciesLine = species ? `${species.speciesName}（${species.name}）` : '未出現';

      let note = '';
      if (region.crater) note = '巨大隕石によるクレーターが残っています。生態系は一度大きく崩れ、別の系統が台頭する可能性があります。';
      else if (region.ruin) note = 'かつて文明の中心地でしたが、崩壊後は廃墟と二次生態系が混在しています。';
      else if (region.volcano || region.uplift) note = '地殻変動の影響で地形が大きく変化しています。新しい資源や隔離環境が進化に影響します。';
      else if (region.city) note = '文明都市が形成されています。地名も文明段階に応じて更新されています。';
      else if (lifeLevel() >= 8) note = '道具使用や群れ行動を持つ生物が観測される可能性があります。';
      else if (lifeLevel() >= 5) note = '生命圏が厚くなり、捕食・防御・繁殖戦略の競争が進んでいます。';
      else note = 'まだ文明の気配はありません。地形と気候が今後の進化圧になります。';

      return { speciesLine, note };
    }

    function selectRegion(region, show = true) {
      if (!region) return;
      state.selectedRegionId = region.id;
      if (show) showWipe(region);
      uiState.detailDirty = true;
      updateAll(true);
    }

    function showWipe(region) {
      drawWipeScene(region);
      $('wipeName').textContent = region.currentName;
      $('wipeLine').textContent = `${region.climate} / ${regionSummary(region)}`;
      $('wipe').classList.add('show');
    }

    function hideWipe() {
      $('wipe').classList.remove('show');
    }

    function markRegionEvent(region, eventType) {
      if (!region) return;
      region.lastEventType = eventType;
      region.lastEventAt = state.age;
      uiState.detailDirty = state.mode === 'region' || state.mode === 'record';
    }

    function pinSelected() {
      const id = state.selectedRegionId;
      if (id == null) return;

      if (state.pinnedRegionIds.includes(id)) return;

      if (state.pinnedRegionIds.length >= 3) {
        alert('ピン留めは最大3つまでです。新しく追加するには、どれか1つを閉じてください。');
        return;
      }

      state.pinnedRegionIds.push(id);
      state.dirty = true;
      uiState.pinsDirty = true;
      saveState(false);
      updateAll(true);
    }

    function unpin(id) {
      state.pinnedRegionIds = state.pinnedRegionIds.filter(x => x !== id);
      state.dirty = true;
      uiState.pinsDirty = true;
      saveState(false);
      updateAll(true);
    }

    function spendPoints(cost) {
      if (state.points < cost) {
        toast(`観測点が足りません：必要 ${cost}`);
        return false;
      }
      state.points -= cost;
      state.dirty = true;
      return true;
    }

    function runIntervention(kind) {
      if (state.ended) {
        toast('エンディング後は介入できません');
        return;
      }

      const region = state.regions.find(r => r.id === state.selectedRegionId) || pick(state.regions);

      if (kind === 'tectonic') {
        if (!spendPoints(90)) return;
        triggerTectonic(false, region);
      }

      if (kind === 'meteor') {
        if (!confirm('巨大隕石は生態系や文明を大きく破壊します。本当に介入しますか？')) return;
        if (!spendPoints(280)) return;
        triggerMeteor(false, region);
      }

      if (kind === 'stabilize') {
        if (!spendPoints(130)) return;
        state.env.stability = clamp(state.env.stability + .14, 0, 1);
        state.env.disaster = clamp(state.env.disaster - .08, 0, 1);
        addLog('planet', '観測介入：気候安定化', '観測点を使い、惑星環境の急変を抑えました。', true, { points: 0 });
        triggerFx('civilization', .8);
      }

      if (kind === 'preserve') {
        if (!spendPoints(110)) return;
        for (const r of state.regions) {
          r.biodiversity = clamp(r.biodiversity + .06, 0, 1);
          r.pollution = clamp(r.pollution - .03, 0, 1);
        }
        addLog('life', '観測介入：生命圏保護', '複数地域で生態系の回復力を高めました。', true, { points: 0 });
        triggerFx('intelligence', .7);
      }

      if (kind === 'guideCiv') {
        if (!spendPoints(170)) return;
        state.env.socialPressure = clamp(state.env.socialPressure + .04, 0, 1);
        for (const r of state.regions) {
          if (r.city) r.pollution = clamp(r.pollution - .04, 0, 1);
        }
        addLog('civ', '観測介入：文明助言', '文明に間接的な助言を送り、都市圏の破局リスクを少し抑えました。', true, { points: 0 });
        triggerFx('space', .7);
      }

      if (kind === 'filterPrep') {
        if (state.greatFilter.status !== 'warning') {
          toast('グレートフィルター兆候がまだ出ていません');
          return;
        }
        const cost = 180;
        if (!spendPoints(cost)) return;
        state.greatFilter.prep += 140;
        addLog('planet', '観測介入：フィルター対策', `${state.greatFilter.type.label} への対策を進めました。`, true, { points: 0 });
        triggerFx('filter', 1);
      }

      markAllDirty();
      updateAll(true);
    }

    function updateStats() {
      $('planetName').textContent = state.name;
      $('ageText').textContent = '経過 ' + formatAge(state.age);
      $('lifeStageText').textContent = getStage(LIFE_STAGES, state.age).label;
      $('civStageText').textContent = state.collapse ? '文明崩壊後' : getStage(CIV_STAGES, state.age).label;
      $('pointText').textContent = Math.floor(state.points).toLocaleString();

      const gf = state.greatFilter;
      if (state.ended) $('filterText').textContent = '決着済み';
      else if (gf.status === 'warning') $('filterText').textContent = gf.type.label;
      else if (gf.status === 'resolved') $('filterText').textContent = '通過済み';
      else $('filterText').textContent = '未発生';

      $('speedDisplay').innerHTML = `<b>${SPEED_LABELS[state.speedIndex]}</b><small>${SPEED_HELP[state.speedIndex]}</small>`;
      $('pauseBtn').textContent = state.paused || state.speedIndex === 0 ? '▶ 再開' : '⏸ 一時停止';

      const styleName = TIME_STYLES[state.timeStyle] || TIME_STYLES.evolution;
      const manual = state.manualSpeedOffset ? '（手動調整中）' : '';
      $('styleState').textContent = `現在: ${styleName}${manual}`;
    }

    function updateAll(forceHeavy = false) {
      updateStats();

      if (forceHeavy || uiState.modeDirty) {
        document.querySelectorAll('.modePanel button').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
        uiState.modeDirty = false;
      }

      if (forceHeavy || uiState.pinsDirty) {
        updatePins();
        uiState.pinsDirty = false;
      }

      if (forceHeavy || uiState.detailDirty) {
        updateDetailPanel();
        uiState.detailDirty = false;
      }

      if (forceHeavy || uiState.logsDirty) {
        updateLogs();
        uiState.logsDirty = false;
      }
    }

    function updatePins() {
      $('pinCount').textContent = `${state.pinnedRegionIds.length}/3`;
      $('pinTray').classList.toggle('show', state.pinnedRegionIds.length > 0);

      const list = $('pinList');
      list.innerHTML = '';

      for (const id of state.pinnedRegionIds) {
        const r = state.regions.find(x => x.id === id);
        if (!r) continue;

        const div = document.createElement('div');
        div.className = 'pinCard';
        div.innerHTML = `
          <div class="pinName">${escapeHtml(r.currentName)}</div>
          <div class="pinState">${escapeHtml(regionSummary(r))}</div>
          <button data-unpin="${r.id}">閉じる</button>
        `;

        div.addEventListener('click', (e) => {
          if (e.target.dataset.unpin != null) return;
          selectRegion(r);
          state.mode = 'region';
          uiState.modeDirty = true;
          uiState.detailDirty = true;
          updateAll(true);
        });

        list.appendChild(div);
      }

      list.querySelectorAll('[data-unpin]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          unpin(Number(btn.dataset.unpin));
        });
      });
    }

    function updateDetailPanel() {
      const panel = $('detailPanel');

      if (state.mode === 'planet') {
        const env = state.env;
        const gf = state.greatFilter;
        panel.innerHTML = `
          <div class="detailHeader"><h2>惑星観察</h2><span class="tag">星全体</span></div>
          <p class="modeHint">惑星全体の環境・危機・グレートフィルターを見る画面です。個別の土地を見るなら「地域」、生物の系統を見るなら「生命圏」。</p>

          <div class="modeGuide">
            <div class="guideCard"><b>🌍 惑星</b><small>海洋率、重力、気候、地殻活動、全体リスク。</small></div>
            <div class="guideCard"><b>📍 地域</b><small>タップした土地のエリアマップ、都市、廃墟、火山、クレーター。</small></div>
            <div class="guideCard"><b>🧬 生命圏</b><small>進化元、知的生命体、特徴、文明への影響。</small></div>
          </div>

          ${greatFilterHtml()}

          <div class="infoGrid">
            <div class="infoItem"><small>海洋率</small><b>${Math.round(env.ocean * 100)}%</b></div>
            <div class="infoItem"><small>重力</small><b>${env.gravity.toFixed(2)}G</b></div>
            <div class="infoItem"><small>気候傾向</small><b>${env.temperature > .66 ? '高温' : env.temperature < .33 ? '寒冷' : '温和'}・${env.humidity > .62 ? '湿潤' : env.humidity < .35 ? '乾燥' : '中庸'}</b></div>
            <div class="infoItem"><small>地殻活動</small><b>${env.tectonics > .65 ? '活発' : env.tectonics < .3 ? '静穏' : '中程度'}</b></div>
            <div class="infoItem"><small>全体リスク</small><b>${riskValue()}%</b></div>
            <div class="infoItem"><small>残り観測点</small><b>${Math.floor(state.points)}</b></div>
          </div>

          ${interventionHtml()}
        `;
        return;
      }

      if (state.mode === 'region') {
        const r = state.regions.find(x => x.id === state.selectedRegionId) || state.regions[0];
        if (!r) return;

        const d = regionDetails(r);
        panel.innerHTML = `
          <div class="detailHeader"><h2>${escapeHtml(r.currentName)}</h2><span class="tag">地域</span></div>
          <p class="modeHint">選択した土地のエリアマップです。「詳しく」を押したときもここが開きます。火山・都市・廃墟・クレーターなどを地形として確認できます。</p>
