          <div class="areaMapWrap">
            <canvas id="areaMapCanvas" width="720" height="430" aria-label="地域エリアマップ"></canvas>
            <div class="mapLegend">
              <span>🌲植生</span>
              <span>⛰地形</span>
              <span>🏛都市/廃墟</span>
              <span>☄クレーター</span>
              <span>🌋火山</span>
            </div>
          </div>

          <div class="infoGrid">
            <div class="infoItem"><small>旧名履歴</small><b>${escapeHtml(r.historyNames.slice(-3).join(' → '))}</b></div>
            <div class="infoItem"><small>気候/地形</small><b>${escapeHtml(r.climate)}・${r.isOcean ? '海洋/沿岸' : '陸域'}</b></div>
            <div class="infoItem"><small>支配文明種</small><b>${escapeHtml(d.speciesLine)}</b></div>
            <div class="infoItem"><small>状態</small><b>${escapeHtml(regionSummary(r))}</b></div>
            <div class="infoItem wide"><small>地域メモ</small><p class="desc">${escapeHtml(d.note)}</p></div>
          </div>

          ${interventionHtml(true)}

          <details class="fold">
            <summary>地域名履歴の詳細</summary>
            <div class="foldBody"><p class="desc">${escapeHtml(r.historyNames.join(' → '))}</p></div>
          </details>
        `;

        requestAnimationFrame(() => drawAreaMap(r));
        return;
      }

      if (state.mode === 'biosphere') {
        const species = state.intelligence;
        panel.innerHTML = `
          <div class="detailHeader"><h2>生命圏観察</h2><span class="tag">進化</span></div>
          <p class="modeHint">この画面は「土地」ではなく、星全体の生命進化と知的生命体の系統を見る場所です。</p>

          <div class="bars">
            ${barHtml('生物多様性', avg(state.regions.map(r => r.biodiversity)))}
            ${barHtml('環境安定度', state.env.stability)}
            ${barHtml('社会性圧', state.env.socialPressure)}
            ${barHtml('災害圧', state.env.disaster)}
          </div>

          <div class="infoGrid" style="margin-top:10px">
            <div class="infoItem wide"><small>進化元系統 / 出現種</small><b>${species ? `${escapeHtml(species.base)} → ${escapeHtml(species.speciesName)}` : 'まだ知性候補の選抜前です。'}</b></div>
            <div class="infoItem wide"><small>主要特徴</small><b>${species ? escapeHtml(species.traits.join('・')) : '惑星環境の偏りに応じて系統が選抜されます。'}</b></div>
            <div class="infoItem wide"><small>文明への影響</small><p class="desc">${species ? escapeHtml(species.culture) : '哺乳系・爬虫系・鳥類系・節足系・海洋頭足系・菌類群体などから候補が出ます。'}</p></div>
          </div>

          <details class="fold">
            <summary>生命圏詳細</summary>
            <div class="foldBody">
              <div class="chipRow">
                <span class="chip">海洋率 ${Math.round(state.env.ocean * 100)}%</span>
                <span class="chip">湿度 ${Math.round(state.env.humidity * 100)}%</span>
                <span class="chip">森林適性 ${Math.round(state.env.forest * 100)}%</span>
                <span class="chip">安定度 ${Math.round(state.env.stability * 100)}%</span>
              </div>
            </div>
          </details>
        `;
        return;
      }

      if (state.mode === 'record') {
        panel.innerHTML = recordHtml();
      }
    }

    function greatFilterHtml() {
      const gf = state.greatFilter;
      if (gf.status === 'none') {
        return `
          <div class="endingBanner">
            <b>グレートフィルター：未発生</b>
            <p class="desc">文明が成熟すると、惑星全体の最終試練として兆候が出ます。対策には観測点が必要です。</p>
          </div>
        `;
      }

      if (gf.status === 'warning') {
        const remain = Math.max(0, gf.resolveAt - state.age);
        return `
          <div class="endingBanner">
            <b>グレートフィルター兆候：${escapeHtml(gf.type.label)}</b>
            <p class="desc">${escapeHtml(gf.type.sign)}</p>
            <div class="chipRow">
              <span class="chip">対策値 ${Math.floor(gf.prep)} / 推奨 ${gf.type.cost}</span>
              <span class="chip">決着まで 約${formatAge(remain)}</span>
              <span class="chip">リスク ${riskValue()}%</span>
            </div>
          </div>
        `;
      }

      return `
        <div class="endingBanner">
          <b>グレートフィルター：決着済み</b>
          <p class="desc">${state.ending ? escapeHtml(state.ending.title) : '記録済み'}</p>
        </div>
      `;
    }

    function interventionHtml(regionOnly = false) {
      return `
        <details class="interventionBox">
          <summary>観測介入 / 観測点を使う</summary>
          <p class="styleState">観測点を消費して、惑星史に限定介入できます。グレートフィルター対策用に温存する判断も重要です。</p>
          <div class="interventionGrid">
            <button data-action="tectonic">地殻変動 90</button>
            <button data-action="meteor">巨大隕石 280</button>
            <button data-action="stabilize">気候安定化 130</button>
            <button data-action="preserve">生命圏保護 110</button>
            <button data-action="guideCiv">文明助言 170</button>
            <button data-action="filterPrep">GF対策 180</button>
          </div>
        </details>
      `;
    }

    function recordHtml() {
      const lifeLogs = state.logs.filter(l => l.type === 'life').length;
      const civLogs = state.logs.filter(l => l.type === 'civ').length;
      const planetLogs = state.logs.filter(l => l.type === 'planet').length;

      const ending = state.ended ? `
        <div class="endingBanner">
          <b>創星日誌：${escapeHtml(state.ending.title)}</b>
          <p class="desc">この惑星の観測は一区切りです。観測者タイプを変えると、同じ歴史を別の語り口で再読できます。</p>
        </div>

        <details class="fold" open>
          <summary>観測者タイプを選ぶ</summary>
          <div class="foldBody">
            <div class="observerGrid">
              ${Object.entries(OBSERVERS).map(([id, o]) => {
                const unlocked = state.meta.unlockedObservers.includes(id);
                return `<button class="${unlocked ? '' : 'locked'}" data-observer="${id}" ${unlocked ? '' : 'disabled'}>${escapeHtml(o.label)}${unlocked ? '' : ' 🔒'}</button>`;
              }).join('')}
            </div>
            <p class="styleState">現在：${escapeHtml(OBSERVERS[state.journalObserver]?.label || '通常観測者')}</p>
          </div>
        </details>

        <div class="journalBox">${escapeHtml(generateJournal(state.journalObserver))}</div>

        <div class="quickRow" style="margin-top:10px">
          <button data-action="nextPlanet">次の惑星へ</button>
          <button data-action="saveJournal">日誌を保存</button>
          <button data-action="copyJournal">日誌コピー</button>
        </div>
      ` : `
        <div class="endingBanner">
          <b>創星日誌：未完成</b>
          <p class="desc">エンディング到達後、この惑星が辿った歴史が観測日誌として生成されます。</p>
        </div>
      `;

      return `
        <div class="detailHeader"><h2>観測記録</h2><span class="tag">日誌</span></div>

        <div class="infoGrid">
          <div class="infoItem"><small>生命ログ</small><b>${lifeLogs}件</b></div>
          <div class="infoItem"><small>文明ログ</small><b>${civLogs}件</b></div>
          <div class="infoItem"><small>惑星ログ</small><b>${planetLogs}件</b></div>
          <div class="infoItem"><small>解放観測者</small><b>${state.meta.unlockedObservers.length}タイプ</b></div>
          <div class="infoItem wide"><small>現在の読みどころ</small><p class="desc">${escapeHtml(currentHighlight())}</p></div>
        </div>

        ${ending}

        <details class="fold">
          <summary>重要イベント一覧</summary>
          <div class="foldBody">
            ${state.logs.filter(l => l.important).slice(0, 18).map((l, i) => `
              <div class="logItem" data-important-index="${i}">
                <div class="logAge">${formatAge(l.age)}</div>
                <div class="logText"><span class="logType">${typeLabel(l.type)}</span><b>${escapeHtml(l.title)}</b><br>${escapeHtml(l.text)}</div>
              </div>
            `).join('') || '<p class="desc">まだ重要イベントがありません。</p>'}
          </div>
        </details>
      `;
    }

    function currentHighlight() {
      if (state.ended) return 'エンディング到達済みです。観測者タイプを変えて創星日誌を再読できます。';
      if (state.greatFilter.status === 'warning') return `${state.greatFilter.type.label} が進行中です。観測点を使うか、温存してきた結果を見届けるかの分岐です。`;
      if (state.collapse) return '文明崩壊後の再野生化と旧都市跡の変化を観測できます。';
      if (civLevel() >= 7) return '宇宙進出段階です。グレートフィルターの兆候に注意してください。';
      if (civLevel() >= 3) return '地域名・都市圏・勢力圏が変化しています。地名履歴を見ると土地の年代記が見えます。';
      if (state.intelligence) return '知的生命体が出現しました。文明発祥地になりそうな地域を探してみてください。';
      if (lifeLevel() >= 6) return '大型生物と知性候補の前段階です。地域ごとの生物相が変化しています。';
      return '生命誕生前後の長期観測中です。時間速度を上げると進化イベントが見えやすくなります。';
    }

    function barHtml(label, v) {
      const pct = Math.round(clamp(v, 0, 1) * 100);
      return `<div class="barLine"><span>${label}</span><div class="barTrack"><div class="barFill" style="width:${pct}%"></div></div><span>${pct}%</span></div>`;
    }

    function updateLogs() {
      const list = $('logList');
      const logs = state.logs.filter(l => state.logFilter === 'all' || l.type === state.logFilter).slice(0, state.mode === 'record' ? 90 : 22);

      $('logCount').textContent = `${state.logs.length}件`;

      list.innerHTML = logs.map((l, i) => `
        <div class="logItem" data-log-index="${i}">
          <div class="logAge">${formatAge(l.age)}</div>
          <div class="logText"><span class="logType">${typeLabel(l.type)}</span><b>${escapeHtml(l.title)}</b><br>${escapeHtml(l.text)}</div>
        </div>
      `).join('') || '<div class="logText">まだ記録がありません。</div>';

      document.querySelectorAll('.logFilters button').forEach(b => b.classList.toggle('active', b.dataset.log === state.logFilter));

      list.querySelectorAll('[data-log-index]').forEach((el, i) => {
        const log = logs[i];
        el.addEventListener('click', () => openEventModal(log));
      });
    }

    function openEventModal(log) {
      if (!log) return;

      applyModalPauseIfNeeded();

      $('modalTitle').textContent = log.title || 'イベント';
      $('modalType').textContent = typeLabel(log.type);
      $('modalAge').textContent = formatAge(log.age || 0);
      $('modalBody').textContent = log.text || '';

      const btn = $('modalRegionBtn');
      btn.style.display = Number.isInteger(log.regionId) ? 'block' : 'none';
      btn.onclick = () => {
        const region = state.regions.find(r => r.id === log.regionId);
        if (region) {
          selectRegion(region, true);
          state.mode = 'region';
          markAllDirty();
          updateAll(true);
        }
        closeEventModal();
      };

      $('eventModal').classList.add('show');
    }

    function applyModalPauseIfNeeded() {
      if (state.modalPauseBackup) return;
      state.modalPauseBackup = {
        paused: state.paused,
        speedIndex: state.speedIndex,
        lastSpeedIndex: state.lastSpeedIndex
      };
      state.paused = true;
      updateStats();
    }

    function restoreModalPauseIfNeeded() {
      if (!state.modalPauseBackup) return;

      const b = state.modalPauseBackup;
      state.paused = b.paused;
      state.speedIndex = b.speedIndex;
      state.lastSpeedIndex = b.lastSpeedIndex;
      state.modalPauseBackup = null;
      updateStats();
    }

    function closeEventModal() {
      $('eventModal').classList.remove('show');
      restoreModalPauseIfNeeded();
    }

    function generateJournal(observerId) {
      const obs = observerId || 'normal';
      const ending = state.ending || {
        title: '観測未完了',
        body: 'この星の物語はまだ途中です。',
        filterType: '未発生',
        risk: riskValue()
      };

      const species = state.intelligence
        ? `${state.intelligence.speciesName}（${state.intelligence.name}）`
        : '知的生命体は未出現';

      const major = state.logs
        .filter(l => l.important)
        .slice(0, 9)
        .reverse()
        .map(l => `・${formatAge(l.age)}：${l.title}`)
        .join('\n');

      const base = {
        title: `創星日誌：${state.name}`,
        env: `海洋率${Math.round(state.env.ocean * 100)}%、重力${state.env.gravity.toFixed(2)}G。${getStage(LIFE_STAGES, state.age).label}を経て、文明段階は「${state.collapse ? '文明崩壊後' : getStage(CIV_STAGES, state.age).label}」に到達した。`,
        species: `この星の知的生命体は、${species}。`,
        events: major || '重要イベントはまだ少ない。',
        ending: `${ending.title}。${ending.body}`,
        thought: `観測者所見：この星は、偶然と選択と災害の重なりの中で、ひとつの結末へ到達した。`
      };

      if (obs === 'childGirl') {
        return `${base.title}

この星は、ながいながい時間をかけて変わっていったのです。
${base.env}

${base.species}
小さな命たちは、何度もこわいことに出会ったの。
でも、そのたびに、次の命がちゃんと続きを受け取っていたのです。

おぼえておきたいこと：
${base.events}

さいご：
${base.ending}

所見：
星の歴史は、うれしいことだけじゃなかったのです。
でも、消えてしまった命も、残った命も、ちゃんとこの日誌の中にいるの。`;
      }

      if (obs === 'childBoy') {
        return `${base.title}

この星、すごかった。
最初はただの星だったのに、海ができて、命が出て、文明まで進んだ。

${base.env}
${base.species}

大きな出来事：
${base.events}

さいごは「${ending.title}」。
${ending.body}

所見：
正直、途中で何回もダメかと思った。
でも、星ってけっこうしぶとい。そこが一番すごいと思う。`;
      }

      if (obs === 'foreigner') {
        return `${base.title}

ワタシ、この星を長く見ました。
${base.env}

${base.species}
命、小さいところから始まりました。でも、とても強かったです。

記録した大きな変化：
${base.events}

最後：
${base.ending}

所見：
ワタシ、少し泣きました。
この星、ただのデータではありません。がんばった星です。`;
      }

      if (obs === 'north') {
        return `${base.title}

いやぁ、長い観測だったなぁ。
${base.env}

${base.species}
小さい命からここまで来たんだから、たいしたもんだべ。

大きな出来事：
${base.events}

結末：
${base.ending}

所見：
いいことばっかりじゃなかった。
でも、よく耐えたなぁ。この星の歩み、ちゃんと残しておきたいべ。`;
      }

      if (obs === 'samurai') {
        return `${base.title}

この星の歩み、まこと長き戦にござった。
${base.env}

${base.species}
小さき命より始まり、やがて文明の旗を掲げるに至る。

主なる出来事：
${base.events}

終幕：
${base.ending}

所見：
滅びも栄えも、星の道なれば。
されど、ここまで歩みし命たちの志、見事なり。`;
      }

      if (obs === 'kyoto') {
        return `${base.title}

ほんに、長いお話どしたなぁ。
${base.env}

${base.species}
小さな命が積み重なって、いつしか文明の灯りになりました。

覚えておきたい出来事：
${base.events}

結び：
${base.ending}

所見：
灯りが増えるほど、影も濃うなります。
それでも歩みを止めへんかったこと、それがこの星の美しさやと思いますえ。`;
      }

      if (obs === 'gal') {
        return `${base.title}

この星、マジで波乱万丈。
${base.env}

${base.species}
生命の立ち上がりから文明の盛り上がりまで、普通にドラマ強すぎ。

重要イベント：
${base.events}

ラスト：
${base.ending}

所見：
いや、星ってこんなにエモいんだ。
滅びかけても、ちゃんと次に繋がってるの、かなり刺さる。`;
      }

      if (obs === 'oldGirl') {
        return `${base.title}

ほう、またひとつ星の物語が閉じたのじゃ。
${base.env}

${base.species}
小さき命は、何度も試練を受け、それでも枝を伸ばしたのじゃ。

星に刻まれし出来事：
${base.events}

結末：
${base.ending}

所見：
よう耐えた。よう迷いながら進んだ。
この星は、もうただの観測対象ではないのう。`;
      }

      if (obs === 'net') {
        return `${base.title}

星、無事${ending.result === 'breakthrough' ? '突破' : '死亡'}。
いや無事かどうかは諸説ある。

${base.env}
${base.species}

ログ的にデカかったやつ：
${base.events}

結末：
${base.ending}

所見：
ワイくん、途中で何回か「終わったわこれ」って言った。
でもこの星、想定より粘る。そこは普通に草、いや普通にすごい。`;
      }

      if (obs === 'transfer') {
        return `${base.title}

このルート、前世で見たやつに似ている。
${base.env}

${base.species}
進化元と環境条件を見る限り、文明化まではかなり順当。ただし危機フラグも早い段階で立っていた。

主要ログ：
${base.events}

エンディング：
${base.ending}

所見：
今回はここに着地した。
次周では、観測点の切り方を変えれば別ルートに入れるかもしれない。`;
      }

      return `${base.title}

${base.env}

${base.species}

主要観測記録：
${base.events}

結末：
${base.ending}

${base.thought}`;
    }

    function saveJournal() {
      const text = generateJournal(state.journalObserver);
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `創星日誌_${state.name}.txt`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }

    async function copyJournal() {
      try {
        await navigator.clipboard.writeText(generateJournal(state.journalObserver));
        toast('創星日誌をコピーしました');
      } catch {
        alert(generateJournal(state.journalObserver));
      }
    }

    function markAllDirty() {
      uiState.detailDirty = true;
      uiState.logsDirty = true;
      uiState.pinsDirty = true;
      uiState.modeDirty = true;
    }

    function saveState(showToast = true) {
      try {
        const data = {
          state: {
            ...state,
            milestones: Array.from(state.milestones)
          }
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        state.lastSave = performance.now();
        state.dirty = false;
        if (showToast) toast('保存しました');
      } catch {
        if (showToast) alert('保存に失敗しました。ブラウザの保存領域が使えない可能性があります。');
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return false;

        const data = JSON.parse(raw);
        if (!data || !data.state || !Array.isArray(data.state.regions) || !Array.isArray(data.state.logs) || !data.state.env) return false;

        Object.assign(state, data.state);
        state.milestones = new Set(data.state.milestones || []);
        state.meta = { ...defaultMeta(), ...(data.state.meta || {}) };
        state.greatFilter = {
          status: 'none',
          type: null,
          warningAt: null,
          resolveAt: null,
          prep: 0,
          resolved: false,
          ...(data.state.greatFilter || {})
        };
        state.dirty = false;
        markAllDirty();
        return true;
      } catch {
        return false;
      }
    }

    function setupEvents() {
      let dragging = false;
      let startX = 0;
      let startY = 0;
      let lastX = 0;
      let lastY = 0;
      let moved = false;

      function pointerDown(e) {
        dragging = true;
        moved = false;
        startX = lastX = e.clientX;
        startY = lastY = e.clientY;
        canvas.setPointerCapture?.(e.pointerId);
      }

      function pointerMove(e) {
        if (!dragging) return;

        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;

        if (Math.abs(e.clientX - startX) + Math.abs(e.clientY - startY) > 10) moved = true;

        state.rotY += dx * 0.008;
        state.rotX = clamp(state.rotX + dy * 0.006, -Math.PI / 4, Math.PI / 4);

        lastX = e.clientX;
        lastY = e.clientY;
      }

      function pointerUp(e) {
        if (!dragging) return;
        dragging = false;

        if (!moved) {
          const r = pointToRegion(e.clientX, e.clientY);
          if (r) selectRegion(r, true);
        }
      }

      canvas.addEventListener('pointerdown', pointerDown);
      canvas.addEventListener('pointermove', pointerMove);
      canvas.addEventListener('pointerup', pointerUp);
      canvas.addEventListener('pointercancel', () => dragging = false);

      $('speedDown').addEventListener('click', () => {
        state.speedIndex = clamp(state.speedIndex - 1, 0, SPEEDS.length - 1);
        state.manualSpeedOffset = state.speedIndex - desiredSpeedIndex();
        state.paused = state.speedIndex === 0;
        updateAll(false);
      });

      $('speedUp').addEventListener('click', () => {
        state.speedIndex = clamp(state.speedIndex + 1, 0, SPEEDS.length - 1);
        state.manualSpeedOffset = state.speedIndex - desiredSpeedIndex();
        state.paused = false;
        updateAll(false);
      });

      $('pauseBtn').addEventListener('click', () => {
        if (state.ended) return;

        if (state.paused || state.speedIndex === 0) {
          state.speedIndex = state.lastSpeedIndex || 5;
          state.paused = false;
        } else {
          state.lastSpeedIndex = state.speedIndex;
          state.paused = true;
        }
        updateAll(false);
      });

      $('normalBtn').addEventListener('click', () => {
        if (state.ended) return;
        state.speedIndex = 4;
        state.manualSpeedOffset = state.speedIndex - desiredSpeedIndex();
        state.paused = false;
        updateAll(false);
      });

      $('fastBtn').addEventListener('click', () => {
        if (state.ended) return;
        state.speedIndex = 7;
        state.manualSpeedOffset = state.speedIndex - desiredSpeedIndex();
        state.paused = false;
        updateAll(false);
      });

      $('pinBtn').addEventListener('click', pinSelected);

      $('detailBtn').addEventListener('click', () => {
        const r = state.regions.find(x => x.id === state.selectedRegionId);
        if (r) {
          state.mode = 'region';
          markAllDirty();
          updateAll(true);
          requestAnimationFrame(() => drawAreaMap(r));
        }
      });

      $('closeWipeBtn').addEventListener('click', hideWipe);

      $('saveBtn').addEventListener('click', () => saveState(true));

      $('resetBtn').addEventListener('click', () => {
        if (confirm('新しい惑星で観測を開始しますか？現在の自動保存は上書きされます。')) {
          makePlanet();
        }
      });

      $('fullscreenBtn').addEventListener('click', async () => {
        try {
          if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
            $('fullscreenBtn').textContent = '解除';
          } else {
            await document.exitFullscreen();
            $('fullscreenBtn').textContent = '全画面';
          }
        } catch {
          toast('このブラウザでは全画面にできません');
        }
      });

      document.querySelectorAll('.modePanel button').forEach(btn => {
        btn.addEventListener('click', () => {
          state.mode = btn.dataset.mode;
          markAllDirty();
          updateAll(true);
        });
      });

      document.querySelectorAll('.logFilters button').forEach(btn => {
        btn.addEventListener('click', () => {
          state.logFilter = btn.dataset.log;
          uiState.logsDirty = true;
          updateAll(true);
        });
      });

      document.querySelectorAll('[data-style]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.timeStyle = btn.dataset.style;
          state.manualSpeedOffset = 0;
          applyStyleSpeed(true);
          state.paused = false;
          toast(`時間進行スタイル：${TIME_STYLES[state.timeStyle]}`);
          updateAll(false);
        });
      });

      $('detailPanel').addEventListener('click', (e) => {
        const action = e.target.closest('[data-action]');
        if (action) {
          const kind = action.dataset.action;
          if (kind === 'nextPlanet') {
            if (confirm('次の惑星へ進みますか？未使用観測点の一部は引き継がれます。')) makePlanet();
            return;
          }
          if (kind === 'saveJournal') {
            saveJournal();
            return;
          }
          if (kind === 'copyJournal') {
            copyJournal();
            return;
          }
          runIntervention(kind);
          return;
        }

        const observer = e.target.closest('[data-observer]');
        if (observer) {
          state.journalObserver = observer.dataset.observer;
          uiState.detailDirty = true;
          updateAll(true);
        }

        const important = e.target.closest('[data-important-index]');
        if (important && state.mode === 'record') {
          const logs = state.logs.filter(l => l.important).slice(0, 18);
          const log = logs[Number(important.dataset.importantIndex)];
          if (log) openEventModal(log);
        }
      });

      $('modalCloseBtn').addEventListener('click', closeEventModal);
      $('modalResumeBtn').addEventListener('click', closeEventModal);
      $('eventModal').addEventListener('click', (e) => {
        if (e.target.id === 'eventModal') closeEventModal();
      });
    }

    let last = performance.now();
    let lastUiUpdate = 0;

    function loop(now) {
      const dt = Math.min(0.08, (now - last) / 1000);
      last = now;

      tick(dt);
      drawPlanet();

      if (state.selectedRegionId != null && $('wipe').classList.contains('show')) {
        const r = state.regions.find(x => x.id === state.selectedRegionId);
        if (r) {
          $('wipeName').textContent = r.currentName;
          $('wipeLine').textContent = `${r.climate} / ${regionSummary(r)}`;
          drawWipeScene(r);
        }
      }

      if (now - lastUiUpdate > 500) {
        updateStats();
        lastUiUpdate = now;
      }

      requestAnimationFrame(loop);
    }

    function initialUiRefresh() {
      markAllDirty();
      updateAll(true);
      const r = state.regions[0];
      if (r) selectRegion(r, false);
    }

    setupEvents();
    if (!loadState()) makePlanet();
    else initialUiRefresh();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
