          <details class="fold devTestWrap" id="devTestFold"><summary>開発用テスト（誤操作注意）</summary><div class="foldBody"><div class="devGrid"><button data-dev="p500">観測点 +500</button><button data-dev="gf_sign">GF兆候を発生</button><button data-dev="gf_crisis">GF危機へ進行</button><button data-dev="gf_ok">GF突破テスト</button><button data-dev="gf_fail">GF失敗テスト</button><button data-dev="meteor3">巨大隕石3回扱い</button><button data-dev="end3">エンディング3種類達成</button><button data-dev="sp2">特殊エンド2種類達成</button><button data-dev="bk3">GF突破3回扱い</button><button data-dev="reunlock">解放判定を再実行</button><button data-dev="refresh">周回記録を再表示</button><button data-dev="save">テスト状態を保存</button></div><div class="infoItem wide" style="margin-top:8px"><small>状態</small><b>観測点 ${getObservationPoints()} / GF ${escapeHtml(state.greatFilter?.status || 'none')} (${escapeHtml(state.greatFilter?.type || '-')}) / Ending ${escapeHtml(state.currentEnding || '-')} / runId ${escapeHtml(state.runId || '-')}</b><p class="desc">endingsSeenNames: ${escapeHtml((state.metaProgress?.endingsSeenNames||[]).join(', ') || '-')}<br>specialEndingsSeen: ${escapeHtml((state.metaProgress?.specialEndingsSeen||[]).join(', ') || '-')}<br>breakthrough: ${state.metaProgress?.breakthroughSeenTotal||0} / failed: ${state.metaProgress?.failedSeenTotal||0}<br>unlockedObserverTypes: ${escapeHtml((state.metaProgress?.unlockedObserverTypes||[]).join(', ') || '-')}<br>unlockedPerks: ${escapeHtml((state.metaProgress?.unlockedPerks||[]).join(', ') || '-')}<br>journalArchive件数: ${state.journalArchive?.length||0}</p></div></div></details>
          <details class="fold"><summary>観測補助（演出確認用）</summary><div class="foldBody"><p class="desc">通常観測はそのままに、重要イベント演出だけを手動確認できます。</p><div class="assistBtns"><button data-assist="life">生命イベントを試す</button><button data-assist="intelligence">知的生命誕生を試す</button><button data-assist="civilization">文明成立を試す</button><button data-assist="hazard">危機イベントを試す</button><button data-assist="collapse">文明崩壊を試す</button><button data-assist="space">宇宙進出を試す</button></div></div></details>`;
      }
    }

    function currentHighlight() {
      if (state.collapse) return '文明崩壊後の再野生化と旧都市跡の変化を観測できます。';
      if (civLevel() >= 7) return '宇宙進出段階です。グレートフィルターを越えられるかが焦点です。';
      if (civLevel() >= 3) return '地域名・都市圏・勢力圏が変化しています。地名履歴を見ると土地の年代記が見えます。';
      if (state.intelligence) return '知的生命体が出現しました。文明発祥地になりそうな地域を探してみてください。';
      if (lifeLevel() >= 6) return '大型生物と知性候補の前段階です。地域ごとの生物相が変化しています。';
      return '生命誕生前後の長期観測中です。時間速度を上げると進化イベントが見えやすくなります。';
    }

    function barHtml(label, v) {
      const pct = Math.round(clamp(v,0,1)*100);
      return `<div class="barLine"><span>${label}</span><div class="barTrack"><div class="barFill" style="width:${pct}%"></div></div><span>${pct}%</span></div>`;
    }

    function eventThumbHtml(log) {
      if (!log.imageKey && !log.important) return `<div class="logThumb subtle"></div>`;
      if (!log.imageKey) return `<div class="logThumb"><div class="thumbFallback">${log.type === 'life' ? '🧬' : log.type === 'civ' ? '🏛️' : '🪐'}</div></div>`;
      const src = EVENT_IMAGES[log.imageKey];
      if (!src) return `<div class="logThumb"><div class="thumbFallback">✨</div></div>`;
      return `<div class="logThumb"><img src="${src}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'thumbFallback',textContent:'✨'}))"></div>`;
    }

    function updateLogs() {
      const list = $('logList');
      const logs = state.logs.filter(l => state.logFilter === 'all' || l.type === state.logFilter).slice(0, state.mode === 'record' ? 80 : 18);
      $('logCount').textContent = `${state.logs.length}件`;
      list.innerHTML = logs.map(l => `
        <div class="logItem">
          <div class="logAge">${formatAge(l.age)}</div>
          ${eventThumbHtml(l)}
          <div class="logText"><span class="logType">${l.type === 'life' ? '生命' : l.type === 'civ' ? '文明' : '惑星'}</span><b>${escapeHtml(l.title)}</b><br>${escapeHtml(l.text)}</div>
        </div>`).join('') || '<div class="logText">まだ記録がありません。</div>';
      document.querySelectorAll('.logFilters button').forEach(b => b.classList.toggle('active', b.dataset.log === state.logFilter));
      list.querySelectorAll('.logItem').forEach((el, i) => {
        const log = logs[i];
        const thumb = el.querySelector('.logThumb');
        if (!thumb || (!log.imageKey && !log.important)) return;
        thumb.style.cursor = 'pointer';
        thumb.addEventListener('click', (e) => { e.stopPropagation(); openEventModal(log); });
      });
    }

    function openEventModal(log) {
      const modal = $('eventModal');
      applyModalPauseIfNeeded();
      const preview = $('eventPreview');
      const src = log.imageKey ? EVENT_IMAGES[log.imageKey] : null;
      const icon = log.type === 'life' ? '🧬' : log.type === 'civ' ? '🏛️' : '🪐';
      const fallback = `<div class="thumbFallback" style="height:100%;background:linear-gradient(135deg,#283c6a,#1b2d4a)">${icon}</div>`;
      preview.innerHTML = src ? `<img src="${src}" alt="" onerror="this.parentNode.innerHTML='${fallback.replace(/'/g, '&#39;')}'">` : fallback;
      $('eventType').textContent = log.type === 'life' ? '生命' : log.type === 'civ' ? '文明' : '惑星';
      $('eventTitle').textContent = log.title || '';
      $('eventAge').textContent = formatAge(log.age || 0);
      $('eventBody').textContent = log.text || '';
      const rb = $('eventRegionBtn');
      rb.style.display = Number.isInteger(log.regionId) ? 'inline-block' : 'none';
      rb.onclick = () => {
        const region = state.regions.find(r => r.id === log.regionId);
        if (region) { selectRegion(region, true); state.mode = 'region'; uiState.modeDirty = true; uiState.detailDirty = true; updateAll(true); }
        closeEventModal();
      };
      modal.classList.add('show');
    }

    function closeEventModal() {
      $('eventModal').classList.remove('show');
      restoreModalPauseIfNeeded();
    }

    function avg(arr) { return arr.reduce((a,b)=>a+b,0) / Math.max(1, arr.length); }
    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
    }

    function saveState(showToast = true) {
      try {
        if (showToast) {
          state.logs.unshift({ type: 'planet', title: '保存', text: '現在の観測データをこの端末に保存しました。', age: state.age, important: false });
          if (state.logs.length > 180) state.logs.length = 180;
        }
        const data = {
          ...state,
          milestones: Array.from(state.milestones),
          fx: null,
          modalPauseBackup: null,
          lastSave: 0,
          modalLogIndex: null
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        state.lastSave = performance.now();
        state.dirty = false;
        if (showToast) {
          uiState.logsDirty = true;
          if (state.mode === 'record') uiState.detailDirty = true;
          updateAll(true);
        }
      } catch (e) {
        if (showToast) alert('保存に失敗しました。ブラウザの保存領域が使えない可能性があります。');
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(SAVE_KEY) || localStorage.getItem(LEGACY_SAVE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (!data || !Array.isArray(data.regions) || !Array.isArray(data.logs) || !data.env || (!Array.isArray(data.milestones) && !(data.milestones instanceof Set))) return false;
        Object.assign(state, data);
        state.timeStyle = state.timeStyle || 'evolution';
        state.mapType = MAP_TYPES[state.mapType] ? state.mapType : 'oceanic';
        state.areaLayer = ['terrain','life','civ','risk'].includes(state.areaLayer) ? state.areaLayer : 'terrain';
        state.greatFilterPreparedPoints = Number(state.greatFilterPreparedPoints || 0);
        state.interventionHistory = Array.isArray(state.interventionHistory) ? state.interventionHistory : [];
        state.greatFilter = state.greatFilter && typeof state.greatFilter === 'object' ? { status:'none', type:null, signAge:null, crisisAge:null, deadlineAge:null, resolvedAge:null, ignored:false, ignoreCount:0, result:null, ...state.greatFilter } : { status:'none', type:null, signAge:null, crisisAge:null, deadlineAge:null, resolvedAge:null, ignored:false, ignoreCount:0, result:null };
        if (state.greatFilter.status === 'warning' || state.greatFilter.status === 'signal') state.greatFilter.status = 'sign';
        if (state.greatFilter.status === 'active') state.greatFilter.status = 'crisis';
        state.endingsSeen = Array.isArray(state.endingsSeen) ? state.endingsSeen : [];
        state.filterBreakthroughCount = Number(state.filterBreakthroughCount || 0);
        state.currentEnding = state.currentEnding || null;
        state.observerType = state.observerType || 'standard';
        state.unlockedObserverTypes = Array.isArray(state.unlockedObserverTypes) ? state.unlockedObserverTypes : ['standard','child_boy','child_girl'];
        state.journalArchive = Array.isArray(state.journalArchive) ? state.journalArchive : [];
        state.endingSummary = state.endingSummary || '';
        state.journalGeneratedForCurrentEnding = state.journalGeneratedForCurrentEnding || null;
        state.runId = state.runId || `${Date.now().toString(36)}-${Math.random().toString(36).slice(2,6)}-${state.seed || 0}`;
        state.metaProgress = state.metaProgress && typeof state.metaProgress === 'object' ? state.metaProgress : {};
        const mergedUnlocked = Array.from(new Set([...(state.metaProgress.unlockedObserverTypes || []), ...(state.unlockedObserverTypes || ['standard','child_boy','child_girl'])]));
        state.metaProgress.endingsSeenTotal = Number(state.metaProgress.endingsSeenTotal || state.endingsSeen?.length || 0);
        state.metaProgress.endingsSeenNames = Array.isArray(state.metaProgress.endingsSeenNames) ? Array.from(new Set(state.metaProgress.endingsSeenNames)) : Array.from(new Set(state.endingsSeen || []));
        state.metaProgress.endingsSeenTotal = state.metaProgress.endingsSeenNames.length;
        state.metaProgress.breakthroughSeenTotal = Number(state.metaProgress.breakthroughSeenTotal || state.filterBreakthroughCount || 0);
        state.metaProgress.failedSeenTotal = Number(state.metaProgress.failedSeenTotal || 0);
        state.metaProgress.specialEndingsSeen = Array.isArray(state.metaProgress.specialEndingsSeen) ? Array.from(new Set(state.metaProgress.specialEndingsSeen)) : [];
        state.metaProgress.unlockedObserverTypes = mergedUnlocked.length ? mergedUnlocked : ['standard','child_boy','child_girl'];
        state.metaProgress.unlockedPerks = Array.isArray(state.metaProgress.unlockedPerks) ? state.metaProgress.unlockedPerks : [];
        state.metaProgress.carriedObservationPoints = Number(state.metaProgress.carriedObservationPoints || 0);
        state.journalArchive = state.journalArchive.map(j => ({ runId: j.runId || state.runId, planetSeed: j.planetSeed ?? state.seed, planetName: j.planetName || state.name, endingName: j.endingName || j.ending || '未確定', observerType: j.observerType || 'standard', createdAt: j.createdAt || Date.now(), text: j.text || '', name: j.name || '創星日誌.txt', ...j }));
        state.pinnedRegionIds = Array.isArray(state.pinnedRegionIds) ? state.pinnedRegionIds.filter(id => state.regions.some(r => r.id === id)).slice(0, 3) : [];
        if (state.selectedRegionId != null && !state.regions.some(r => r.id === state.selectedRegionId)) state.selectedRegionId = state.regions[0]?.id ?? null;
        state.logs = Array.isArray(state.logs) ? state.logs : [];
        state.regions = Array.isArray(state.regions) ? state.regions : [];
        state.manualSpeedOffset = Number.isFinite(state.manualSpeedOffset) ? state.manualSpeedOffset : 0;
        state.pauseOnEventModal = state.pauseOnEventModal !== false;
        state.fx = null;
        state.modalPauseBackup = null;
        state.modalLogIndex = null;
        $('eventModal')?.classList.remove('show');
        state.milestones = new Set(data.milestones || []);
        state.dirty = false;
        uiState.detailDirty = true;
        uiState.logsDirty = true;
        uiState.pinsDirty = true;
        uiState.modeDirty = true;
        return true;
      } catch (e) { return false; }
    }

    function setupEvents() {
      let dragging = false;
      let startX = 0, startY = 0, lastX = 0, lastY = 0, moved = false;

      function pointerDown(e) {
        dragging = true; moved = false;
        startX = lastX = e.clientX;
        startY = lastY = e.clientY;
        canvas.setPointerCapture?.(e.pointerId);
      }
      function pointerMove(e) {
        if (!dragging) return;
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        if (Math.abs(e.clientX - startX) + Math.abs(e.clientY - startY) > 10) moved = true;
        state.rotY += dx * 0.008;
        state.rotX = clamp(state.rotX + dy * 0.006, -Math.PI / 4, Math.PI / 4);
        lastX = e.clientX; lastY = e.clientY;
      }
      function pointerUp(e) {
        if (!dragging) return;
        dragging = false;
        if (!moved) {
          const r = pointToRegion(e.clientX, e.clientY);
          if (r) selectRegion(r, true);
        }
      }
      canvas.addEventListener('pointerdown', pointerDown);
      canvas.addEventListener('pointermove', pointerMove);
      canvas.addEventListener('pointerup', pointerUp);
      canvas.addEventListener('pointercancel', () => dragging = false);

      $('speedDown').addEventListener('click', () => { state.speedIndex = clamp(state.speedIndex - 1, 0, SPEEDS.length - 1); state.manualSpeedOffset = state.speedIndex - desiredSpeedIndex(); state.paused = state.speedIndex === 0; state.dirty = true; updateAll(false); });
      $('speedUp').addEventListener('click', () => { state.speedIndex = clamp(state.speedIndex + 1, 0, SPEEDS.length - 1); state.manualSpeedOffset = state.speedIndex - desiredSpeedIndex(); state.paused = false; state.dirty = true; updateAll(false); });
      $('pauseBtn').addEventListener('click', () => {
        if (state.paused || state.speedIndex === 0) { state.speedIndex = state.lastSpeedIndex || 5; state.paused = false; }
        else { state.lastSpeedIndex = state.speedIndex; state.paused = true; }
        state.dirty = true; updateAll(false);
      });
      $('normalBtn').addEventListener('click', () => { state.speedIndex = 4; state.manualSpeedOffset = state.speedIndex - desiredSpeedIndex(); state.paused = false; state.dirty = true; updateAll(false); });
      $('fastBtn').addEventListener('click', () => { state.speedIndex = 7; state.manualSpeedOffset = state.speedIndex - desiredSpeedIndex(); state.paused = false; state.dirty = true; updateAll(false); });
      $('pinBtn').addEventListener('click', pinSelected);
      $('detailBtn').addEventListener('click', () => { state.mode = 'region'; uiState.modeDirty = true; uiState.detailDirty = true; updateAll(true); });
      $('closeWipeBtn').addEventListener('click', hideWipe);
      $('saveBtn').addEventListener('click', () => saveState(true));
      $('resetViewBtn').addEventListener('click', () => {
        state.rotX = -0.08;
        uiState.detailDirty = false;
        updateStats();
      });
      $('fullscreenBtn').addEventListener('click', async () => {
        try {
          if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
          else await document.exitFullscreen();
        } catch (_) {}
      });
      $('resetBtn').addEventListener('click', () => {
        if (confirm('新しい惑星へ移行します。現在の観測進行と自動保存は上書きされます。続行しますか？')) {
          localStorage.removeItem(SAVE_KEY);
          localStorage.removeItem(LEGACY_SAVE_KEY);
          makePlanet();
        }
      });
      document.querySelectorAll('.modePanel button').forEach(btn => btn.addEventListener('click', () => { state.mode = btn.dataset.mode; uiState.modeDirty = true; uiState.detailDirty = true; uiState.logsDirty = true; updateAll(true); }));
      document.querySelectorAll('.logFilters button').forEach(btn => btn.addEventListener('click', () => { state.logFilter = btn.dataset.log; uiState.logsDirty = true; updateAll(true); }));
      document.querySelectorAll('[data-style]').forEach(btn => btn.addEventListener('click', () => {
        state.timeStyle = btn.dataset.style;
        state.manualSpeedOffset = 0;
        applyStyleSpeed(true);
        state.paused = false;
        state.dirty = true;
        showEventToast('planet', `時間進行スタイル: ${TIME_STYLES[state.timeStyle]}`);
        updateAll(false);
      }));
      $('pauseOnModalToggle').addEventListener('change', (e) => {
        state.pauseOnEventModal = !!e.target.checked;
        state.dirty = true;
        if (!state.pauseOnEventModal && $('eventModal').classList.contains('show')) restoreModalPauseIfNeeded();
      });
      $('detailPanel').addEventListener('click', (e) => {
        const layerBtn = e.target.closest('[data-layer]');
        if (layerBtn) {
          state.areaLayer = layerBtn.dataset.layer;
          state.dirty = true;
          uiState.detailDirty = true;
          updateAll(true);
          return;
        }
        const btn = e.target.closest('[data-assist]');
        if (btn) {
          runAssistEvent(btn.dataset.assist);
          return;
        }
        const ib = e.target.closest('[data-intv]');
        if (ib) {
          let cost = Number(ib.dataset.cost || 0);
          const perks = state.metaProgress?.unlockedPerks || [];
          if (ib.dataset.intv === 'gfprep' && perks.includes('gf_cost_down_20')) cost = Math.max(40, Math.floor(cost * 0.8));
          if (ib.dataset.intv === 'meteor' && perks.includes('danger_cost_down_10')) cost = Math.max(80, Math.floor(cost * 0.9));
          if (!spendObservationPoints(cost)) return;
          const t = ib.dataset.intv;
          const target = state.regions.find(r => r.id === state.selectedRegionId) || null;
          if (t === 'tectonic') { applyTectonicShift(target); triggerFx('hazard', .7); pushInterventionHistory('地殻変動', cost, '地形・資源・気候に局所変動', target?.id ?? null); }
          else if (t === 'climate') { state.env.disaster = clamp(state.env.disaster - 0.12, 0, 1); state.env.stability = clamp(state.env.stability + 0.08, 0, 1); for (const r of state.regions) r.pollution = clamp(r.pollution - 0.03, 0, 1); pushInterventionHistory('気候安定化', cost, '災害圧と汚染を緩和', target?.id ?? null); }
          else if (t === 'bioshield') { for (const r of state.regions) r.biodiversity = clamp(r.biodiversity + 0.08 + Math.random()*0.06,0,1); if (!state.intelligence) state.env.socialPressure = clamp(state.env.socialPressure + 0.06,0,1); pushInterventionHistory('生命圏保護', cost, '生物多様性を回復', target?.id ?? null); }
          else if (t === 'advice') { state.age += 150000; state.env.socialPressure = clamp(state.env.socialPressure + 0.05,0,1); state.env.disaster = clamp(state.env.disaster + 0.02,0,1); pushInterventionHistory('文明助言', cost, '文明進行を補助（依存リスク増）', target?.id ?? null); }
          else if (t === 'gfprep') { state.greatFilterPreparedPoints = (state.greatFilterPreparedPoints || 0) + Math.floor(cost * 1.2); pushInterventionHistory('GF対策研究', cost, `対策投資を蓄積 (${state.greatFilterPreparedPoints})`, target?.id ?? null); }
          else if (t === 'meteor') {
            if (!confirm('危険操作: 巨大隕石を実行しますか？')) { if (typeof state.observationPoints==='number') state.observationPoints += cost; state.dirty=true; updatePointHud(); return; }
            if (cost < 260) { if (typeof state.observationPoints==='number') { state.observationPoints += cost - 260; } cost = 260; }
            applyMeteorImpact(target); pushInterventionHistory('巨大隕石', 260, '大量絶滅と文明後退リスクを誘発', target?.id ?? null);
          }
          uiState.logsDirty = true; uiState.detailDirty = true; updateAll(true);
          return;
        }
        const album = e.target.closest('[data-album]');
        if (album && state.mode === 'record') {
          const logs = state.logs.filter(l => l.important || l.imageKey).slice(0, 12);
          const log = logs[Number(album.dataset.album)];
          if (log) openEventModal(log);
          return;
        }
        const jb = e.target.closest('[data-journal]');
        if (jb) {
          const a = jb.dataset.journal;
          if (a === 'save') { createSouseiJournal(true); downloadLatestJournal(); uiState.detailDirty = true; updateAll(true); }
          else if (a === 'read') { if (!state.journalArchive?.length) createSouseiJournal(true); uiState.detailDirty = true; updateAll(true); }
          else if (a === 'continue') { state.currentEnding = state.currentEnding; showEventToast('planet', '観測を継続します'); }
          else if (a === 'new') { makePlanet(); }
          return;
        }
        const ob = e.target.closest('[data-observer]');
        if (ob) {
          if (!(state.metaProgress?.unlockedObserverTypes || state.unlockedObserverTypes || []).includes(ob.dataset.observer)) return;
          state.observerType = ob.dataset.observer;
          createSouseiJournal(true);
          uiState.detailDirty = true;
          state.dirty = true;
          updateAll(true);
          return;
        }
        const db = e.target.closest('[data-dev]');
        if (db) {
          const m = state.metaProgress || (state.metaProgress = { endingsSeenTotal:0, endingsSeenNames:[], breakthroughSeenTotal:0, failedSeenTotal:0, specialEndingsSeen:[], unlockedObserverTypes:['standard','child_boy','child_girl'], unlockedPerks:[], carriedObservationPoints:0 });
          const toast = (t) => { if (typeof showEventToast === 'function') showEventToast('planet', t); };
          if (db.dataset.dev === 'p500') { if (typeof addObservationPoints === 'function') addObservationPoints(500, '開発用テスト'); else state.observationPoints = (state.observationPoints || 0) + 500; toast('観測点+500'); }
          else if (db.dataset.dev === 'gf_sign') { if (state.greatFilter?.status === 'none') { state.greatFilter.status='sign'; state.greatFilter.type='climate'; state.greatFilter.signAge=state.age; } toast('GF兆候を設定'); }
          else if (db.dataset.dev === 'gf_crisis') { state.greatFilter.status='crisis'; state.greatFilter.type=state.greatFilter.type||'climate'; state.greatFilter.crisisAge=state.age; state.greatFilter.deadlineAge=state.age+1_200_000; toast('GF危機へ進行'); }
          else if (db.dataset.dev === 'gf_ok') { state.greatFilter.status='resolved'; state.currentEnding='星間航行エンド'; state.endingSummary='開発用: GF突破テスト'; createSouseiJournal(true); toast('GF突破テスト完了'); }
          else if (db.dataset.dev === 'gf_fail') { state.greatFilter.status='failed'; state.currentEnding='文明崩壊エンド'; state.endingSummary='開発用: GF失敗テスト'; createSouseiJournal(true); toast('GF失敗テスト完了'); }
          else if (db.dataset.dev === 'meteor3') { for(let i=0;i<3;i++) state.interventionHistory.unshift({ kind:'巨大隕石', cost:260, summary:'開発用', regionId:null, age:state.age }); toast('巨大隕石3回扱い'); }
          else if (db.dataset.dev === 'end3') { m.endingsSeenNames = Array.from(new Set([...(m.endingsSeenNames||[]), '星間航行エンド','文明崩壊エンド','静かな成熟エンド'])); m.endingsSeenTotal = m.endingsSeenNames.length; toast('エンディング3種類達成扱い'); }
          else if (db.dataset.dev === 'sp2') { m.specialEndingsSeen = Array.from(new Set([...(m.specialEndingsSeen||[]), '壊しすぎた神の手エンド','文明なき豊穣エンド'])); toast('特殊エンド2種類達成扱い'); }
          else if (db.dataset.dev === 'bk3') { m.breakthroughSeenTotal = Math.max(3, m.breakthroughSeenTotal||0); toast('GF突破3回扱い'); }
          else if (db.dataset.dev === 'reunlock') { if (typeof unlockMetaProgress === 'function') unlockMetaProgress(state.currentEnding || '静かな成熟エンド', true); toast('解放判定を再実行'); }
          else if (db.dataset.dev === 'refresh') { toast('周回記録を更新'); }
          else if (db.dataset.dev === 'save') { saveState(true); toast('テスト状態を保存'); }
          state.dirty = true; uiState.detailDirty = true; uiState.logsDirty = true; updateAll(true);
        }
      });
      $('detailPanel').addEventListener('pointerup', (e) => {
        const canvasEl = e.target.closest('#areaMapCanvas');
        if (!canvasEl) return;
        const r = areaMapPick(e.clientX, e.clientY);
        if (r) selectRegion(r, true);
      });
      $('eventCloseBtn').addEventListener('click', closeEventModal);
      $('eventModal').addEventListener('click', (e) => { if (e.target.id === 'eventModal') closeEventModal(); });
      $('gfActBtn')?.addEventListener('click', () => {
        const gf = state.greatFilter;
        if (gf && (gf.status === 'sign' || gf.status === 'crisis')) {
          const need = gf.status === 'sign' ? 70 : Math.max(100, 230 - Math.floor((state.greatFilterPreparedPoints || 0) * 0.24));
          if (!spendObservationPoints(need)) return;
          state.greatFilterPreparedPoints += Math.floor(need * 1.08);
          addLog('civ', '緊急GF対策', `${getGreatFilterLabel(gf)} へ緊急対策（消費${need}）を実施。`, true);
          if (gf.status === 'crisis' && Math.random() < 0.45) gf.deadlineAge += 180_000 + Math.random() * 200_000;
          state.dirty = true; uiState.logsDirty = true; uiState.detailDirty = true; updateAll(true);
          return;
        }
        if (typeof window.openInterventionPanel === 'function') return window.openInterventionPanel('greatFilter');
        if (typeof window.runGreatFilterIntervention === 'function') return window.runGreatFilterIntervention();
        state.mode = 'record'; uiState.modeDirty = true; uiState.detailDirty = true; uiState.logsDirty = true; updateAll(true);
        if (typeof showEventToast === 'function') showEventToast('planet', '介入メニューは未接続です');
      });
      $('gfDetailBtn')?.addEventListener('click', () => {
        state.mode = 'record'; uiState.modeDirty = true; uiState.detailDirty = true; uiState.logsDirty = true; updateAll(true);
        window.scrollTo({ top: document.body.scrollHeight * 0.55, behavior: 'smooth' });
      });
      $('gfSkipBtn')?.addEventListener('click', () => {
        const gf = getGreatFilterStateObject();
        if (!gf) return;
        gf.ignored = true;
        gf.ignoreCount = (gf.ignoreCount || 0) + 1;
        state.dirty = true;
        if (typeof showEventToast === 'function') showEventToast('planet', 'グレートフィルターを見送りました');
        updateCrisisBar();
      });
      window.addEventListener('scroll', updateFloatingHud, { passive: true });
      $('detailPanel').addEventListener('toggle', (e) => { if (e.target.id === 'interventionFold') updatePointHud(); }, true);
    }

    let last = performance.now();
    let lastUiUpdate = 0;
    function loop(now) {
      const dt = Math.min(0.08, (now - last) / 1000);
      last = now;
      tick(dt);
      drawPlanet();
      if (state.selectedRegionId != null && $('wipe').classList.contains('show')) {
        const r = state.regions.find(x => x.id === state.selectedRegionId);
        if (r) {
          $('wipeName').textContent = r.currentName;
          $('wipeLine').textContent = `${r.climate} / ${regionSummary(r)}`;
          drawWipeScene(r);
        }
      }
      // 低頻度のUI更新。毎フレームDOM更新するとスマホで重くなるため。
      if (now - lastUiUpdate > 500) {
        updateStats();
        lastUiUpdate = now;
      }
      requestAnimationFrame(loop);
    }

    function initialUiRefresh() {
      uiState.detailDirty = true;
      uiState.logsDirty = true;
      uiState.pinsDirty = true;
      uiState.modeDirty = true;
      updateAll(true);
      const t = $('pauseOnModalToggle'); if (t) t.checked = !!state.pauseOnEventModal;
      const r = state.regions[0];
      if (r) selectRegion(r, false);
    }

    window.souseiDebug = {
      jumpToLife() { state.age = Math.max(state.age, LIFE_STAGES[2].age + 10_000); state.dirty = true; uiState.detailDirty = true; uiState.logsDirty = true; updateAll(true); },
      jumpToIntelligence() { state.age = Math.max(state.age, CIV_STAGES[2].age + 50_000); state.dirty = true; uiState.detailDirty = true; uiState.logsDirty = true; updateAll(true); },
      jumpToCivilization() { state.age = Math.max(state.age, CIV_STAGES[5].age + 30_000); state.dirty = true; uiState.detailDirty = true; uiState.logsDirty = true; updateAll(true); },
      jumpToGreatFilter() {
        state.age = Math.max(state.age, CIV_STAGES[5].age + 100_000);
        if (state.greatFilter?.status === 'none') {
          state.greatFilter.status = 'sign';
          state.greatFilter.type = state.greatFilter.type || 'climate';
          state.greatFilter.signAge = state.age;
        }
        state.dirty = true; uiState.detailDirty = true; uiState.logsDirty = true; updateAll(true);
      },
      addPoints(amount = 100) { return addObservationPoints(Number(amount) || 0, 'デバッグ加算'); },
      status() {
        const gf = state.greatFilter || {};
        const speedYearsPerSecond = SPEEDS[state.speedIndex] || 0;
        const greatFilterDeadlineRemain = gf.deadlineAge ? Math.max(0, gf.deadlineAge - state.age) : null;
        const estimatedRealSecondsToGFResolution = speedYearsPerSecond > 0 && greatFilterDeadlineRemain != null ? greatFilterDeadlineRemain / speedYearsPerSecond : null;
        const out = {
          age: state.age,
          speedIndex: state.speedIndex,
          speedYearsPerSecond,
          points: getObservationPoints(),
          gfPreparedPoints: state.greatFilterPreparedPoints || 0,
          risk: riskValue(),
          life: getStage(LIFE_STAGES, state.age).label,
          civ: state.collapse ? '文明崩壊後' : getStage(CIV_STAGES, state.age).label,
          greatFilterStatus: gf.status,
          greatFilterType: gf.type,
          greatFilterDeadlineRemain,
          estimatedRealSecondsToGFResolution
        };
        console.table(out);
        return out;
      }
    };

    setupEvents();
    if (!loadState()) makePlanet();
    else initialUiRefresh();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
