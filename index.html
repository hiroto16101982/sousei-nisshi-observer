    }

    function getGreatFilterDeadlineText(gf = getGreatFilterStateObject()) {
      if (!gf) return '';
      const leftYears = gf.remainingYears ?? gf.deadlineYears ?? gf.remaining ?? null;
      const needPoints = gf.requiredPoints ?? gf.needPoints ?? null;
      const a = Number.isFinite(leftYears) ? `残り ${formatAge(Math.max(0, leftYears))}` : '';
      const b = Number.isFinite(needPoints) ? `必要観測点 ${Math.max(0, Math.floor(needPoints))}` : '';
      return [a, b].filter(Boolean).join(' / ');
    }

    function isGreatFilterCrisisActive() {
      const gf = getGreatFilterStateObject();
      if (!gf) return false;
      return gf.status === 'sign' || gf.status === 'crisis';
    }

    function updateFloatingHud() {
      const hud = $('floatHud'); if (!hud) return;
      const crisisActive = isGreatFilterCrisisActive();
      const journalReadingOpen = state.mode === 'record' && !!document.querySelector('details.fold[open] summary')?.textContent?.includes('最新の日誌本文');
      const hideForRecordRead = state.mode === 'record' && (!!$('eventModal')?.classList.contains('show') || journalReadingOpen);
      const hideForDev = state.mode === 'record' && !!$('devTestFold')?.open;
      const planetVisible = !!$('planetCanvas') && $('planetCanvas').getBoundingClientRect().top < window.innerHeight * 0.55;
      const show = window.scrollY > 220 && !planetVisible && !hideForRecordRead && !hideForDev && !crisisActive;
      if (!show) { hud.classList.remove('show'); return; }
      const gf = getGreatFilterStateObject();
      const gfText = gf ? (gf.status === 'none' ? 'GF 未発生' : gf.status === 'sign' ? `GF兆候 ${getGreatFilterLabel(gf)}` : `GF危機 ${getGreatFilterLabel(gf)}`) : 'GF 未発生';
      const points = getObservationPoints();
      const intvOpen = state.mode === 'record' && !!$('interventionFold')?.open;
      const pLabel = intvOpen ? `【観測点 ${points}】` : `観測点 ${points}`;
      hud.textContent = `${pLabel} / ${gfText} / 経過 ${formatAge(state.age)}`;
      hud.classList.toggle('warn', gf?.status === 'sign' || gf?.status === 'crisis');
      const shortageRecent = performance.now() - (state.lastPointShortageAt || 0) < 3200;
      const minCost = intvOpen ? getMinInterventionCost() : 0;
      const shortageNow = intvOpen && points < minCost;
      hud.classList.toggle('ptsWarn', shortageRecent || shortageNow);
      hud.classList.add('show');
    }

    function getMinInterventionCost() {
      const root = $('detailPanel');
      if (!root) return 80;
      const btns = Array.from(root.querySelectorAll('[data-intv]')).filter(b => !b.disabled);
      if (!btns.length) return 80;
      const costs = btns.map((b) => {
        const d = Number(b.dataset.cost);
        if (Number.isFinite(d) && d > 0) return d;
        const m = (b.textContent || '').match(/(\d+)/);
        return m ? Number(m[1]) : NaN;
      }).filter(v => Number.isFinite(v) && v > 0);
      return costs.length ? Math.min(...costs) : 80;
    }

    function updateCrisisBar() {
      const bar = $('crisisBar'); if (!bar) return;
      const gf = getGreatFilterStateObject();
      if (!isGreatFilterCrisisActive()) { bar.classList.remove('show'); return; }
      const isSign = gf.status === 'sign';
      $('crisisMain').textContent = isSign ? `⚠ グレートフィルター兆候：${getGreatFilterLabel(gf)}` : `⚠ グレートフィルター接近：${getGreatFilterLabel(gf)}`;
      const remain = gf.deadlineAge ? Math.max(0, gf.deadlineAge - state.age) : null;
      $('crisisSub').textContent = isSign ? '兆候段階です。対策研究で備えられます。' : `残り ${formatAge(remain || 0)} / 対策研究 ${Math.floor(state.greatFilterPreparedPoints || 0)}`;
      bar.classList.add('show');
    }

    function maybeStartGreatFilter() {
      const gf = state.greatFilter;
      if (!gf || gf.status !== 'none') return;
      const cl = civLevel();
      const risk = riskValue();
      if (cl < 5) return;
      const adviceCount = state.interventionHistory.filter(h => h.kind === '文明助言').length;
      const p = (cl >= 6 ? 0.0016 : 0.0004) + risk / 200000 + adviceCount * 0.00018;
      if (Math.random() < p) {
        gf.status = 'sign';
        gf.type = pick(['climate','war','ai','resource','cosmic','biological']);
        gf.signAge = state.age;
        slowForGreatFilterWarning();
        addLog('civ', 'グレートフィルター兆候', `${getGreatFilterLabel(gf)} の予兆が観測されました。`, true);
      }
    }

    function slowForGreatFilterWarning() {
      const gf = state.greatFilter;
      if (!gf || (gf.status !== 'sign' && gf.status !== 'crisis')) return;
      if (state.speedIndex > 5 && (state.manualSpeedOffset || 0) <= 0) {
        state.speedIndex = 5;
        state.manualSpeedOffset = state.speedIndex - desiredSpeedIndex();
        state.paused = false;
        if (typeof showEventToast === 'function') showEventToast('planet', '⚠ GF警告: 危機対応モードへ減速');
      }
    }

    function resolveGreatFilterOutcome() {
      const gf = state.greatFilter;
      const cl = civLevel();
      const bio = avg(state.regions.map(r => r.biodiversity));
      const prep = state.greatFilterPreparedPoints || 0;
      const pts = getObservationPoints();
      const score = prep * 0.72 + pts * 0.32 + cl * 25 + bio * 120 + state.env.stability * 90 - state.env.disaster * 110 - riskValue() * 1.25;
      const byType = { climate: state.env.stability * 40, war: (1 - state.env.socialPressure) * 18, ai: prep * 0.08, resource: state.env.resources ? state.env.resources * 25 : 10, cosmic: prep * 0.05, biological: bio * 65 };
      const final = score + (byType[gf.type] || 0);
      const success = final > 250 + Math.random() * 105;
      gf.result = success ? 'breakthrough' : 'failed';
      gf.resolvedAge = state.age;
      if (success) {
        gf.status = 'resolved';
        state.filterBreakthroughCount = (state.filterBreakthroughCount || 0) + 1;
        chooseEnding(true);
        addLog('civ', 'グレートフィルター突破', `${getGreatFilterLabel(gf)} を突破。文明は新段階へ移行。`, true);
        addObservationPoints(30, 'GF突破ボーナス');
      } else {
        gf.status = 'failed';
        if (!state.collapse) triggerCollapse();
        chooseEnding(false);
        addLog('civ', 'グレートフィルター失敗', `${getGreatFilterLabel(gf)} により文明は重大な後退。`, true);
        addObservationPoints(10, '失敗分析ボーナス');
      }
      unlockMetaProgress(state.currentEnding, success);
      state.endingSummary = success ? '文明は危機を越え、新しい段階へ進みました。' : '文明は危機に耐えきれず後退し、惑星史は静かな終章へ向かいました。';
      state.greatFilterPreparedPoints = Math.max(0, prep - 120);
      createSouseiJournal();
    }

    function updateGreatFilterProgress() {
      const gf = state.greatFilter;
      if (!gf) return;
      if (gf.status === 'none') return maybeStartGreatFilter();
      if (gf.status === 'sign' && state.age - gf.signAge > 2_600_000) {
        gf.status = 'crisis';
        gf.crisisAge = state.age;
        gf.deadlineAge = state.age + 1_450_000 + Math.random() * 950_000;
        addLog('civ', 'グレートフィルター接近', `${getGreatFilterLabel(gf)} への対応期限が設定されました。`, true);
      }
      if (gf.status === 'crisis' && state.age >= gf.deadlineAge) resolveGreatFilterOutcome();
    }

    function chooseEnding(success) {
      const meteorCount = state.interventionHistory.filter(h => h.kind === '巨大隕石').length;
      const bioShieldCount = state.interventionHistory.filter(h => h.kind === '生命圏保護').length;
      const prep = state.greatFilterPreparedPoints || 0;
      let ending = success ? '静かな成熟エンド' : '文明崩壊エンド';
      if (success && civLevel() >= 7) ending = '星間航行エンド';
      if (success && bioShieldCount >= 3) ending = '共生文明エンド';
      if (success && prep >= 600) ending = '準備されすぎた突破エンド';
      if (!success && meteorCount >= 2) ending = '壊しすぎた神の手エンド';
      if (!success && bioShieldCount >= 4) ending = '文明なき豊穣エンド';
      if (!success && state.collapse) ending = '遺跡だけが残るエンド';
      state.currentEnding = ending;
      if (!state.endingsSeen.includes(ending)) state.endingsSeen.push(ending);
    }

    function observerVoiceText() {
      const base = state.currentEnding || '未確定';
      if (state.observerType === 'child_boy') return `ぼく、${state.name}のことをずっと見てた。すごい時も、こわい時もあって、${base}になったのがまだ信じられない。`;
      if (state.observerType === 'child_girl') return `${state.name}は、うつくしくて、こわくて、ふしぎな星なの。${base}になったのは、かなしいけど大切な記録なのです。`;
      if (state.observerType === 'gal') return `${state.name}、マジですごかった。やばい瞬間もあったけど、${base}まで見届けたのはデカい。`;
      if (state.observerType === 'net_user') return `ワイくん観測ログ：${state.name}、星、無事死亡…とは限らん。${base}、クソワロタwwwwww（なお涙目）。`;
      if (state.observerType === 'kansai') return `${state.name}、ほんまよう頑張った星やで。${base}まで来たんは、たいしたもんや。`;
      if (state.observerType === 'samurai') return `${state.name}の興亡、まこと見事なり。${base}へ至る道、しかと記す。`;
      if (state.observerType === 'noja_loli') return `${state.name}は不思議な星なのじゃ。${base}に至るまで、よく耐えたのじゃな。`;
      if (state.observerType === 'foreigner') return `${state.name} is very beautiful star. Many hard events, but we reach ${base}. I keep this memory softly.`;
      if (state.observerType === 'reincarnator') return `前の世界でも似た終幕を見た気がする。それでも${state.name}の${base}は、今回だけの重みを持っていた。`;
      return `${state.name}は多層的な変遷を経て、${base}へ至った。観測と介入の痕跡は、次の星への示唆を残している。`;
    }

    function unlockMetaProgress(ending, success) {
      const m = state.metaProgress;
      m.endingsSeenNames = Array.isArray(m.endingsSeenNames) ? m.endingsSeenNames : [];
      if (ending && !m.endingsSeenNames.includes(ending)) m.endingsSeenNames.push(ending);
      m.endingsSeenTotal = m.endingsSeenNames.length;
      if (success) m.breakthroughSeenTotal += 1; else m.failedSeenTotal += 1;
      if (/壊しすぎ|文明なき|遺跡/.test(ending) && !m.specialEndingsSeen.includes(ending)) m.specialEndingsSeen.push(ending);
      m.specialEndingsSeen = Array.from(new Set(m.specialEndingsSeen));
      const meteorCount = state.interventionHistory.filter(h => h.kind === '巨大隕石').length;
      const unlock = (k, msg) => { if (!m.unlockedObserverTypes.includes(k)) { m.unlockedObserverTypes.push(k); if (typeof showEventToast === 'function') showEventToast('planet', msg); } };
      if (m.endingsSeenTotal >= 3) unlock('gal', '新しい観測者タイプ「ギャル」が解放されました');
      if (meteorCount >= 3 || state.endingsSeen.includes('壊しすぎた神の手エンド')) unlock('net_user', '新しい観測者タイプ「ネット民」が解放されました');
      if (m.breakthroughSeenTotal >= 2) unlock('kansai', '新しい観測者タイプ「関西」が解放されました');
      if (state.endingsSeen.includes('文明崩壊エンド') || (state.greatFilter?.type === 'war' && success)) unlock('samurai', '新しい観測者タイプ「侍」が解放されました');
      if (m.specialEndingsSeen.length >= 2) unlock('noja_loli', '新しい観測者タイプ「のじゃロリ」が解放されました');
      if (state.endingsSeen.includes('星間航行エンド')) unlock('foreigner', '新しい観測者タイプ「異邦人」が解放されました');
      if (m.breakthroughSeenTotal >= 3) unlock('reincarnator', '新しい観測者タイプ「転生者」が解放されました');
      const perk = (k, cond, msg) => { if (cond && !m.unlockedPerks.includes(k)) { m.unlockedPerks.push(k); if (typeof showEventToast === 'function') showEventToast('planet', msg); } };
      perk('init_points_50', m.breakthroughSeenTotal >= 2, '周回特典「初期観測点+50」が解放されました');
      perk('gf_cost_down_20', m.breakthroughSeenTotal >= 3, '周回特典「GF対策コスト-20%」が解放されました');
      perk('gain_bonus_10', m.endingsSeenTotal >= 5, '周回特典「観測点獲得量+10%」が解放されました');
      perk('danger_cost_down_10', m.specialEndingsSeen.length >= 2, '周回特典「危険介入コスト-10%」が解放されました');
      m.carriedObservationPoints = clamp(Math.floor((m.carriedObservationPoints || 0) + getObservationPoints() * 0.2), 0, 300);
      m.unlockedObserverTypes = Array.from(new Set(m.unlockedObserverTypes));
    }

    function buildSouseiJournalText() {
      const endingDisplayNames = {
        '技術暴走型失敗': '技術暴走フィルター失敗',
        '気候崩壊型失敗': '気候崩壊フィルター失敗',
        '戦争型失敗': '惑星戦争フィルター失敗',
        '資源枯渇型失敗': '資源枯渇フィルター失敗',
        '生命圏崩壊型失敗': '生命圏崩壊フィルター失敗'
      };
      const endingMoodTitles = {
        '技術暴走型失敗': '止まらなかった知性',
        '文明崩壊エンド': '灯りの消えた惑星',
        '遺跡だけが残るエンド': '遺跡だけが星を覚えている'
      };
      const endingRaw = state.currentEnding || '未確定';
      const endingDisplay = endingDisplayNames[endingRaw] || endingRaw;
      const endingTitle = endingMoodTitles[endingRaw] || endingDisplay;
      const styleByObserver = {
        standard: { intro: 'この星の歩みを記録する。', life: (l) => `生命段階: ${l}`, events: '重要イベント:', gf: { resolved: 'GF結果は突破となった。', failed: 'GF結果は失敗となった。', ongoing: 'GF結果は進行中。' }, closing: () => `観測者所見: ${observerVoiceText()}` },
        child_girl: { intro: 'わたしは、この星の歩みをそっと見守ってきたの。', life: (l) => `この星で生まれたいのちは「${l}」まで育ったの。`, events: 'おぼえておきたいこと：', gf: { resolved: 'この星は、フィルターを越えることができたのです。', failed: 'この星は、フィルターを越えられなかったのです。', ongoing: 'フィルターの行方は、まだ見届けの途中なの。' }, closing: () => `観測者所見: ${observerVoiceText()}\nこの記録が、いつか誰かのやさしい道しるべになりますように。` },
        child_boy: { intro: 'ぼくは、この星をずっと見てきたんだ。', life: (l) => `ここで生まれたいのちは「${l}」まで来たんだよ。`, events: 'ぼくが見たたいせつなできごと：', gf: { resolved: 'フィルターを越えられて、ちょっとほっとした。', failed: 'フィルターを越えられなくて、かなしかった。', ongoing: 'まだどうなるかわからなくて、少しこわかった。' }, closing: () => `観測者所見: ${observerVoiceText()}` },
        gal: { intro: 'この星、最初から最後までちゃんと見届けたよ。', life: (l) => `生命は「${l}」まで進んで、マジですごかった。`, events: '注目イベントまとめ：', gf: { resolved: 'フィルター突破。ほんとにやばいくらい頑張った。', failed: 'フィルター失敗。これはさすがにしんどかった。', ongoing: 'フィルターは進行中。まだ目が離せない。' }, closing: () => `観測者所見: ${observerVoiceText()}` },
        net_user: { intro: 'ワイくん観測ログ、ここに記録するで。', life: (l) => `生命段階は「${l}」。ここまでは順調。`, events: '要チェックイベント:', gf: { resolved: 'GF突破を確認。ワイくん、ちょっと感動。', failed: (isCollapse) => isCollapse ? 'GF失敗。星、無事死亡…とは笑えんかった。' : 'GF失敗。クソワロタwwwwww…と言いつつ重かった。', ongoing: 'GFは進行中。静かに見守る。' }, closing: () => `観測者所見: ${observerVoiceText()}` },
        kansai: { intro: 'この星の歩み、最後まで見届けさせてもろたで。', life: (l) => `生命は「${l}」まで育ってきたんや。`, events: '覚えときたい出来事:', gf: { resolved: 'フィルターを越えたんは、ほんま立派や。', failed: 'フィルターを越えられへんかったのは、かなしかったな。', ongoing: 'フィルターはまだ途中や。気ぃ抜かれへん。' }, closing: () => `観測者所見: ${observerVoiceText()}` },
        reincarnator: { intro: 'この星の記録は、今回の世界線のものとして残しておく。', life: (l) => `生命は「${l}」まで到達した。前の世界では見られなかった景色もあった。`, events: '今回の世界での主要イベント:', gf: { resolved: '今回はフィルターを越えた。前の世界より、確かな前進だ。', failed: '今回はフィルターを越えられなかった。前の世界でも似た痛みを知っている。', ongoing: 'フィルターの帰結は未定。今回の世界の選択を見守る。' }, closing: () => `観測者所見: ${observerVoiceText()}` }
      };
      const style = styleByObserver[state.observerType] || styleByObserver.standard;
      const lifeLabel = getStage(LIFE_STAGES, state.age).label;
      const lifeLine = style.life(lifeLabel);
      const civLabel = state.collapse ? '文明崩壊後' : getStage(CIV_STAGES, state.age).label;
      const civLine = state.observerType === 'child_girl' ? `文明は、やがて「${civLabel}」へたどりついてしまったの。` : `文明段階: ${civLabel}`;
      const gf = state.greatFilter || {};
      const gfResolved = style.gf.resolved;
      const gfFailed = typeof style.gf.failed === 'function' ? style.gf.failed(!!state.collapse) : style.gf.failed;
      const gfOngoing = style.gf.ongoing;
      const gfResult = gf.status === 'resolved' ? gfResolved : gf.status === 'failed' ? gfFailed : gfOngoing;
      const gfPart = `GF: ${gf.status} / ${getGreatFilterLabel(gf)} / 対策研究 ${Math.floor(state.greatFilterPreparedPoints || 0)}\n${gfResult}\n`;
      const iv = state.interventionHistory.slice(0, 10).map(h => `- ${formatAge(h.age)} ${h.kind} 消費${h.cost} ${h.summary}`).join('\n');
      const lg = state.logs.slice(0, 12).map(l => `- ${formatAge(l.age)} ${l.title}`).join('\n');
      const eventHeading = style.events;
      const closing = style.closing();
      const header = `創星日誌「${endingTitle}」\n惑星: ${state.name}\n終幕: ${endingDisplay}\n経過: ${formatAge(state.age)}\nマップタイプ: ${MAP_TYPES[state.mapType]?.label || state.mapType}\n${style.intro}\n`;
      return `${header}${lifeLine}\n${civLine}\n${gfPart}\n${eventHeading}\n${lg}\n\n介入履歴:\n${iv || 'なし'}\n\n${closing}`;
    }

    function createSouseiJournal(force = false) {
      const key = `${state.name}:${state.currentEnding || '未確定'}`;
      if (!force && state.journalGeneratedForCurrentEnding === key) return;
      const body = buildSouseiJournalText();
      const fileName = `創星日誌_${state.name}_${(state.currentEnding || '未確定').replace(/\s+/g,'')}.txt`;
      const entry = { runId: state.runId, planetSeed: state.seed, planetName: state.name, endingName: state.currentEnding || '未確定', observerType: state.observerType, createdAt: Date.now(), name: fileName, text: body, age: state.age, ending: state.currentEnding };
      const idx = state.journalArchive.findIndex(j => j && j.runId === entry.runId && j.endingName === entry.endingName && j.observerType === entry.observerType);
      if (idx >= 0) state.journalArchive[idx] = entry;
      else state.journalArchive.unshift(entry);
      if (state.journalArchive.length > 12) state.journalArchive.length = 12;
      state.journalGeneratedForCurrentEnding = key;
      state.dirty = true;
    }

    function downloadLatestJournal() {
      const j = state.journalArchive[0];
      if (!j) return;
      try {
        const blob = new Blob([j.text], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = j.name;
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 500);
      } catch (_) {}
    }

    function updatePointHud() {
      // pointHudはfloatHudへ統合済み（互換用no-op）
      return;
    }

    function spendObservationPoints(cost) {
      const now = getObservationPoints();
      if (now < cost) {
        state.lastPointShortageAt = performance.now();
        if (typeof showEventToast === 'function') showEventToast('planet', '観測点が不足しています');
        updateFloatingHud();
        return false;
      }
      if (typeof state.observationPoints === 'number') state.observationPoints -= cost;
      else if (typeof state.points === 'number') state.points -= cost;
      else if (typeof state.observePoints === 'number') state.observePoints -= cost;
      state.dirty = true;
      updatePointHud();
      return true;
    }

    function addObservationPoints(amount, reason = '') {
      const perks = state.metaProgress?.unlockedPerks || [];
      let gain = amount;
      if (perks.includes('gain_bonus_10')) gain = Math.ceil(gain * 1.1);
      if (typeof state.observationPoints === 'number') state.observationPoints += gain;
      else if (typeof state.points === 'number') state.points += gain;
      else if (typeof state.observePoints === 'number') state.observePoints += gain;
      state.dirty = true;
      if (reason) addLog('planet', '観測点獲得', `${reason}（+${gain}）`, false);
      updatePointHud();
      return gain;
    }

    function pushInterventionHistory(kind, cost, summary, regionId = null) {
      state.interventionHistory.unshift({ kind, cost, summary, regionId, age: state.age });
      if (state.interventionHistory.length > 80) state.interventionHistory.length = 80;
      addLog('planet', `観測介入: ${kind}`, `${summary}（消費${cost}）`, true, { regionId, subType: 'intervention' });
    }

    function applyTectonicShift(targetRegion) {
      const targets = targetRegion ? [targetRegion] : state.regions.filter(() => Math.random() < 0.22);
      for (const r of targets) {
        r.resources = clamp(r.resources + (Math.random() - 0.2) * 0.25, 0, 1);
        r.fertility = clamp(r.fertility + (Math.random() - 0.5) * 0.2, 0, 1);
        if (Math.random() < 0.35) r.climate = pick(['乾燥', '湿潤', '温帯', '寒冷']);
        if (Math.random() < 0.4) r.baseName = pick(['火山列島', '山脈地帯', '内海沿岸', '乾燥高原']);
        markRegionEvent(r, 'tectonic');
      }
      state.env.tectonics = clamp(state.env.tectonics + 0.06, 0, 1);
      state.env.disaster = clamp(state.env.disaster + 0.04, 0, 1);
      state.env.mountains = clamp(state.env.mountains + 0.04, 0, 1);
      state.env.stability = clamp(state.env.stability - 0.03, 0, 1);
    }

    function applyMeteorImpact(targetRegion) {
      for (const r of state.regions) {
        r.biodiversity = clamp(r.biodiversity - (0.18 + Math.random() * 0.24), 0, 1);
        if (r.city && Math.random() < 0.45) { r.ruin = true; r.city = false; }
      }
      if (targetRegion) {
        targetRegion.baseName = 'クレーター盆地';
        targetRegion.climate = '寒冷';
        targetRegion.ruin = true;
        markRegionEvent(targetRegion, 'collapse');
      }
      state.env.temperature = clamp(state.env.temperature - 0.08, 0, 1);
      state.env.disaster = clamp(state.env.disaster + 0.18, 0, 1);
      state.env.stability = clamp(state.env.stability - 0.1, 0, 1);
      if (civLevel() >= 3 && Math.random() < 0.5 && !state.collapse) triggerCollapse();
      triggerFx('hazard', 1.35);
    }

    function drawAreaMap() {
      const c = $('areaMapCanvas');
      if (!c) return;
      const g = c.getContext('2d');
      const w = c.width, h = c.height;
      g.clearRect(0, 0, w, h);
      g.fillStyle = '#6fa0c3'; g.fillRect(0, 0, w, h);
      const ll = lifeLevel(), cl = civLevel();
      for (const r of state.regions) {
        const x = ((r.lon + Math.PI) / (Math.PI * 2)) * w;
        const y = (1 - (r.lat + 1.45) / 2.9) * h;
        let color = 'rgba(120,140,170,.45)';
        if (state.areaLayer === 'terrain') {
          color = r.isOcean ? 'rgba(56,128,182,.78)' : r.climate === '乾燥' ? 'rgba(181,140,82,.82)' : r.climate === '寒冷' ? 'rgba(215,233,246,.86)' : 'rgba(84,156,88,.8)';
          if (/山/.test(r.baseName)) color = 'rgba(106,128,104,.86)';
          if (/火山|溶岩|地熱/.test(r.baseName)) color = 'rgba(132,78,68,.9)';
          if (/クレーター/.test(r.baseName)) color = 'rgba(130,124,118,.86)';
        } else if (state.areaLayer === 'life') {
          const b = clamp(r.biodiversity * (ll < 3 ? .45 : 1), 0, 1);
          color = `rgba(${50 + b*40},${90 + b*140},${65 + b*45},${0.35 + b*0.55})`;
          if (r.lastEventType === 'expansion') color = 'rgba(132,255,176,.88)';
        } else if (state.areaLayer === 'civ') {
          if (cl < 2) color = 'rgba(90,100,120,.32)';
          else if (r.ruin) color = 'rgba(138,88,78,.78)';
          else if (r.city) color = 'rgba(248,212,112,.85)';
          else color = 'rgba(96,122,106,.44)';
        } else if (state.areaLayer === 'risk') {
          const rv = clamp(r.pollution * .7 + state.env.disaster * .3 + ((r.lastEventType === 'conflict' || r.lastEventType === 'collapse') ? .25 : 0), 0, 1);
          color = `rgba(${90 + rv*150},${42 + (1-rv)*55},${48 + (1-rv)*40},${0.35 + rv*0.6})`;
        }
        g.fillStyle = color;
        g.beginPath(); g.arc(x, y, r.city ? 6 : 4.6, 0, Math.PI * 2); g.fill();
        if (r.ruin) { g.strokeStyle = 'rgba(180,120,96,.7)'; g.strokeRect(x-4,y-4,8,8); }
        if (cl >= 7 && r.city && !r.ruin && state.areaLayer === 'civ') { g.strokeStyle = 'rgba(126,232,255,.72)'; g.beginPath(); g.arc(x,y,8,0,Math.PI*2); g.stroke(); }
      }
      for (const r of state.regions) {
        const x = ((r.lon + Math.PI) / (Math.PI * 2)) * w;
        const y = (1 - (r.lat + 1.45) / 2.9) * h;
        if (state.pinnedRegionIds.includes(r.id)) { g.strokeStyle = 'rgba(255,217,118,.95)'; g.lineWidth = 2; g.beginPath(); g.arc(x,y,7,0,Math.PI*2); g.stroke(); }
        if (state.selectedRegionId === r.id) { g.strokeStyle = 'rgba(126,232,255,.95)'; g.lineWidth = 2.4; g.beginPath(); g.arc(x,y,9,0,Math.PI*2); g.stroke(); }
      }
    }

    function areaMapPick(clientX, clientY) {
      const c = $('areaMapCanvas'); if (!c) return null;
      const rect = c.getBoundingClientRect();
      const x = (clientX - rect.left) * (c.width / rect.width);
      const y = (clientY - rect.top) * (c.height / rect.height);
      let best = null, bestD = Infinity;
      for (const r of state.regions) {
        const rx = ((r.lon + Math.PI) / (Math.PI * 2)) * c.width;
        const ry = (1 - (r.lat + 1.45) / 2.9) * c.height;
        const d = (rx-x)*(rx-x) + (ry-y)*(ry-y);
        if (d < bestD) { bestD = d; best = r; }
      }
      return best;
    }

    function chooseMapType() {
      const roll = Math.random();
      if (roll < 0.26) return 'oceanic';
      if (roll < 0.48) return 'continental';
      if (roll < 0.66) return 'archipelago';
      if (roll < 0.74) return 'shallowSea';
      if (roll < 0.81) return 'jungle';
      if (roll < 0.88) return 'arid';
      if (roll < 0.95) return 'frozen';
      return 'volcanic';
    }

    function randomName(prefix = '') {
      const n = 2 + Math.floor(Math.random() * 2);
      let s = '';
      for (let i = 0; i < n; i++) s += pick(SYLLABLES);
      return prefix + s;
    }

    function formatAge(years) {
      if (years < 10_000) return Math.floor(years).toLocaleString() + '年';
      if (years < 100_000_000) return Math.floor(years / 10_000).toLocaleString() + '万年';
      return (years / 100_000_000).toFixed(years < 1_000_000_000 ? 1 : 2) + '億年';
    }

    function getStage(list, age) {
      let current = list[0];
      for (const s of list) if (age >= s.at) current = s;
      return current;
    }

    function civLevel() {
      const key = getStage(CIV_STAGES, state.age).key;
      return CIV_STAGES.findIndex(s => s.key === key);
    }

    function lifeLevel() {
      const key = getStage(LIFE_STAGES, state.age).key;
      return LIFE_STAGES.findIndex(s => s.key === key);
    }

    function addLog(type, title, text, important = false, meta = {}) {
      state.logs.unshift({ type, title, text, age: state.age, important, imageKey: meta.imageKey || null, subType: meta.subType || null, regionId: Number.isInteger(meta.regionId) ? meta.regionId : null });
      if (state.logs.length > 180) state.logs.length = 180;
      state.dirty = true;
      uiState.logsDirty = true;
      if (state.mode === 'record') uiState.detailDirty = true;
      if (important) showEventToast(type, title);
    }

    function showEventToast(type, title) {
      const el = $('eventToast');
      if (!el) return;
      const kind = type === 'life' ? '生命' : type === 'civ' ? '文明' : '惑星';
      el.innerHTML = `<span class="k">${kind}</span>${escapeHtml(title)}`;
      el.classList.add('show');
      clearTimeout(showEventToast._t);
      showEventToast._t = setTimeout(() => el.classList.remove('show'), 2400);
    }

    function triggerFx(type, power = 1) {
      state.fx = { type, start: performance.now(), duration: 1400 + power * 500, power };
    }

    function desiredSpeedIndex() {
      const ll = lifeLevel(), cl = civLevel();
      const style = state.timeStyle || 'evolution';
      if (style === 'calm') return ll < 5 ? 2 : 3;
      let base = 5;
      if (style === 'evolution') base = ll < 4 ? 6 : ll < 8 ? 5 : 4;
      else if (style === 'civilization') base = cl < 2 ? 5 : cl < 5 ? 4 : 3;
      else if (style === 'event') base = cl < 3 ? 6 : 5;
      else if (style === 'idle') base = cl < 2 ? 8 : 7;
      const gf = state.greatFilter;
      if (gf && (gf.status === 'sign' || gf.status === 'crisis')) base = Math.min(base, 5);
      return base;
    }

    function applyStyleSpeed(silent = false) {
      const base = desiredSpeedIndex();
      const next = clamp(base + (state.manualSpeedOffset || 0), 0, SPEEDS.length - 1);
      state.speedIndex = next;
      if (!silent) uiState.detailDirty = state.mode === 'record';
    }

    function autoSlowdownForImportantEvent() {
      if ((state.timeStyle === 'event' || state.timeStyle === 'idle' || state.timeStyle === 'civilization') && state.speedIndex > 4) {
        state.speedIndex = 4;
        state.manualSpeedOffset = state.speedIndex - desiredSpeedIndex();
        showEventToast('planet', '重要イベント発生：観測速度を一時的に下げました');
      }
    }

    function applyModalPauseIfNeeded() {
      if (!state.pauseOnEventModal || state.modalPauseBackup) return;
      state.modalPauseBackup = { paused: state.paused, speedIndex: state.speedIndex, lastSpeedIndex: state.lastSpeedIndex };
      state.paused = true;
      const note = $('modalPauseNote'); if (note) note.classList.add('show');
      updateAll(false);
    }

    function restoreModalPauseIfNeeded() {
      if (!state.modalPauseBackup) return;
      const b = state.modalPauseBackup;
      state.paused = b.paused;
      state.speedIndex = b.speedIndex;
      state.lastSpeedIndex = b.lastSpeedIndex;
      state.modalPauseBackup = null;
      const note = $('modalPauseNote'); if (note) note.classList.remove('show');
      updateAll(false);
    }

    function markRegionEvent(region, eventType) {
      if (!region) return;
      region.lastEventType = eventType;
      region.lastEventAt = state.age;
      uiState.detailDirty = state.mode === 'region' || state.mode === 'record';
    }

    function ensureAssistRegion() {
      return state.regions.find(r => r.id === state.selectedRegionId) || pick(state.regions);
    }

    function runAssistEvent(kind) {
      const region = ensureAssistRegion();
      if (kind === 'life') {
        addLog('life', '観測補助: 生命イベント確認', '生態系拡大イベントの視覚演出を確認しました。', true);
        triggerFx('hazard', 0.55);
        markRegionEvent(region, 'expansion');
      } else if (kind === 'intelligence') {
        if (!state.intelligence) chooseIntelligence();
        addLog('life', '観測補助: 知的生命誕生確認', '知的生命誕生演出を再確認しました。', true);
        triggerFx('intelligence', 1.1);
        markRegionEvent(region, 'origin');
      } else if (kind === 'civilization') {
        addLog('civ', '観測補助: 文明成立確認', '文明成立時の演出を確認しました。', true);
        triggerFx('civilization', 1);
        markRegionEvent(region, 'prosper');
      } else if (kind === 'hazard') {
        addLog('planet', '観測補助: 危機イベント確認', '危機イベントのフラッシュ演出を確認しました。', true);
        triggerFx('hazard', 1);
        markRegionEvent(region, 'conflict');
      } else if (kind === 'collapse') {
        if (!state.collapse) {
          triggerCollapse();
        } else {
          addLog('civ', '観測補助: 崩壊後演出確認', '文明崩壊後の警告演出を再確認しました。', true);
          triggerFx('collapse', 1.1);
          markRegionEvent(region, 'collapse');
        }
      } else if (kind === 'space') {
        addLog('civ', '観測補助: 宇宙進出演出確認', '宇宙進出段階の軌道演出を確認しました。', true);
        triggerFx('space', 1.2);
        markRegionEvent(region, 'prosper');
      }
      uiState.logsDirty = true;
      uiState.detailDirty = true;
      updateAll(true);
      if (region) selectRegion(region, true);
    }

    function makePlanet() {
      state.seed = Math.floor(Math.random() * 999999);
      state.runId = `${Date.now().toString(36)}-${Math.random().toString(36).slice(2,6)}-${state.seed}`;
      state.name = randomName('惑星') + '-' + (2 + Math.floor(Math.random() * 8));
      state.age = 0;
      state.speedIndex = 5;
      state.timeStyle = state.timeStyle || 'evolution';
      state.manualSpeedOffset = 0;
      state.lastSpeedIndex = 5;
      state.paused = false;
      state.rotY = Math.random() * Math.PI * 2;
      state.rotX = -0.08;
      state.milestones = new Set();
      state.logs = [];
      state.selectedRegionId = null;
      state.pinnedRegionIds = [];
      state.intelligence = null;
      state.collapse = false;
      state.collapseAge = null;
      state.currentEnding = null;
      state.endingSummary = '';
      state.journalGeneratedForCurrentEnding = null;
      state.greatFilter = { status: 'none', type: null, signAge: null, crisisAge: null, deadlineAge: null, resolvedAge: null, ignored: false, ignoreCount: 0, result: null };
      state.greatFilterPreparedPoints = 0;
      state.interventionHistory = [];
      const m = state.metaProgress || {};
      let carry = Number(m.carriedObservationPoints || 0);
      let basePoints = 120 + carry;
      if ((m.unlockedPerks || []).includes('init_points_50')) basePoints += 50;
      state.observationPoints = basePoints;
      m.carriedObservationPoints = 0;
      state.nextRandomEvent = 240_000_000 + Math.random() * 280_000_000;
      state.mapType = chooseMapType();
      state.env = {
        ocean: Math.random(),
        gravity: 0.65 + Math.random() * 0.9,
        temperature: Math.random(),
        humidity: Math.random(),
        oxygenPotential: 0.35 + Math.random() * 0.65,
        tectonics: Math.random(),
        disaster: Math.random(),
        forest: Math.random(),
        mountains: Math.random(),
        winds: Math.random(),
        socialPressure: Math.random(),
        stability: Math.random()
      };
      if (state.mapType === 'oceanic') { state.env.ocean = clamp(0.62 + Math.random() * 0.3, 0, 1); }
      if (state.mapType === 'continental') { state.env.ocean = clamp(0.28 + Math.random() * 0.25, 0, 1); }
      if (state.mapType === 'archipelago') { state.env.ocean = clamp(0.58 + Math.random() * 0.22, 0, 1); }
      if (state.mapType === 'arid') { state.env.humidity = clamp(0.08 + Math.random() * 0.2, 0, 1); state.env.temperature = clamp(0.62 + Math.random() * 0.3, 0, 1); }
      if (state.mapType === 'frozen') { state.env.temperature = clamp(Math.random() * 0.22, 0, 1); state.env.ocean = clamp(0.45 + Math.random() * 0.25, 0, 1); }
      if (state.mapType === 'volcanic') { state.env.tectonics = clamp(0.72 + Math.random() * 0.28, 0, 1); state.env.disaster = clamp(0.62 + Math.random() * 0.3, 0, 1); }
      if (state.mapType === 'jungle') { state.env.humidity = clamp(0.72 + Math.random() * 0.26, 0, 1); state.env.forest = clamp(0.75 + Math.random() * 0.22, 0, 1); }
      if (state.mapType === 'shallowSea') { state.env.ocean = clamp(0.68 + Math.random() * 0.22, 0, 1); state.env.humidity = clamp(0.5 + Math.random() * 0.3, 0, 1); }
      state.landDots = makeLandDots();
      state.cloudDots = makeCloudDots();
      state.regions = makeRegions();
      addLog('planet', '観測開始', `${state.name} の長期観測を開始。${MAP_TYPES[state.mapType]?.label || '標準海洋惑星'} / 海洋率${Math.round(state.env.ocean * 100)}%、重力${state.env.gravity.toFixed(2)}G。`, true);
      applyStyleSpeed(true);
      hideWipe();
      saveState();
      uiState.detailDirty = true;
      uiState.logsDirty = true;
      uiState.pinsDirty = true;
      uiState.modeDirty = true;
      updateAll(true);
    }

    function makeLandDots() {
      const dots = [];
      const mt = state.mapType || 'oceanic';
      const continentCount = mt === 'continental' ? 3 + Math.floor(Math.random() * 2) : mt === 'archipelago' ? 9 + Math.floor(Math.random() * 6) : 5 + Math.floor(Math.random() * 4);
      const centers = [];
      for (let i = 0; i < continentCount; i++) {
        centers.push({
          lon: Math.random() * Math.PI * 2 - Math.PI,
          lat: (Math.random() - 0.5) * Math.PI * 0.85,
          size: mt === 'continental' ? 0.55 + Math.random() * 0.55 : mt === 'archipelago' ? 0.14 + Math.random() * 0.22 : 0.35 + Math.random() * 0.48
        });
      }
      for (let i = 0; i < 680; i++) {
        const c = pick(centers);
        const lon = c.lon + (Math.random() - 0.5) * c.size * 1.8;
        const lat = c.lat + (Math.random() - 0.5) * c.size;
        const polar = Math.abs(lat) / (Math.PI / 2);
        const isLand = Math.random() > state.env.ocean * (mt === 'archipelago' ? 0.68 : mt === 'continental' ? 0.42 : 0.55);
        dots.push({
          lon, lat: clamp(lat, -1.45, 1.45),
          r: 0.006 + Math.random() * 0.018,
          land: isLand,
          polar,
          fert: Math.random()
        });
      }
      return dots;
    }

    function makeCloudDots() {
      const dots = [];
      for (let i = 0; i < 160; i++) {
        dots.push({
          lon: Math.random() * Math.PI * 2 - Math.PI,
          lat: (Math.random() - 0.5) * Math.PI,
          r: 0.006 + Math.random() * 0.012,
          a: 0.06 + Math.random() * 0.16
        });
      }
      return dots;
    }

    function makeRegions() {
      return REGION_BASES.map((base, index) => {
        const lon = (index / REGION_BASES.length) * Math.PI * 2 - Math.PI + (Math.random() - .5) * .35;
        const lat = Math.sin(index * 1.7) * .9 + (Math.random() - .5) * .25;
        let base2 = base;
        if (state.mapType === 'volcanic' && Math.random() < .28) base2 = pick(['火山列島', '溶岩台地', '地熱地帯']);
        if (state.mapType === 'jungle' && Math.random() < .24) base2 = pick(['赤道密林', '湿潤森林帯', '大河密林']);
        if ((state.mapType === 'archipelago' || state.mapType === 'shallowSea') && Math.random() < .3) base2 = pick(['西海岸群島', '外洋浅海域', '内海沿岸']);
        const isOcean = /海|浅海|群島|沿岸|氷縁/.test(base2) || Math.random() < state.env.ocean * (state.mapType === 'shallowSea' ? .5 : .34);
        const climate = climateFrom(base2, lat, isOcean);
        const root = randomName('');
        return {
          id: index,
          baseName: base2,
          rootName: root,
          lon, lat,
          isOcean,
          climate,
          fertility: clamp(Math.random() * .55 + (isOcean ? .2 : .35) + state.env.humidity * .25, 0, 1),
          resources: clamp(Math.random() * .7 + (base.includes('山') || base.includes('火山') ? .3 : .05), 0, 1),
          biodiversity: Math.random() * .5,
          pollution: 0,
          ruin: false,
          city: false,
          origin: Math.random(),
          historyNames: [base2],
          currentName: base2,
          note: ''
          ,lastEventType: null,
          lastEventAt: null
        };
      });
    }

    function climateFrom(base, lat, isOcean) {
      if (state.mapType === 'frozen' && (Math.abs(lat) > .75 || Math.random() < .35)) return '寒冷';
      if (state.mapType === 'arid' && !isOcean && Math.random() < .45) return '乾燥';
      if (state.mapType === 'jungle' && !isOcean && Math.random() < .4) return '湿潤';
      if (base.includes('氷') || Math.abs(lat) > 1.15) return '寒冷';
      if (base.includes('乾燥') || state.env.humidity < .25) return '乾燥';
      if (base.includes('湿') || state.env.humidity > .72) return '湿潤';
      if (isOcean) return '海洋性';
      if (Math.abs(lat) < .35) return '熱帯';
      return '温帯';
    }

    function chooseIntelligence() {
      if (state.intelligence) return;
      const env = state.env;
      const scores = LINEAGES.map(l => {
        let score = Math.random() * .25;
        if (l.needs.land) score += (1 - env.ocean) * l.needs.land;
        if (l.needs.ocean) score += env.ocean * l.needs.ocean;
        if (l.needs.forest) score += env.forest * l.needs.forest;
        if (l.needs.heat) score += env.temperature * l.needs.heat;
        if (l.needs.dry) score += (1 - env.humidity) * l.needs.dry;
        if (l.needs.wet) score += env.humidity * l.needs.wet;
        if (l.needs.coast) score += (.35 + env.ocean * .45) * l.needs.coast;
        if (l.needs.social) score += env.socialPressure * l.needs.social;
        if (l.needs.mountain) score += env.mountains * l.needs.mountain;
        if (l.needs.wind) score += env.winds * l.needs.wind;
        if (l.needs.vision) score += (env.winds * .4 + env.mountains * .4 + .2) * l.needs.vision;
        if (l.needs.clever) score += (env.stability * .5 + env.socialPressure * .5) * l.needs.clever;
        if (l.needs.stable) score += env.stability * l.needs.stable;
        if (l.needs.warm) score += env.temperature * l.needs.warm;
        return { l, score };
      }).sort((a, b) => b.score - a.score);
      const chosen = scores[0].l;
      const speciesName = randomName('') + (chosen.id === 'cephalo' ? '潮族' : chosen.id === 'avian' ? '翼人種' : chosen.id === 'mycelial' ? '記憶林' : chosen.id === 'arthropod' ? '群族' : chosen.id === 'reptile' ? '竜人種' : chosen.id === 'amphibian' ? '水棲族' : '獣人種');
      state.intelligence = { ...chosen, speciesName, score: scores[0].score };
      addLog('life', '知的生命体の出現', `${chosen.base} から ${speciesName} が出現。特徴は「${chosen.traits.slice(0,2).join('・')}」。この惑星の文明担当になりそうです。`, true, { imageKey: 'intelligence_birth', subType: 'intelligence' });
      const candidates = state.regions
        .map(r => ({ r, score: r.fertility + r.resources * .35 + (r.isOcean && chosen.id === 'cephalo' ? .6 : 0) + (!r.isOcean && chosen.id !== 'cephalo' ? .25 : 0) - Math.abs(r.lat) * .1 + Math.random() * .3 }))
        .sort((a,b) => b.score - a.score)
        .slice(0, 2);
      for (const c of candidates) c.r.origin += .8;
    }

    function updateMilestones() {
      for (const st of LIFE_STAGES) {
        const key = 'life:' + st.key;
        if (state.age >= st.at && !state.milestones.has(key)) {
          state.milestones.add(key);
          milestoneLife(st);
        }
      }
      if (state.age >= LIFE_STAGES.find(s => s.key === 'intelligence').at) chooseIntelligence();
      for (const st of CIV_STAGES) {
        const key = 'civ:' + st.key;
        if (state.age >= st.at && !state.milestones.has(key)) {
          state.milestones.add(key);
          milestoneCiv(st);
        }
      }
      if (!state.collapse && state.age > 4_372_000_000 && riskValue() > 72 && Math.random() < 0.004) {
        triggerCollapse();
      }
      while (state.age >= state.nextRandomEvent) {
        randomEvent();
        state.nextRandomEvent += randomEventGap();
      }
    }

    function milestoneLife(st) {
      const msgs = {
        sterile: ['無生命期', '地表は不安定。火山活動と隕石衝突が多く、生命の兆候はまだありません。'],
        chemistry: ['有機分子形成', '海洋と大気中で複雑な有機化学反応が増加しました。'],
        microbe: ['原始生命誕生', '浅海と熱水域に微生物圏が成立。生命ログの記録を開始します。'],
        oxygen: ['酸素革命', '光合成型生命が拡大。嫌気性生命の一部が衰退し、生態系が大きく再編されます。'],
        multicell: ['多細胞生命の安定化', '複数の系統で大型化と分化が始まりました。捕食と防御の進化が加速します。'],
        oceanLife: ['海洋生態系の拡大', '外骨格・遊泳能力・感覚器が進化。海洋のニッチ争いが激化します。'],
        landLife: ['陸上進出', '沿岸から陸地へ生命圏が広がります。乾燥耐性と支持構造が重要になりました。'],
        megafauna: ['大型生物繁栄', '複数地域で大型生物が繁栄。支配系統の入れ替わりが起きやすい時代です。'],
        preIntelligence: ['知性候補期', '道具使用・群れ行動・学習能力の高い系統が観測されています。'],
        intelligence: ['知性の火花', '一部の生物系統で記号・道具・世代間学習が成立し始めました。']
      };
      addLog('life', msgs[st.key][0], msgs[st.key][1], true);
      if (st.key === 'intelligence') triggerFx('intelligence', 1.1);
      if (st.key === 'intelligence') autoSlowdownForImportantEvent();
      for (const r of state.regions) r.biodiversity = clamp(r.biodiversity + .08 + Math.random() * .12, 0, 1);
    }

    function milestoneCiv(st) {
      if (st.key === 'none') return;
      const species = state.intelligence ? state.intelligence.speciesName : '未確定知性体';
      const msgs = {
        proto: ['原始文化の成立', `${species} が火・道具・記号的コミュニケーションを使い始めました。`],
        agri: ['定住文明の発生', '食料生産と定住地が拡大。地域名が現地語由来の固有名へ変化し始めます。'],
        city: ['都市国家の形成', '河川・沿岸・資源地帯に都市が出現。交易と争いが記録されます。'],
        empire: ['国家と帝国の時代', '複数の都市圏が統合され、地域名が王国・州・聖域として再編されます。'],
        industrial: ['産業文明へ移行', '燃料利用と機械化が進行。文明発展と同時に環境負荷が上昇します。'],
        info: ['情報文明へ移行', '惑星規模の通信網が成立。都市光が夜面に広がります。'],
        space: ['宇宙進出開始', '軌道施設と宇宙港が建設されました。グレートフィルター突破の候補段階です。'],
        stellar: ['恒星間文明候補', '惑星文明の一部が恒星間進出を試みています。滅亡か継承か、分岐点です。']
      };
      addLog('civ', msgs[st.key][0], msgs[st.key][1], true, { imageKey: st.key === 'proto' ? 'civilization_proto' : st.key === 'city' ? 'civilization_city' : st.key === 'space' ? 'civilization_space' : null, subType: st.key });
      if (st.key === 'proto') triggerFx('civilization', 1);
      if (st.key === 'space') triggerFx('space', 1.2);
      if (['proto','city','industrial','space'].includes(st.key)) autoSlowdownForImportantEvent();
      evolveRegionNames();
    }

    function randomEventGap() {
      const ll = lifeLevel();
      if (ll < 3) return 140_000_000 + Math.random() * 260_000_000;
      if (ll < 8) return 32_000_000 + Math.random() * 110_000_000;
      if (civLevel() < 5) return 1_700_000 + Math.random() * 9_000_000;
      return 120_000 + Math.random() * 1_100_000;
    }

    function randomEvent() {
      if (state.env.tectonics > 0.68 && Math.random() < (0.0006 + state.env.tectonics * 0.0012)) {
        applyTectonicShift(null);
        pushInterventionHistory('自然地殻変動', 0, '高い地殻活動により自然地殻変動が発生', null);
      }
      const ll = lifeLevel();
      const cl = civLevel();
      if (ll < 2) {
        addLog('planet', '地殻変動', '火山活動により大気成分と海洋鉱物濃度が変動しました。');
        return;
      }
      if (ll < 8) {
        const events = [
          ['life', '生態系の放散', '空いたニッチに複数系統が進出。地域ごとの生物相が豊かになりました。'],
          ['life', '小規模絶滅', '気候変動により一部系統が衰退。別系統が空いた席に入り始めます。'],
          ['planet', '気候振動', '寒冷期と温暖期の揺れにより、移動能力と適応力が試されています。'],
          ['life', '形質の獲得', '視覚・群れ行動・外骨格などの形質が複数地域で発達しました。']
        ];
        const e = pick(events); addLog(e[0], e[1], e[2]);
        if (e[1].includes('小規模絶滅') || e[1].includes('気候振動')) triggerFx('hazard', .9);
        markRegionEvent(pick(state.regions), e[1].includes('放散') ? 'expansion' : 'ecosystem');
        for (const r of state.regions) r.biodiversity = clamp(r.biodiversity + (Math.random() - .35) * .08, 0, 1);
        return;
      }
      if (cl < 5) {
        const events = [
          ['civ', '交易圏の拡大', '複数地域で物資と文化が交換され、地名と勢力圏が再編されました。'],
          ['civ', '地域紛争', '水・資源・聖地をめぐる争いが発生。一部地域の安定度が低下します。'],
          ['life', '家畜化と共生', '文明種の周辺で、野生生物の一部が共生・家畜化しました。'],
          ['civ', '文字記録の発展', '地域史と神話が記録され、土地の名前が固定化され始めました。']
        ];
        const e = pick(events); addLog(e[0], e[1], e[2]);
        markRegionEvent(pick(state.regions), e[1].includes('紛争') ? 'conflict' : e[1].includes('交易') ? 'prosper' : 'origin');
        evolveRegionNames();
        return;
      }
      const events = [
        ['civ', '環境負荷の増大', '都市圏と工業地帯の拡大により、複数地域で汚染が上昇しました。'],
        ['life', '都市適応種の増加', '旧来の大型野生生物は減少し、都市環境に適応した小型種が増えています。'],
        ['civ', '技術的跳躍', '通信・エネルギー・材料技術が進歩。宇宙進出の可能性が上昇します。'],
        ['planet', '極端気象', '気候システムの変動が激しくなり、文明圏と生態系の両方に影響が出ています。']
      ];
      const e = pick(events); addLog(e[0], e[1], e[2]);
      if (e[1].includes('極端気象')) triggerFx('hazard', 1);
      if (e[1].includes('技術的跳躍')) triggerFx('space', .8);
      markRegionEvent(pick(state.regions), e[1].includes('環境負荷') ? 'conflict' : 'prosper');
      for (const r of state.regions) {
        if (r.city || Math.random() < .26) r.pollution = clamp(r.pollution + .035 + Math.random() * .08, 0, 1);
      }
    }

    function triggerCollapse() {
      state.collapse = true;
      state.collapseAge = state.age;
      addLog('civ', '文明崩壊', '惑星規模の複合危機により主要文明が崩壊。都市の一部は廃墟となり、生命圏の再編が始まります。', true, { imageKey: 'civilization_collapse', subType: 'collapse' });
      triggerFx('collapse', 1.6);
      autoSlowdownForImportantEvent();
      for (const r of state.regions) {
        if (r.city && Math.random() < .7) {
          r.ruin = true;
          r.city = false;
          markRegionEvent(r, 'collapse');
          r.currentName = '旧' + r.currentName + '跡';
          r.historyNames.push(r.currentName);
        }
      }
      addLog('life', '再野生化の進行', '崩壊圏の一部で植生と野生生態系の再拡大が確認されました。', true, { imageKey: 'rewilding', subType: 'rewilding' });
    }

    function evolveRegionNames() {
      const level = civLevel();
      const species = state.intelligence;
      for (const r of state.regions) {
        const civilizationScore = r.origin + r.fertility * .5 + r.resources * .3 + Math.random() * .1;
        if (level >= 2 && civilizationScore > .85) r.city = true;
        let next = r.currentName;
        if (level >= 2 && r.historyNames.length < 2 && r.city) next = r.rootName + (r.isOcean ? '湾岸' : '川流域');
        if (level >= 3 && r.city && !/都市|王国|帝国|州|圏|特区|旧/.test(next)) next = r.rootName + pick(['河畔都市', '交易都市', '聖域', '城塞都市']);
        if (level >= 4 && r.city && !/王国|帝国|州|連盟|旧/.test(next)) next = r.rootName + pick(['王国', '連盟領', '辺境州', '大公国']);
        if (level >= 5 && r.city && !/工業|首都|第|特区|旧/.test(next)) next = r.rootName + pick(['工業ベルト', '首都圏', '第三区', '研究都市']);
        if (level >= 7 && r.city && !/軌道|宇宙|特区|旧/.test(next)) next = r.rootName + pick(['軌道港特区', '宇宙港都市', '星間観測区']);
        if (species && species.id === 'mycelial' && r.city && level >= 3) next = r.rootName + pick(['記憶林', '共生林都', '地下聖林']);
        if (species && species.id === 'cephalo' && r.city && level >= 3) next = r.rootName + pick(['潮都', '浅海連邦', '珊瑚都市']);
        if (next !== r.currentName) {
          r.currentName = next;
          if (!r.historyNames.includes(next)) r.historyNames.push(next);
        }
      }
    }

    function riskValue() {
      const cl = civLevel();
      const pollution = state.regions.reduce((a,r) => a + r.pollution, 0) / state.regions.length;
      const base = state.env.disaster * 22 + cl * 5 + pollution * 45;
      const stability = state.env.stability * 16;
      const collapse = state.collapse ? 18 : 0;
      return clamp(Math.round(base - stability + collapse), 0, 99);
    }

    function updateRegions(dtYears) {
      const ll = lifeLevel();
      const cl = civLevel();
      for (const r of state.regions) {
        const bioTarget = ll < 2 ? 0 : clamp((ll - 1) / 8 + r.fertility * .22 - r.pollution * .25, 0, 1);
        r.biodiversity = lerp(r.biodiversity, bioTarget, .002);
        if (cl >= 5 && (r.city || Math.random() < .0004)) {
          r.pollution = clamp(r.pollution + dtYears * 0.00000000008 * (cl - 4), 0, 1);
        }
        if (state.collapse) {
          r.pollution = lerp(r.pollution, r.ruin ? .25 : .08, .0008);
          r.biodiversity = lerp(r.biodiversity, .72 - r.pollution * .25, .0008);
        }
      }
    }

    function tick(dt) {
      if (performance.now() - state.lastStyleSyncAt > 1200 && !state.paused && (state.manualSpeedOffset || 0) === 0) {
        applyStyleSpeed(true);
        state.lastStyleSyncAt = performance.now();
      }
      const speed = state.paused ? 0 : SPEEDS[state.speedIndex];
      if (speed > 0) {
        const dtYears = dt * speed;
        state.age += dtYears;
        state.rotY += state.autoSpin * dt;
        updateRegions(dtYears);
        updateMilestones();
        updateGreatFilterProgress();
        state.dirty = true;
      }
      if (performance.now() - state.lastSave > 5000 && state.dirty) saveState(false);
    }

    function project(lon, lat, radius, cx, cy, extraRot = 0) {
      const L = lon + state.rotY + extraRot;
      const x0 = Math.cos(lat) * Math.sin(L);
      const y0 = Math.sin(lat);
      const z0 = Math.cos(lat) * Math.cos(L);
      const cosX = Math.cos(state.rotX), sinX = Math.sin(state.rotX);
      const y = y0 * cosX - z0 * sinX;
      const z = y0 * sinX + z0 * cosX;
      const x = x0;
      return { x: cx + x * radius, y: cy - y * radius, z, visible: z > -0.04, scale: (z + 1) / 2 };
    }

    function drawPlanet() {
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      const cx = w / 2, cy = h * .505;
      const radius = Math.min(w, h) * .36;

      const bg = ctx.createRadialGradient(cx, cy, radius * .1, cx, cy, radius * 1.8);
      bg.addColorStop(0, 'rgba(126,232,255,.13)');
      bg.addColorStop(.38, 'rgba(65,95,185,.08)');
      bg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.clip();
      const mt = state.mapType || 'oceanic';
      const oceanAgeBoost = clamp(lifeLevel() / 8, 0, 1);
      const ocean = ctx.createRadialGradient(cx - radius * .32, cy - radius * .38, radius * .12, cx, cy, radius * 1.1);
      const oceanMid = mt === 'shallowSea' ? '#3e8db0' : mt === 'frozen' ? '#5a84a9' : mt === 'volcanic' ? '#2c405d' : '#173b78';
      const oceanDeep = mt === 'shallowSea' ? '#1a5f84' : mt === 'frozen' ? '#2c4f70' : mt === 'volcanic' ? '#132236' : '#071735';
      ocean.addColorStop(0, `rgba(${42 + oceanAgeBoost*20}, ${95 + oceanAgeBoost*50}, ${170 + oceanAgeBoost*38}, 1)`);
      ocean.addColorStop(.55, oceanMid);
      ocean.addColorStop(1, oceanDeep);
      ctx.fillStyle = ocean;
      ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);

      drawLand(cx, cy, radius);
      drawCities(cx, cy, radius);
      drawClouds(cx, cy, radius);

      const shade = ctx.createRadialGradient(cx - radius * .35, cy - radius * .45, radius * .1, cx + radius * .35, cy + radius * .22, radius * 1.22);
      shade.addColorStop(0, 'rgba(255,255,255,.20)');
      shade.addColorStop(.45, 'rgba(255,255,255,0)');
      shade.addColorStop(.75, 'rgba(0,0,0,.22)');
      shade.addColorStop(1, 'rgba(0,0,0,.72)');
      ctx.fillStyle = shade;
      ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);
      ctx.restore();

      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(126,232,255,.35)';
      ctx.lineWidth = 2;
      ctx.stroke();

      const glow = ctx.createRadialGradient(cx, cy, radius * .95, cx, cy, radius * 1.12);
      glow.addColorStop(0, 'rgba(126,232,255,0)');
      glow.addColorStop(1, 'rgba(126,232,255,.28)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(cx, cy, radius * 1.12, 0, Math.PI * 2); ctx.fill();

      drawRegionMarkers(cx, cy, radius);
      drawOrbitIfNeeded(cx, cy, radius);
      drawEventFx(cx, cy, radius);
    }

    function drawEventFx(cx, cy, radius) {
      if (!state.fx) return;
      const now = performance.now();
      const t = (now - state.fx.start) / state.fx.duration;
      if (t >= 1) { state.fx = null; return; }
      const a = (1 - t) * state.fx.power;
      ctx.save();
      if (state.fx.type === 'intelligence') {
        ctx.strokeStyle = `rgba(126,232,255,${0.45*a})`;
        ctx.lineWidth = 2 + 6 * t;
        ctx.beginPath(); ctx.arc(cx, cy, radius * (0.45 + 0.5*t), 0, Math.PI*2); ctx.stroke();
      } else if (state.fx.type === 'civilization') {
        ctx.fillStyle = `rgba(255,218,118,${0.18*a})`;
        ctx.beginPath(); ctx.arc(cx, cy, radius * .9, 0, Math.PI*2); ctx.fill();
      } else if (state.fx.type === 'hazard') {
        ctx.fillStyle = `rgba(255,90,90,${0.2*a})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      } else if (state.fx.type === 'collapse') {
        ctx.fillStyle = `rgba(40,0,0,${0.35*a})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = `rgba(255,120,120,${0.55*a})`;
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(cx, cy, radius * (0.95 + .08*Math.sin(t*20)), 0, Math.PI*2); ctx.stroke();
      } else if (state.fx.type === 'space') {
        ctx.strokeStyle = `rgba(126,232,255,${0.5*a})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.ellipse(cx, cy, radius * (1.24 + t*.08), radius * (.32 + t*.05), -0.25, 0, Math.PI*2); ctx.stroke();
      }
      ctx.restore();
    }

    function drawLand(cx, cy, radius) {
      const ll = lifeLevel();
      const mt = state.mapType || 'oceanic';
      for (const d of state.landDots) {
        const p = project(d.lon, d.lat, radius, cx, cy);
        if (!p.visible) continue;
        const alpha = clamp((p.z + .12) / 1.12, 0, 1);
        const rr = d.r * radius * (0.55 + p.scale * .75);
        let green = ll >= 5 ? 78 + d.fert * 70 : 58;
        let brown = ll < 3 ? 110 : 76;
        if (mt === 'arid') { green *= .6; brown = 138; }
        if (mt === 'jungle') { green *= 1.18; brown = 62; }
        if (mt === 'volcanic') { green *= .55; brown = 98; }
        const polarCut = mt === 'frozen' ? .62 : .78;
        if (d.polar > polarCut) ctx.fillStyle = `rgba(${mt==='frozen'?'230,245,255':'210,235,255'},${alpha * .76})`;
        else if (d.land) {
          if (mt === 'volcanic' && d.fert < .2) ctx.fillStyle = `rgba(155,70,56,${alpha * .86})`;
          else ctx.fillStyle = `rgba(${brown}, ${green}, ${ll >= 5 ? 68 : 64}, ${alpha * .86})`;
        } else ctx.fillStyle = `rgba(${mt==='shallowSea'?'68,150,180':'37,108,155'}, ${alpha * .20})`;
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, rr * 1.55, rr, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      if (state.collapse) {
        ctx.fillStyle = 'rgba(120, 95, 78, .12)';
        ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);
      }
    }

    function drawClouds(cx, cy, radius) {
      if (lifeLevel() < 1) return;
      for (const d of state.cloudDots) {
        const p = project(d.lon, d.lat, radius, cx, cy, state.age * 0.0000000002);
        if (!p.visible) continue;
        const rr = d.r * radius * (1 + p.scale);
        ctx.fillStyle = `rgba(255,255,255,${d.a * clamp((p.z+.15)/1.15,0,1)})`;
        ctx.beginPath(); ctx.ellipse(p.x, p.y, rr * 2.2, rr, .2, 0, Math.PI * 2); ctx.fill();
      }
    }

    function drawCities(cx, cy, radius) {
      const cl = civLevel();
      if (cl < 3 && !state.collapse) return;
      for (const r of state.regions) {
        if (!r.city && !r.ruin) continue;
        const p = project(r.lon, r.lat, radius, cx, cy);
        if (!p.visible) continue;
        const alpha = clamp((p.z + .05) / 1.05, 0, 1);
        const size = radius * (r.ruin ? .014 : .018 + cl * .002);
        ctx.fillStyle = r.ruin ? `rgba(255,160,105,${alpha*.45})` : `rgba(255,218,118,${alpha*.75})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, size, 0, Math.PI * 2); ctx.fill();
        if (cl >= 6 && !r.ruin) {
          ctx.strokeStyle = `rgba(255,218,118,${alpha*.22})`;
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.arc(p.x, p.y, size * 2.4, 0, Math.PI * 2); ctx.stroke();
        }
      }
    }

    function drawRegionMarkers(cx, cy, radius) {
      for (const r of state.regions) {
        const p = project(r.lon, r.lat, radius, cx, cy);
        if (!p.visible) continue;
        const selected = r.id === state.selectedRegionId;
        const pinned = state.pinnedRegionIds.includes(r.id);
        if (!selected && !pinned) continue;
        ctx.strokeStyle = selected ? 'rgba(126,232,255,.95)' : 'rgba(255,217,118,.8)';
        ctx.fillStyle = selected ? 'rgba(126,232,255,.22)' : 'rgba(255,217,118,.18)';
        ctx.lineWidth = selected ? 3 : 2;
        const rad = selected ? 13 : 9;
        ctx.beginPath(); ctx.arc(p.x, p.y, rad, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      }
    }

    function drawOrbitIfNeeded(cx, cy, radius) {
      if (civLevel() < 7) return;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(-0.25);
      ctx.strokeStyle = 'rgba(126,232,255,.26)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, radius * 1.24, radius * .32, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawWipeScene(region) {
      const w = wipeCanvas.width, h = wipeCanvas.height;
      wctx.clearRect(0,0,w,h);
      const ll = lifeLevel(), cl = civLevel();
      const sky = wctx.createLinearGradient(0,0,0,h);
      if (region.ruin) { sky.addColorStop(0, '#2b2941'); sky.addColorStop(1, '#5a493a'); }
      else if (region.isOcean) { sky.addColorStop(0, '#315f99'); sky.addColorStop(1, '#0d4a70'); }
      else if (region.climate === '乾燥') { sky.addColorStop(0, '#d08b53'); sky.addColorStop(1, '#5b3926'); }
      else if (region.climate === '寒冷') { sky.addColorStop(0, '#9ec8ee'); sky.addColorStop(1, '#2e5578'); }
      else { sky.addColorStop(0, '#315d8c'); sky.addColorStop(1, '#123c39'); }
      wctx.fillStyle = sky; wctx.fillRect(0,0,w,h);

      if (region.isOcean) {
        wctx.fillStyle = 'rgba(20,80,120,.9)'; wctx.fillRect(0,h*.55,w,h*.45);
        for (let i=0;i<7;i++) {
          wctx.strokeStyle = `rgba(255,255,255,${.12 + i*.012})`;
          wctx.beginPath();
          const y = h*.62 + i*8;
          wctx.moveTo(0,y);
          for (let x=0;x<w;x+=30) wctx.quadraticCurveTo(x+15,y-5+(i%2)*4,x+30,y);
          wctx.stroke();
        }
        if (ll >= 5) drawCreatureIcon(wctx, w*.25, h*.60, 'fish');
        if (state.intelligence && state.intelligence.id === 'cephalo' && cl >= 2) drawCityIcon(wctx, w*.62, h*.56, 'coral');
      } else {
        wctx.fillStyle = region.climate === '乾燥' ? '#8d6338' : region.climate === '寒冷' ? '#d8ecff' : '#235b35';
        wctx.fillRect(0,h*.62,w,h*.38);
        if (region.climate !== '乾燥') {
          for (let i=0;i<8;i++) drawTree(wctx, 18+i*46+(i%2)*10, h*.68 + (i%3)*5, region.climate === '寒冷');
        } else {
          for (let i=0;i<4;i++) drawCactus(wctx, 35+i*80, h*.70);
        }
        if (ll >= 7 && !region.ruin && cl < 3) drawCreatureIcon(wctx, w*.34, h*.65, state.intelligence ? state.intelligence.id : 'beast');
        if (region.city && cl >= 3) drawCityIcon(wctx, w*.57, h*.58, state.intelligence ? state.intelligence.id : 'city');
        if (region.ruin) drawCityIcon(wctx, w*.55, h*.60, 'ruin');
      }
      if (cl >= 7 && region.city && !region.ruin) {
        wctx.strokeStyle = 'rgba(126,232,255,.75)';
        wctx.lineWidth = 3;
        wctx.beginPath(); wctx.moveTo(w*.78,h*.60); wctx.lineTo(w*.84,h*.12); wctx.stroke();
        wctx.fillStyle = 'rgba(126,232,255,.9)'; wctx.beginPath(); wctx.arc(w*.84,h*.12,5,0,Math.PI*2); wctx.fill();
      }
      if (region.lastEventType) {
        const fresh = region.lastEventAt != null ? clamp((state.age - region.lastEventAt) / 8_000_000, 0, 1) : 1;
        const evA = (1 - fresh) * .9;
        if (evA > .05) {
          if (region.lastEventType === 'conflict' || region.lastEventType === 'collapse') {
            wctx.fillStyle = `rgba(140,20,20,${0.22*evA})`; wctx.fillRect(0,0,w,h);
            wctx.fillStyle = `rgba(50,50,50,${0.28*evA})`; wctx.fillRect(w*.58,h*.45,w*.28,h*.2);
          } else if (region.lastEventType === 'prosper' || region.lastEventType === 'origin') {
            wctx.fillStyle = `rgba(255,220,120,${0.15*evA})`; wctx.fillRect(0,0,w,h);
          } else if (region.lastEventType === 'expansion' || region.lastEventType === 'ecosystem') {
            wctx.fillStyle = `rgba(120,255,160,${0.13*evA})`; wctx.fillRect(0,0,w,h);
          }
        }
      }
      wctx.fillStyle = 'rgba(0,0,0,.20)'; wctx.fillRect(0,0,w,h);
    }

    function drawTree(c,x,y,snow=false) {
      c.fillStyle = '#5b3b24'; c.fillRect(x-3,y-16,6,18);
      c.fillStyle = snow ? '#d8f1ff' : '#2e8a4a';
      c.beginPath(); c.moveTo(x,y-44); c.lineTo(x-18,y-9); c.lineTo(x+18,y-9); c.closePath(); c.fill();
      c.beginPath(); c.moveTo(x,y-32); c.lineTo(x-15,y-2); c.lineTo(x+15,y-2); c.closePath(); c.fill();
    }

    function drawCactus(c,x,y) {
      c.strokeStyle = '#6fb36a'; c.lineWidth = 7; c.lineCap = 'round';
      c.beginPath(); c.moveTo(x,y); c.lineTo(x,y-38); c.moveTo(x,y-22); c.lineTo(x-16,y-28); c.moveTo(x,y-27); c.lineTo(x+15,y-35); c.stroke();
    }

    function drawCreatureIcon(c,x,y,type) {
      c.save(); c.translate(x,y);
      c.fillStyle = 'rgba(255,255,255,.78)';
      if (type === 'avian') {
        c.beginPath(); c.moveTo(-24,0); c.quadraticCurveTo(-2,-22,18,0); c.quadraticCurveTo(0,-8,-24,0); c.fill();
      } else if (type === 'arthropod') {
        c.fillRect(-18,-10,36,18); for(let i=-2;i<=2;i++){c.fillRect(i*9,-22,3,16); c.fillRect(i*9,7,3,16);} 
      } else if (type === 'cephalo' || type === 'fish') {
        c.beginPath(); c.ellipse(0,-6,22,12,0,0,Math.PI*2); c.fill();
        for(let i=0;i<4;i++){ c.fillRect(-10+i*7,3,3,18); }
      } else {
        c.beginPath(); c.ellipse(0,-13,22,12,0,0,Math.PI*2); c.fill();
        c.fillRect(-12,-5,5,18); c.fillRect(9,-5,5,18); c.beginPath(); c.arc(18,-22,9,0,Math.PI*2); c.fill();
      }
      c.restore();
    }

    function drawCityIcon(c,x,y,type) {
      c.save(); c.translate(x,y);
      if (type === 'ruin') c.fillStyle = 'rgba(80,75,70,.85)';
      else if (type === 'coral' || type === 'cephalo') c.fillStyle = 'rgba(255,150,180,.82)';
      else if (type === 'mycelial') c.fillStyle = 'rgba(160,255,170,.78)';
      else c.fillStyle = 'rgba(255,218,118,.85)';
      for (let i=0;i<5;i++) {
        const bw = 14 + (i%2)*8;
        const bh = 24 + i*8;
        c.fillRect(-42 + i*18, -bh, bw, bh);
      }
      if (type === 'avian') {
        c.strokeStyle = 'rgba(255,255,255,.55)'; c.beginPath(); c.moveTo(-45,-42); c.lineTo(45,-70); c.stroke();
      }
      if (type === 'mycelial') {
        c.strokeStyle = 'rgba(160,255,170,.45)'; for(let i=0;i<4;i++){c.beginPath(); c.arc(-20+i*14,-20-i*8,13,0,Math.PI*2); c.stroke();}
      }
      c.restore();
    }

    function pointToRegion(x, y) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const px = (x - rect.left) * scaleX;
      const py = (y - rect.top) * scaleY;
      const cx = canvas.width / 2, cy = canvas.height * .505;
      const radius = Math.min(canvas.width, canvas.height) * .36;
      const nx = (px - cx) / radius;
      const ny = -(py - cy) / radius;
      if (nx*nx + ny*ny > 1) return null;
      const z = Math.sqrt(1 - nx*nx - ny*ny);
      const cosX = Math.cos(-state.rotX), sinX = Math.sin(-state.rotX);
      const y0 = ny * cosX - z * sinX;
      const z0 = ny * sinX + z * cosX;
      const lon = Math.atan2(nx, z0) - state.rotY;
      const lat = Math.asin(clamp(y0, -1, 1));
      let best = null, bestD = Infinity;
      for (const r of state.regions) {
        const dLon = Math.atan2(Math.sin(r.lon - lon), Math.cos(r.lon - lon));
        const dLat = r.lat - lat;
        const d = dLon*dLon + dLat*dLat*1.6;
        if (d < bestD) { bestD = d; best = r; }
      }
      return best;
    }

    function regionSummary(region) {
      const ll = lifeLevel(), cl = civLevel();
      if (state.collapse && region.ruin) return '旧都市跡 / 再野生化と再興候補';
      if (cl >= 7 && region.city) return '宇宙港・軌道施設あり';
      if (cl >= 5 && region.city) return '高密度都市圏 / 環境負荷あり';
      if (cl >= 3 && region.city) return '都市文明圏 / 交易と政治の中心';
      if (cl >= 2 && region.city) return '初期定住地 / 農耕と集落';
      if (ll >= 8) return '知性候補の活動圏';
      if (ll >= 6) return '大型生物が繁栄';
      if (ll >= 3) return region.isOcean ? '微生物・海洋生命が拡大' : '地衣類と初期陸上生命';
      return '生命の兆候は薄い';
    }

    function regionDetails(region) {
      const species = state.intelligence;
      const speciesLine = species ? `${species.speciesName}（${species.name}）` : '未出現';
      let note = '';
      if (region.ruin) note = 'かつて文明の中心地でしたが、崩壊後は廃墟と二次生態系が混在しています。';
      else if (region.city) note = `${species ? species.city : '地域都市'} が形成されています。土地の名称も文明段階に応じて更新されています。`;
      else if (lifeLevel() >= 8) note = '道具使用や群れ行動を持つ生物が観測される可能性があります。';
      else if (lifeLevel() >= 5) note = '生命圏が厚くなり、捕食・防御・繁殖戦略の競争が進んでいます。';
      else note = 'まだ文明の気配はありません。地形と気候が今後の進化圧になります。';
      return { speciesLine, note };
    }

    function selectRegion(region, show = true) {
      if (!region) return;
      state.selectedRegionId = region.id;
      if (show) showWipe(region);
      uiState.detailDirty = true;
      updateAll(true);
    }

    function showWipe(region) {
      drawWipeScene(region);
      $('wipeName').textContent = region.currentName;
      $('wipeLine').textContent = `${region.climate} / ${regionSummary(region)}`;
      $('wipe').classList.add('show');
    }

    function hideWipe() {
      $('wipe').classList.remove('show');
    }

    function pinSelected() {
      const id = state.selectedRegionId;
      if (id == null) return;
      if (state.pinnedRegionIds.includes(id)) return;
      if (state.pinnedRegionIds.length >= 3) {
        const names = state.pinnedRegionIds.map(pid => state.regions.find(r => r.id === pid)?.currentName).filter(Boolean);
        const tip = names.length ? `\n現在: ${names.join(' / ')}` : '';
        alert(`観測ワイプは最大3つまでです。解除してから追加してください。${tip}`);
        return;
      }
      state.pinnedRegionIds.push(id);
      state.dirty = true;
      uiState.pinsDirty = true;
      saveState(false);
      updateAll(true);
    }

    function unpin(id) {
      state.pinnedRegionIds = state.pinnedRegionIds.filter(x => x !== id);
      state.dirty = true;
      uiState.pinsDirty = true;
      saveState(false);
      updateAll(true);
    }

      $('planetName').textContent = state.name;
      $('ageText').textContent = `${MAP_TYPES[state.mapType]?.label || '標準海洋惑星'} / 経過 ${formatAge(state.age)}`;

      $('speciesText').textContent = state.intelligence ? state.intelligence.speciesName : '未出現';

      $('riskText').textContent = risk < 30 ? `低 ${risk}%` : risk < 62 ? `中 ${risk}%` : `高 ${risk}%`;
      $('speedDisplay').innerHTML = `<b>${SPEED_LABELS[state.speedIndex]}</b><small>${SPEED_HELP[state.speedIndex]}</small>`;
      $('pauseBtn').textContent = state.paused || state.speedIndex === 0 ? '▶ 再開' : '⏸ 一時停止';
      const styleName = TIME_STYLES[state.timeStyle] || TIME_STYLES.evolution;

      const st = $('styleState'); if (st) st.textContent = `現在: ${styleName}${manual}`;
      updateFloatingHud();
      updateCrisisBar();

    function updateAll(forceHeavy = false) {
      updateStats();
      if (forceHeavy || uiState.modeDirty) {
        document.querySelectorAll('.modePanel button').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));

      if (forceHeavy || uiState.pinsDirty) {

        uiState.pinsDirty = false;
      }
      if (forceHeavy || uiState.detailDirty) {
        updateDetailPanel();
        uiState.detailDirty = false;
      }
      if (forceHeavy || uiState.logsDirty) {
        updateLogs();
        uiState.logsDirty = false;
      }

      const tray = $('pinTray');
      $('pinCount').textContent = `${state.pinnedRegionIds.length}/3`;
      tray.classList.toggle('show', state.pinnedRegionIds.length > 0);
      const list = $('pinList');
      list.innerHTML = '';
      for (const id of state.pinnedRegionIds) {
        const r = state.regions.find(x => x.id === id);
        if (!r) continue;
        const div = document.createElement('div');
        div.className = 'pinCard';
        div.innerHTML = `<div class="pinName">${escapeHtml(r.currentName)}</div><div class="pinState">${escapeHtml(regionSummary(r))}</div><button data-unpin="${r.id}">閉じる</button>`;
        div.addEventListener('click', (e) => {
          if (e.target.dataset.unpin != null) return;
          selectRegion(r);
          state.mode = 'region';
          uiState.modeDirty = true;
          uiState.detailDirty = true;
          updateAll(true);
        });
        list.appendChild(div);
      }
      list.querySelectorAll('[data-unpin]').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); unpin(Number(btn.dataset.unpin)); }));
